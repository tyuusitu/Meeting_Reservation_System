<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>会議室予約</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .hidden { display: none !important; }
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    input[type="date"], input[type="time"] { color-scheme: light; }
  </style>
</head>

<body class="bg-slate-50 text-gray-800 min-h-screen">

  <!-- ローディングオーバーレイ -->
  <div id="loading-overlay" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center">
    <div class="bg-white rounded-2xl px-8 py-6 flex flex-col items-center gap-3 shadow-2xl">
      <div class="w-10 h-10 border-4 border-blue-100 border-t-blue-600 rounded-full animate-spin"></div>
      <p id="loading-text" class="text-sm text-gray-600 font-semibold">処理中...</p>
    </div>
  </div>

  <div class="max-w-2xl mx-auto px-4 pb-16">
    <!-- ヘッダー -->
    <div class="sticky top-0 z-20 -mx-4 px-4 py-3 bg-slate-50/95 backdrop-blur-sm border-b border-slate-200 mb-5">
      <div class="flex items-center justify-between gap-2">
        <h1 id="system-name" class="text-lg font-bold leading-tight text-gray-900">会議室予約</h1>
        <nav class="flex items-center gap-1.5 flex-shrink-0">
          <a href="index.html" class="text-xs font-semibold text-blue-600 border border-blue-300 rounded-lg px-2.5 py-1.5 hover:bg-blue-50 transition">メニュー</a>
          <a href="status.html" class="text-xs font-semibold text-blue-600 border border-blue-300 rounded-lg px-2.5 py-1.5 hover:bg-blue-50 transition">利用状況</a>
          <a href="admin.html" class="text-xs text-gray-400 border border-gray-200 rounded-lg px-2.5 py-1.5 hover:text-blue-600 transition">管理者</a>
        </nav>
      </div>
    </div>

    <!-- 読み込み中 -->
    <div id="loading-msg" class="text-center py-12 text-gray-400 text-sm">読み込み中...</div>

    <!-- 予約フォーム -->
    <div id="screen-reserve" class="hidden flex flex-col gap-4">
      <!-- 予約者情報 -->
      <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-4 sm:p-5">
        <div class="font-bold text-gray-900 mb-3">予約者情報</div>
        <div id="common-fields" class="flex flex-col gap-3">
          <div id="field-org-wrap">
            <label id="label-org" class="flex flex-col gap-1 text-xs font-semibold text-gray-500">
              団体名&nbsp;<span class="text-red-500 inline">*</span>
              <input type="text" id="input-org" autocomplete="organization"
                class="min-h-[46px] border border-slate-200 rounded-xl bg-white text-gray-900 px-3 py-2.5 text-sm font-normal focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition w-full">
              <span class="error-msg text-red-500 text-xs font-normal hidden" id="err-org"></span>
            </label>
          </div>
          <div id="field-name-wrap">
            <label id="label-name" class="flex flex-col gap-1 text-xs font-semibold text-gray-500">
              お名前&nbsp;<span class="text-red-500 inline">*</span>
              <input type="text" id="input-name" autocomplete="name"
                class="min-h-[46px] border border-slate-200 rounded-xl bg-white text-gray-900 px-3 py-2.5 text-sm font-normal focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition w-full">
              <span class="error-msg text-red-500 text-xs font-normal hidden" id="err-name"></span>
            </label>
          </div>
        </div>
      </div>

      <!-- グローバルエラー -->
      <div id="global-error" class="hidden bg-red-50 border border-red-200 rounded-xl px-4 py-3 text-red-600 text-sm"></div>

      <!-- 予約カード一覧 -->
      <div id="reserve-cards"></div>

      <!-- 追加・送信 -->
      <div class="flex flex-wrap gap-2">
        <button onclick="addReserveCard()" class="flex-1 min-w-[140px] min-h-[46px] bg-slate-100 hover:bg-slate-200 text-gray-700 rounded-xl px-4 font-bold text-sm transition">＋ 予約を追加</button>
        <button id="btn-confirm" onclick="goToConfirm()" class="flex-1 min-w-[140px] min-h-[46px] bg-blue-600 hover:bg-blue-700 text-white rounded-xl px-4 font-bold text-sm transition shadow-sm">確認へ進む</button>
      </div>
    </div>

    <!-- 完了画面 -->
    <div id="screen-done" class="hidden">
      <div class="bg-emerald-50 border border-emerald-200 rounded-2xl p-5 flex flex-col gap-3">
        <h3 class="font-bold text-emerald-700 text-base">予約が完了しました</h3>
        <div id="done-list" class="flex flex-col divide-y divide-slate-200"></div>
        <div class="flex flex-wrap gap-2 mt-2">
          <a href="status.html" class="flex-1 flex items-center justify-center min-h-[46px] bg-white border border-blue-500 text-blue-600 rounded-xl font-bold text-sm hover:bg-blue-50 transition">利用状況を確認</a>
          <button onclick="resetReserveForm()" class="flex-1 min-h-[46px] bg-slate-100 hover:bg-slate-200 text-gray-700 rounded-xl font-bold text-sm transition">続けて予約</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 確認モーダル -->
  <div id="confirm-modal" class="hidden fixed inset-0 bg-black/50 z-40 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl p-5 w-full max-w-xl max-h-[90vh] overflow-y-auto flex flex-col gap-4 shadow-2xl">
      <h2 class="text-lg font-bold text-gray-900">予約内容の確認</h2>
      <div id="confirm-content"></div>
      <div class="flex flex-wrap gap-2">
        <button onclick="closeConfirm()" class="flex-1 min-h-[46px] bg-slate-100 hover:bg-slate-200 text-gray-700 rounded-xl font-bold text-sm transition">戻る</button>
        <button id="btn-submit" onclick="submitReservations()" class="flex-1 min-h-[46px] bg-blue-600 hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed text-white rounded-xl font-bold text-sm transition shadow-sm">予約確定</button>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    const CONFIG = window.APP_CONFIG;
    let appConfig = null;
    let allReservations = [];
    let reserveCards = [];
    let cardIdCounter = 0;
    let reservationsLoaded = false;

    // ============================================================
    // ローディング
    // ============================================================
    function showLoading(text) {
      document.getElementById('loading-text').textContent = text || '処理中...';
      document.getElementById('loading-overlay').classList.remove('hidden');
    }
    function hideLoading() {
      document.getElementById('loading-overlay').classList.add('hidden');
    }

    // ============================================================
    // 初期化
    // ============================================================
    document.addEventListener('DOMContentLoaded', async () => {
      applyConfig(defaultConfig());
      document.getElementById('loading-msg').classList.add('hidden');
      document.getElementById('screen-reserve').classList.remove('hidden');
      Promise.allSettled([loadConfig(), loadReservations()]).then(() => {
        reservationsLoaded = true;
      });
    });

    function todayStr() {
      return new Date().toISOString().slice(0, 10);
    }

    // ============================================================
    // GAS から設定取得
    // ============================================================
    async function loadConfig() {
      try {
        const url = CONFIG.GAS_API_URL + '?action=get_config';
        const res = await fetch(url);
        const data = await res.json();
        if (data.ok) {
          appConfig = data;
          applyConfig(data);
        }
      } catch (e) {
        console.warn('設定の取得に失敗しました（デフォルト値を使用）', e);
        appConfig = defaultConfig();
        applyConfig(appConfig);
      }
    }

    function defaultConfig() {
      return {
        ok: true,
        today: todayStr(),
        settings: {
          systemName: '会議室予約システム',
          businessStartTime: '09:00',
          businessEndTime: '22:00',
          timeSlotMinutes: 5,
          maxReservationsPerSubmit: 10,
          labels: { organizationName: '団体名', userName: 'お名前', meetingName: '会議名', room: '会議室' },
          fieldConfig: { organizationName: true, userName: true },
        },
        rooms: [],
      };
    }

    function applyConfig(cfg) {
      const s = cfg.settings;
      document.getElementById('system-name').textContent = s.systemName + ' - 予約';
      document.title = s.systemName + ' - 予約';
      document.getElementById('label-org').childNodes[0].textContent = s.labels.organizationName + ' ';
      document.getElementById('label-name').childNodes[0].textContent = s.labels.userName + ' ';
      if (!s.fieldConfig.organizationName) document.getElementById('field-org-wrap').classList.add('hidden');
      if (!s.fieldConfig.userName) document.getElementById('field-name-wrap').classList.add('hidden');
      if (reserveCards.length === 0) addReserveCard();
    }

    // ============================================================
    // CSV 取得
    // ============================================================
    async function loadReservations(bustCache = false) {
      const url = CONFIG.buildSheetCsvUrl('reservations', bustCache);
      try {
        const text = CONFIG.fetchSheetCsvText ? await CONFIG.fetchSheetCsvText('reservations', bustCache) : await fetch(url).then((res) => res.text());
        allReservations = parseCSV(text).filter(r =>
          r.reservation_id && (r.status === '有効' || r.status === 'キャンセル依頼')
        );
        reservationsLoaded = true;
      } catch (e) {
        console.warn('予約データの取得に失敗しました', e);
        allReservations = [];
        reservationsLoaded = true;
      }
    }

    // ============================================================
    // CSV パーサー
    // ============================================================
    const CSV_NEEDED = new Set(['予約ID', '団体名', '会議名', 'お名前', '会議室ID', '会議室名', '利用日', '開始時間', '終了時間', 'ステータス']);
    const CSV_KEY_MAP = {
      '予約ID': 'reservation_id',
      '団体名': 'organization_name', '会議名': 'meeting_name', 'お名前': 'user_name',
      '会議室ID': 'room_id', '会議室名': 'room_name', '利用日': 'usage_date',
      '開始時間': 'start_time', '終了時間': 'end_time', 'ステータス': 'status',
    };

    function parseCSV(text) {
      const lines = text.trim().split('\n');
      if (lines.length < 2) return [];
      const headers = parseCSVRow(lines[0]);
      const colMap = [];
      headers.forEach((h, i) => {
        if (CSV_NEEDED.has(h)) colMap.push({ i, key: CSV_KEY_MAP[h] });
      });
      const result = [];
      for (let li = 1; li < lines.length; li++) {
        if (!lines[li].trim()) continue;
        const vals = parseCSVRow(lines[li]);
        const obj = {};
        for (let ci = 0; ci < colMap.length; ci++) {
          obj[colMap[ci].key] = (vals[colMap[ci].i] || '').trim();
        }
        if (obj.reservation_id) result.push(obj);
      }
      return result;
    }

    function parseCSVRow(line) {
      const result = [];
      let cur = '', inQ = false;
      for (let i = 0; i < line.length; i++) {
        const c = line[i];
        if (c === '"') {
          if (inQ && line[i + 1] === '"') { cur += '"'; i++; }
          else inQ = !inQ;
        } else if (c === ',' && !inQ) { result.push(cur); cur = ''; }
        else cur += c;
      }
      result.push(cur);
      return result;
    }

    // ============================================================
    // 予約フォーム
    // ============================================================
    function addReserveCard() {
      const cfg = appConfig ? appConfig.settings : defaultConfig().settings;
      if (reserveCards.length >= cfg.maxReservationsPerSubmit) {
        alert(`一度に登録できる予約は${cfg.maxReservationsPerSubmit}件までです。`);
        return;
      }
      const id = ++cardIdCounter;
      reserveCards.push(id);
      renderReserveCards();
    }

    function removeReserveCard(id) {
      reserveCards = reserveCards.filter(c => c !== id);
      if (reserveCards.length === 0) addReserveCard();
      else renderReserveCards();
    }

    const inputCls = 'w-full min-h-[44px] border border-slate-200 rounded-xl bg-white text-gray-900 px-3 py-2.5 text-sm font-normal focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition';
    const labelCls = 'flex flex-col gap-1 text-xs font-semibold text-gray-500';

    function renderReserveCards() {
      const cfg = appConfig ? appConfig.settings : defaultConfig().settings;
      const container = document.getElementById('reserve-cards');
      container.innerHTML = reserveCards.map((id, idx) => `
        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-4 sm:p-5 flex flex-col gap-3 mb-3" id="card-${id}">
          <div class="flex justify-between items-center">
            <span class="text-xs font-bold text-gray-400 uppercase tracking-wide">${idx + 1}件目</span>
            ${reserveCards.length > 1 ? `<button class="text-xs bg-slate-100 hover:bg-red-50 hover:text-red-600 text-gray-500 rounded-lg px-3 py-1.5 font-semibold transition" onclick="removeReserveCard(${id})">削除</button>` : ''}
          </div>
          <div class="grid grid-cols-2 gap-3">
            <label class="${labelCls}" onclick="openInputPicker('card-date-${id}', event)">
              利用日&nbsp;<span class="text-red-500 inline">*</span>
              <div class="border border-slate-200 rounded-xl bg-white px-3 py-2.5 focus-within:ring-2 focus-within:ring-blue-500 focus-within:border-transparent transition cursor-pointer min-h-[44px] flex flex-col justify-center">
                <input type="date" id="card-date-${id}" onchange="searchAvailable(${id})" class="w-full text-sm text-gray-900 bg-transparent border-0 outline-none cursor-pointer font-normal">
              </div>
              <span class="error-msg text-red-500 text-xs font-normal hidden" id="card-err-date-${id}"></span>
            </label>
            <div></div>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <label class="${labelCls}">
              開始時間&nbsp;<span class="text-red-500 inline">*</span>
              <select id="card-start-${id}" onchange="updateEndTimeOptions(${id}); searchAvailable(${id})" class="${inputCls}">
                ${generateTimeOptions(toMin(cfg.businessStartTime || '09:00'), toMin(cfg.businessEndTime || '22:00') - 5, '')}
              </select>
              <span class="error-msg text-red-500 text-xs font-normal hidden" id="card-err-start-${id}"></span>
            </label>
            <label class="${labelCls}">
              終了時間&nbsp;<span class="text-red-500 inline">*</span>
              <select id="card-end-${id}" onchange="searchAvailable(${id})" class="${inputCls}">
                <option value="">開始時間を先に選択してください</option>
              </select>
              <span class="error-msg text-red-500 text-xs font-normal hidden" id="card-err-end-${id}"></span>
            </label>
          </div>
          <label class="${labelCls}">
            ${esc(cfg.labels.room)}&nbsp;<span class="text-red-500 inline">*</span>
            <select id="card-room-${id}" class="${inputCls}">
              <option value="">日付・時間を先に入力してください</option>
            </select>
            <span class="error-msg text-red-500 text-xs font-normal hidden" id="card-err-room-${id}"></span>
          </label>
          <label class="${labelCls}">
            ${esc(cfg.labels.meetingName)}&nbsp;<span class="text-red-500 inline">*</span>
            <input type="text" id="card-meeting-${id}" placeholder="${esc(cfg.labels.meetingName)}を入力" class="${inputCls}">
            <span class="error-msg text-red-500 text-xs font-normal hidden" id="card-err-meeting-${id}"></span>
          </label>
        </div>
      `).join('');
    }

    async function searchAvailable(id) {
      const date = document.getElementById(`card-date-${id}`).value;
      const start = document.getElementById(`card-start-${id}`).value;
      const end = document.getElementById(`card-end-${id}`).value;
      const sel = document.getElementById(`card-room-${id}`);
      if (!date || !start || !end) return;
      if (toMin(start) >= toMin(end)) return;
      if (!reservationsLoaded) {
        sel.innerHTML = '<option value="">予約情報を読み込み中です...</option>';
        sel.disabled = true;
        return;
      }

      sel.innerHTML = '<option value="">検索中...</option>';
      sel.disabled = true;

      const rooms = appConfig ? appConfig.rooms : [];
      const busy = new Set(
        allReservations.filter(r =>
          r.usage_date === date && r.status === '有効' &&
          timeOverlap(r.start_time, r.end_time, start, end)
        ).map(r => r.room_id)
      );

      const available = rooms.filter(r => !busy.has(r.room_id));
      sel.disabled = false;
      sel.innerHTML = available.length === 0
        ? '<option value="">空き会議室なし</option>'
        : '<option value="">会議室を選択</option>' + available.map(r =>
          `<option value="${esc(r.room_id)}">${esc(r.room_name)}</option>`
        ).join('');
    }

    // ============================================================
    // 確認画面
    // ============================================================
    function goToConfirm() {
      clearErrors();
      const { ok, common, reservations, errors } = collectFormData();
      if (!ok) {
        showErrors(errors);
        return;
      }

      const cfg = appConfig ? appConfig.settings : defaultConfig().settings;
      const thCls = 'border border-slate-200 bg-slate-50 px-3 py-2 text-left font-semibold text-xs text-gray-600 w-1/3';
      const tdCls = 'border border-slate-200 px-3 py-2 text-sm text-gray-800';

      let html = `<h3 class="text-sm font-bold text-gray-700 mb-2">予約者情報</h3>
        <table class="w-full border-collapse text-sm mb-4"><tbody>`;
      if (cfg.fieldConfig.organizationName) html += `<tr><th class="${thCls}">${esc(cfg.labels.organizationName)}</th><td class="${tdCls}">${esc(common.organization_name)}</td></tr>`;
      if (cfg.fieldConfig.userName) html += `<tr><th class="${thCls}">${esc(cfg.labels.userName)}</th><td class="${tdCls}">${esc(common.user_name)}</td></tr>`;
      html += '</tbody></table>';

      reservations.forEach((r, i) => {
        html += `<h3 class="text-sm font-bold text-gray-700 mt-4 mb-2">${i + 1}件目</h3>
          <table class="w-full border-collapse text-sm"><tbody>
            <tr><th class="${thCls}">${esc(cfg.labels.meetingName)}</th><td class="${tdCls}">${esc(r.meeting_name)}</td></tr>
            <tr><th class="${thCls}">利用日</th><td class="${tdCls}">${fmtDate(r.usage_date)}</td></tr>
            <tr><th class="${thCls}">時間</th><td class="${tdCls}">${esc(r.start_time)}〜${esc(r.end_time)}</td></tr>
            <tr><th class="${thCls}">${esc(cfg.labels.room)}</th><td class="${tdCls}">${esc(r.room_name)}</td></tr>
          </tbody></table>`;
      });

      document.getElementById('confirm-content').innerHTML = html;
      document.getElementById('confirm-modal').classList.remove('hidden');
    }

    function closeConfirm() {
      document.getElementById('confirm-modal').classList.add('hidden');
    }

    async function submitReservations() {
      const btn = document.getElementById('btn-submit');
      btn.disabled = true;
      showLoading('予約を送信中...');

      const { common, reservations } = collectFormData();

      await loadReservations(true);
      const dupErrors = checkDuplicates(reservations);
      if (dupErrors.length > 0) {
        closeConfirm();
        btn.disabled = false;
        hideLoading();
        showErrors(dupErrors);
        return;
      }

      try {
        const res = await fetch(CONFIG.GAS_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ action: 'insert_reservations', payload: { common, reservations } }),
        });
        const data = await res.json();
        if (data.ok) {
          closeConfirm();
          showDone(data.reservations);
          await loadReservations(true);
        } else {
          closeConfirm();
          document.getElementById('global-error').textContent = data.error || '登録に失敗しました。';
          document.getElementById('global-error').classList.remove('hidden');
        }
      } catch (e) {
        closeConfirm();
        document.getElementById('global-error').textContent = '通信エラーが発生しました。';
        document.getElementById('global-error').classList.remove('hidden');
      }
      btn.disabled = false;
      hideLoading();
    }

    function showDone(reservations) {
      document.getElementById('screen-reserve').classList.add('hidden');
      const done = document.getElementById('screen-done');
      done.classList.remove('hidden');
      document.getElementById('done-list').innerHTML = (reservations || []).map(r =>
        `<div class="text-sm py-2 text-gray-700">
          ${esc(r.meeting_name)} / ${fmtDate(r.usage_date)} ${esc(r.start_time)}〜${esc(r.end_time)} / ${esc(r.room_name)}
        </div>`
      ).join('');
    }

    function resetReserveForm() {
      document.getElementById('screen-done').classList.add('hidden');
      document.getElementById('screen-reserve').classList.remove('hidden');
      document.getElementById('input-org').value = '';
      document.getElementById('input-name').value = '';
      reserveCards = [];
      cardIdCounter = 0;
      addReserveCard();
    }

    // ============================================================
    // バリデーション
    // ============================================================
    function collectFormData() {
      const cfg = appConfig ? appConfig.settings : defaultConfig().settings;
      const errors = [];

      const org = document.getElementById('input-org').value.trim();
      const name = document.getElementById('input-name').value.trim();

      if (cfg.fieldConfig.organizationName && !org) errors.push({ field: 'org', message: `${cfg.labels.organizationName}を入力してください。` });
      if (cfg.fieldConfig.userName && !name) errors.push({ field: 'name', message: `${cfg.labels.userName}を入力してください。` });

      const rooms = appConfig ? appConfig.rooms : [];
      const roomMap = Object.fromEntries(rooms.map(r => [r.room_id, r]));

      const reservations = reserveCards.map((id, idx) => {
        const date = document.getElementById(`card-date-${id}`).value;
        const start = document.getElementById(`card-start-${id}`).value;
        const end = document.getElementById(`card-end-${id}`).value;
        const roomId = document.getElementById(`card-room-${id}`).value;
        const meeting = document.getElementById(`card-meeting-${id}`).value.trim();

        if (!date) errors.push({ index: idx, field: `date-${id}`, message: '利用日を入力してください。' });
        if (!start) errors.push({ index: idx, field: `start-${id}`, message: '開始時間を入力してください。' });
        if (!end) errors.push({ index: idx, field: `end-${id}`, message: '終了時間を入力してください。' });
        if (start && end && toMin(start) >= toMin(end)) errors.push({ index: idx, field: `end-${id}`, message: '終了時間は開始時間より後にしてください。' });
        if (!roomId) errors.push({ index: idx, field: `room-${id}`, message: '会議室を選択してください。' });
        if (!meeting) errors.push({ index: idx, field: `meeting-${id}`, message: `${cfg.labels.meetingName}を入力してください。` });

        return { meeting_name: meeting, usage_date: date, start_time: start, end_time: end, room_id: roomId, room_name: roomMap[roomId] ? roomMap[roomId].room_name : '' };
      });

      return {
        ok: errors.length === 0,
        common: { organization_name: org, user_name: name },
        reservations,
        errors,
      };
    }

    function checkDuplicates(reservations) {
      const errors = [];
      reservations.forEach((r, idx) => {
        const dup = allReservations.find(existing =>
          existing.room_id === r.room_id &&
          existing.usage_date === r.usage_date &&
          existing.status === '有効' &&
          timeOverlap(existing.start_time, existing.end_time, r.start_time, r.end_time)
        );
        if (dup) {
          errors.push({ index: idx, field: `room-${reserveCards[idx]}`, message: `${r.room_name}は${r.start_time}〜${r.end_time}に予約が入っています。` });
        }
      });
      return errors;
    }

    function clearErrors() {
      document.querySelectorAll('.error-msg').forEach(el => { el.textContent = ''; el.classList.add('hidden'); });
      document.getElementById('global-error').classList.add('hidden');
    }

    function showErrors(errors) {
      errors.forEach(e => {
        const el = document.getElementById(`err-${e.field}`) || document.getElementById(`card-err-${e.field}`);
        if (el) { el.textContent = e.message; el.classList.remove('hidden'); }
      });
      if (errors.length > 0) {
        document.getElementById('global-error').textContent = '入力内容を確認してください。';
        document.getElementById('global-error').classList.remove('hidden');
      }
      const first = document.querySelector('.error-msg:not(.hidden)');
      if (first) first.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    // ============================================================
    // ユーティリティ
    // ============================================================
    function generateTimeOptions(startMin, endMin, selectedVal) {
      let html = '';
      for (let m = startMin; m <= endMin; m += 5) {
        const h = String(Math.floor(m / 60)).padStart(2, '0');
        const min = String(m % 60).padStart(2, '0');
        const val = `${h}:${min}`;
        html += `<option value="${val}"${val === selectedVal ? ' selected' : ''}>${val}</option>`;
      }
      return html;
    }

    function updateEndTimeOptions(id) {
      const startSel = document.getElementById(`card-start-${id}`);
      const endSel = document.getElementById(`card-end-${id}`);
      if (!startSel || !endSel) return;
      const startMin = toMin(startSel.value);
      const endMax = toMin(cfg.businessEndTime || '22:00');
      const prevEnd = endSel.value;
      endSel.innerHTML = generateTimeOptions(startMin + 5, endMax, prevEnd);
    }

    function toMin(t) {
      if (!t) return 0;
      const [h, m] = t.split(':').map(Number);
      return h * 60 + m;
    }

    function timeOverlap(s1, e1, s2, e2) {
      return toMin(s1) < toMin(e2) && toMin(s2) < toMin(e1);
    }

    function fmtDate(d) {
      if (!d) return '';
      const dt = new Date(d + 'T00:00:00');
      const days = ['日', '月', '火', '水', '木', '金', '土'];
      return `${dt.getMonth() + 1}/${dt.getDate()}(${days[dt.getDay()]})`;
    }

    function esc(s) {
      return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function openInputPicker(id, event) {
      if (event && event.target && /input/i.test(event.target.tagName)) return;
      const input = document.getElementById(id);
      if (!input) return;
      input.focus();
      if (typeof input.showPicker === 'function') input.showPicker();
    }
  </script>
</body>
