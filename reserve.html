<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>会議室予約</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>(function(){try{var t=localStorage.getItem('theme');if(t==='dark'||(t!=='light'&&window.matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.classList.add('dark');}catch(e){}})();</script>
  <link href="dark.css" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    .hidden { display: none !important; }

    :root {
      --primary: #1a73e8;
      --primary-hover: #1557b0;
      --primary-light: #e8f0fe;
      --surface: #ffffff;
      --bg: #f0f4f9;
      --on-surface: #202124;
      --muted: #5f6368;
      --muted-light: #9aa0a6;
      --border: #e8eaed;
      --error: #c5221f;
      --error-bg: #fce8e6;
      --error-border: #f5c6c4;
      --success: #137333;
      --success-bg: #e6f4ea;
      --success-border: #a8d5b5;
      --shadow-md: 0 1px 3px rgba(60,64,67,.12), 0 2px 8px rgba(60,64,67,.10);
    }

    body { min-height: 100vh; background: var(--bg); color: var(--on-surface); }

    /* Loading */
    .loading-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,.35); z-index: 50;
      display: none; align-items: center; justify-content: center;
    }
    .loading-overlay.visible { display: flex; }
    .loading-box {
      background: var(--surface); border-radius: 14px; padding: 28px 36px;
      box-shadow: 0 8px 30px rgba(0,0,0,.15);
      display: flex; flex-direction: column; align-items: center; gap: 14px;
    }
    .loading-spinner {
      width: 40px; height: 40px; border: 4px solid var(--border);
      border-top-color: var(--primary); border-radius: 50%;
      will-change: transform;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin .8s linear infinite; }
    .loading-text { font-size: 14px; font-weight: 500; color: var(--muted); }

    /* App bar */
    .app-bar {
      position: sticky; top: 0; z-index: 20;
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 20px; height: 56px;
      display: flex; align-items: center; gap: 12px;
    }
    .app-bar-icon {
      width: 32px; height: 32px; background: var(--primary);
      border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .app-bar-title { font-size: 16px; font-weight: 700; color: var(--on-surface); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .app-bar-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .app-bar-btn {
      height: 34px; padding: 0 14px; border-radius: 6px;
      font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s;
      text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
      border: 1px solid var(--border); background: var(--surface); color: var(--muted);
    }
    .app-bar-btn:hover { background: #f8f9fa; border-color: var(--primary); color: var(--primary); }
    .app-bar-btn-primary { border-color: var(--primary); color: var(--primary); }
    .app-bar-btn-primary:hover { background: var(--primary-light); }

    /* Page */
    .page { max-width: 720px; margin: 0 auto; padding: 24px 16px 60px; display: flex; flex-direction: column; gap: 16px; }
    .loading-msg { text-align: center; padding: 64px 0; font-size: 14px; color: var(--muted-light); }

    /* Cards */
    .card { background: var(--surface); border-radius: 14px; box-shadow: var(--shadow-md); padding: 20px 24px; display: flex; flex-direction: column; gap: 14px; }
    .card-title { font-size: 13px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }

    /* Form elements */
    .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--on-surface); margin-bottom: 6px; }
    .req { color: var(--error); }
    .form-input, .form-select {
      width: 100%; height: 46px; border: 1.5px solid var(--border); border-radius: 8px;
      background: var(--surface); color: var(--on-surface); padding: 0 14px;
      font-size: 14px; outline: none; transition: border-color .15s, box-shadow .15s;
    }
    .form-input:focus, .form-select:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(26,115,232,.18); }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .error-msg { display: none; font-size: 12px; color: var(--error); margin-top: 4px; }
    .error-msg.visible { display: block; }

    /* Reserve card (JS-generated) */
    .card-no-bottom { margin-bottom: 0; }
    .reserve-cards-wrap { display: flex; flex-direction: column; gap: 16px; }
    .date-input { cursor: pointer; }
    .reserve-card { background: var(--surface); border-radius: 14px; box-shadow: var(--shadow-md); padding: 20px 24px; display: flex; flex-direction: column; gap: 14px; }
    .reserve-card-header { display: flex; justify-content: space-between; align-items: center; }
    .reserve-card-label { font-size: 14px; font-weight: 700; color: var(--on-surface); }
    .reserve-card-remove { font-size: 12px; color: var(--muted-light); font-weight: 600; background: none; border: none; cursor: pointer; padding: 6px 8px; border-radius: 6px; transition: all .15s; }
    .reserve-card-remove:hover { color: var(--error); background: var(--error-bg); }

    /* Room selection */
    .room-placeholder { font-size: 13px; color: var(--muted-light); padding: 4px 0; }
    .room-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .room-radio {
      display: flex; align-items: center; gap: 10px;
      border: 1.5px solid var(--border); border-radius: 10px;
      background: var(--surface); padding: 12px 14px; cursor: pointer; transition: all .15s;
    }
    .room-radio:has(input:checked) { border-color: var(--primary); background: var(--primary-light); }
    .room-radio input { width: 16px; height: 16px; accent-color: var(--primary); flex-shrink: 0; }
    .room-radio span { font-size: 13px; font-weight: 600; color: var(--on-surface); }
    .room-busy {
      border: 1.5px solid var(--border); border-radius: 10px;
      background: #f8f9fa; padding: 12px 14px; text-align: center;
      opacity: .5; cursor: not-allowed;
    }
    .room-busy-name { font-size: 13px; font-weight: 600; color: var(--muted); }
    .room-busy-tag { font-size: 11px; color: var(--muted-light); margin-top: 2px; }

    /* Action buttons */
    .btn-stack { display: flex; gap: 10px; flex-direction: column; }
    .btn-add {
      width: 100%; height: 46px; border-radius: 10px; border: 1.5px dashed var(--border);
      background: var(--surface); color: var(--muted); font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all .15s; display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-add:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
    .btn-confirm {
      width: 100%; height: 50px; border-radius: 10px; border: none;
      background: var(--primary); color: #fff; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: background .15s; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-confirm:hover { background: var(--primary-hover); }

    /* Global error */
    .global-error {
      background: var(--error-bg); border: 1px solid var(--error-border);
      border-radius: 8px; padding: 10px 14px; font-size: 13px; color: var(--error);
    }

    /* Done screen */
    .done-card {
      background: var(--success-bg); border: 1.5px solid var(--success-border);
      border-radius: 14px; padding: 24px; display: flex; flex-direction: column; gap: 16px;
    }
    .done-title { font-size: 16px; font-weight: 800; color: var(--success); display: flex; align-items: center; gap: 8px; }
    .done-list { display: flex; flex-direction: column; gap: 0; }
    .done-list-item { padding: 10px 0; border-bottom: 1px solid rgba(19,115,51,.12); font-size: 13px; color: var(--on-surface); }
    .done-list-item:last-child { border-bottom: none; }
    .done-actions { display: flex; gap: 10px; }
    .btn-done-primary { flex: 2; height: 44px; border-radius: 8px; border: 1.5px solid var(--primary); background: var(--surface); color: var(--primary); font-size: 13px; font-weight: 700; cursor: pointer; text-decoration: none; display: flex; align-items: center; justify-content: center; transition: all .15s; }
    .btn-done-primary:hover { background: var(--primary-light); }
    .btn-done-ghost { flex: 1; height: 44px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; }
    .btn-done-ghost:hover { background: #f8f9fa; }

    /* Confirm modal */
    .modal-backdrop {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,.45); z-index: 40;
      display: none; align-items: flex-end; justify-content: center;
    }
    .modal-backdrop.visible { display: flex; }
    .modal-sheet {
      background: var(--surface); width: 100%; max-height: 88vh;
      overflow-y: auto; padding: 20px;
      border-radius: 20px 20px 0 0;
      box-shadow: 0 -4px 24px rgba(0,0,0,.15);
      display: flex; flex-direction: column; gap: 16px;
    }
    .modal-title { font-size: 16px; font-weight: 800; color: var(--on-surface); }
    .modal-row { display: flex; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .modal-row:last-child { border-bottom: none; }
    .modal-row-label { width: 72px; flex-shrink: 0; font-size: 13px; color: var(--muted); }
    .modal-row-value { font-size: 13px; font-weight: 600; color: var(--on-surface); }
    .modal-section-head { font-size: 11px; font-weight: 700; color: var(--muted-light); text-transform: uppercase; letter-spacing: .06em; padding-top: 8px; }
    .modal-actions { display: flex; gap: 10px; padding-top: 4px; }
    .btn-modal-back { flex: 1; height: 46px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); font-size: 14px; font-weight: 600; cursor: pointer; transition: all .15s; }
    .btn-modal-back:hover { background: #f8f9fa; }
    .btn-modal-submit { flex: 2; height: 46px; border-radius: 8px; border: none; background: var(--primary); color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; transition: background .15s; }
    .btn-modal-submit:hover:not(:disabled) { background: var(--primary-hover); }
    .btn-modal-submit:disabled { opacity: .5; cursor: not-allowed; }

    /* Toast */
    .toast-wrap { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 60; display: flex; flex-direction: column; align-items: center; gap: 8px; pointer-events: none; }
    .toast { padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; box-shadow: 0 4px 16px rgba(0,0,0,.2); white-space: nowrap; max-width: 90vw; overflow: hidden; text-overflow: ellipsis; pointer-events: auto; animation: toastIn .2s ease; transition: opacity .3s; will-change: opacity, transform; }
    .toast-warn { background: #202124; color: #fff; }
    .toast-error { background: #d93025; color: #fff; }
    @keyframes toastIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    @media (min-width: 600px) {
      .modal-backdrop { align-items: center; }
      .modal-sheet { max-width: 480px; border-radius: 16px; }
    }
    @media (max-width: 520px) {
      .form-grid { grid-template-columns: 1fr; }
      .room-grid { grid-template-columns: 1fr; }
      .card, .reserve-card { padding: 16px; }
    }
  </style>
</head>
<body>

  <!-- Loading -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="loading-box">
      <div class="loading-spinner spin"></div>
      <p id="loading-text" class="loading-text">処理中...</p>
    </div>
  </div>

  <!-- App bar -->
  <header class="app-bar">
    <div class="app-bar-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
        <path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/>
      </svg>
    </div>
    <h1 id="system-name" class="app-bar-title">会議室予約</h1>
    <div class="app-bar-actions">
      <a href="index.html" class="app-bar-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        ホームに戻る
      </a>
      <a href="status.html" class="app-bar-btn app-bar-btn-primary">利用状況 →</a>
      <button id="dark-toggle" type="button" class="dark-toggle" onclick="toggleDark()" aria-label="ダークモード切替"></button>
    </div>
  </header>

  <div class="page">
    <p id="loading-msg" class="loading-msg">読み込み中...</p>

    <!-- 予約フォーム -->
    <div id="screen-reserve" class="hidden">

      <!-- 予約者情報 -->
      <div class="card card-no-bottom">
        <div class="card-title">予約者情報</div>
        <div id="field-org-wrap">
          <label class="form-label"><span id="label-org-text">団体名</span> <span class="req">*</span></label>
          <input type="text" id="input-org" autocomplete="organization" class="form-input">
          <p class="error-msg" id="err-org"></p>
        </div>
        <div id="field-name-wrap">
          <label class="form-label"><span id="label-name-text">お名前</span> <span class="req">*</span></label>
          <input type="text" id="input-name" autocomplete="name" class="form-input">
          <p class="error-msg" id="err-name"></p>
        </div>
      </div>

      <!-- Global error -->
      <div id="global-error" class="hidden global-error"></div>

      <!-- 予約カード (JS) -->
      <div id="reserve-cards" class="reserve-cards-wrap"></div>

      <!-- アクションボタン -->
      <div class="btn-stack">
        <button type="button" onclick="addReserveCard()" class="btn-add">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
          予約を追加
        </button>
        <button type="button" onclick="goToConfirm()" class="btn-confirm">
          確認へ進む
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8.59 16.58L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>
        </button>
      </div>
    </div>

    <!-- 完了画面 -->
    <div id="screen-done" class="hidden">
      <div class="done-card">
        <div class="done-title">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
          予約が完了しました
        </div>
        <div id="done-list" class="done-list"></div>
        <div class="done-actions">
          <a href="status.html" class="btn-done-primary">利用状況を確認</a>
          <button type="button" onclick="resetReserveForm()" class="btn-done-ghost">続けて予約</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast-wrap" class="toast-wrap"></div>

  <!-- 確認モーダル -->
  <div id="confirm-modal" class="modal-backdrop">
    <div class="modal-sheet">
      <div class="modal-title">予約内容の確認</div>
      <div id="confirm-content"></div>
      <div class="modal-actions">
        <button type="button" onclick="closeConfirm()" class="btn-modal-back">戻る</button>
        <button type="button" id="btn-submit" onclick="submitReservations()" class="btn-modal-submit">予約確定</button>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    const CONFIG = window.APP_CONFIG;
    let appConfig = null;
    let allReservations = [];
    let reserveCards = [];
    let cardIdCounter = 0;
    let reservationsLoaded = false;

    // Loading
    function showLoading(text) {
      document.getElementById('loading-text').textContent = text || '処理中...';
      document.getElementById('loading-overlay').classList.add('visible');
    }
    function hideLoading() {
      document.getElementById('loading-overlay').classList.remove('visible');
    }

    function openNativePicker(id) {
      const input = document.getElementById(id);
      if (!input) return;
      input.focus();
      if (typeof input.showPicker === 'function') input.showPicker();
    }

    // Init
    document.addEventListener('DOMContentLoaded', async () => {
      applyConfig(defaultConfig());
      document.getElementById('loading-msg').classList.add('hidden');
      document.getElementById('screen-reserve').classList.remove('hidden');
      Promise.allSettled([loadConfig(), loadReservations()]);
    });

    function todayStr() { return new Date().toISOString().slice(0, 10); }

    function defaultStartTime() {
      const s = appConfig ? appConfig.settings : defaultConfig().settings;
      const now = new Date();
      const [bh, bm] = (s.businessStartTime || '09:00').split(':').map(Number);
      let h = now.getHours(), m = Math.ceil(now.getMinutes() / 5) * 5;
      if (m >= 60) { h++; m = 0; }
      if (h * 60 + m < bh * 60 + bm) { h = bh; m = bm; }
      return minToTime(h * 60 + m);
    }

    async function loadConfig() {
      try {
        const res = await fetch(CONFIG.GAS_API_URL + '?action=get_config');
        const data = await res.json();
        if (data.ok) { appConfig = data; applyConfig(data); }
      } catch (e) {
        console.warn('設定取得失敗、デフォルト使用', e);
        appConfig = defaultConfig();
      }
    }

    function defaultConfig() {
      return {
        ok: true, today: todayStr(),
        settings: {
          systemName: '会議室予約システム',
          businessStartTime: '09:00', businessEndTime: '22:00',
          timeSlotMinutes: 5, maxReservationsPerSubmit: 10,
          labels: { organizationName: '団体名', userName: 'お名前', meetingName: '会議名', room: '会議室' },
          fieldConfig: { organizationName: true, userName: true },
        },
        rooms: [],
      };
    }

    function applyConfig(data) {
      const s = data.settings;
      document.getElementById('system-name').textContent = s.systemName;
      document.title = s.systemName + ' - 予約';
      document.getElementById('label-org-text').textContent = s.labels.organizationName;
      document.getElementById('label-name-text').textContent = s.labels.userName;
      if (!s.fieldConfig.organizationName) document.getElementById('field-org-wrap').classList.add('hidden');
      if (!s.fieldConfig.userName) document.getElementById('field-name-wrap').classList.add('hidden');
      if (reserveCards.length === 0) addReserveCard();
      else renderReserveCards();
    }

    // CSV
    async function loadReservations(bustCache = false) {
      try {
        const text = CONFIG.fetchSheetCsvText
          ? await CONFIG.fetchSheetCsvText('reservations', bustCache)
          : await fetch(CONFIG.buildSheetCsvUrl('reservations', bustCache)).then(r => r.text());
        allReservations = parseCSV(text).filter(r =>
          r.reservation_id && (r.status === '有効' || r.status === 'キャンセル依頼')
        );
        reservationsLoaded = true;
      } catch (e) {
        allReservations = [];
        reservationsLoaded = true;
      }
    }

    const CSV_KEY_MAP = {
      '予約ID': 'reservation_id', '団体名': 'organization_name', '会議名': 'meeting_name',
      'お名前': 'user_name', '会議室ID': 'room_id', '会議室名': 'room_name',
      '利用日': 'usage_date', '開始時間': 'start_time', '終了時間': 'end_time', 'ステータス': 'status',
    };

    function parseCSV(text) {
      const lines = text.trim().split('\n');
      if (lines.length < 2) return [];
      const headers = parseCSVRow(lines[0]);
      const colMap = headers.map((h, i) => CSV_KEY_MAP[h] ? { i, key: CSV_KEY_MAP[h] } : null).filter(Boolean);
      return lines.slice(1).filter(l => l.trim()).map(line => {
        const vals = parseCSVRow(line);
        const obj = {};
        colMap.forEach(({ i, key }) => obj[key] = (vals[i] || '').trim());
        return obj.reservation_id ? obj : null;
      }).filter(Boolean);
    }

    function parseCSVRow(line) {
      const result = [];
      let cur = '', inQ = false;
      for (let i = 0; i < line.length; i++) {
        const c = line[i];
        if (c === '"') {
          if (inQ && line[i + 1] === '"') { cur += '"'; i++; }
          else inQ = !inQ;
        } else if (c === ',' && !inQ) { result.push(cur); cur = ''; }
        else cur += c;
      }
      result.push(cur);
      return result;
    }

    // Reserve cards
    // Build HTML for a single card (uses cached time options)
    function buildOneCardHTML(id, s) {
      const idx = reserveCards.indexOf(id);
      const isMulti = reserveCards.length > 1;
      const startDef = defaultStartTime();
      const endDef = minToTime(Math.min(toMin(startDef) + 60, toMin(s.businessEndTime || '22:00')));
      const startOpts = generateTimeOptions(toMin(s.businessStartTime || '09:00'), toMin(s.businessEndTime || '22:00') - 5, startDef);
      const endOpts = generateTimeOptions(toMin(startDef) + 5, toMin(s.businessEndTime || '22:00'), endDef);
      return `<div id="card-${id}" class="reserve-card">
          <div class="reserve-card-header">
            <span class="reserve-card-label">${isMulti ? `${idx + 1}件目` : '予約内容'}</span>
            ${isMulti ? `<button type="button" onclick="removeReserveCard(${id})" class="reserve-card-remove">削除</button>` : ''}
          </div>
          <div>
            <label class="form-label">利用日 <span class="req">*</span></label>
            <div onclick="openNativePicker('card-date-${id}')">
              <input type="date" id="card-date-${id}" onchange="searchAvailable(${id})" class="form-input date-input">
            </div>
            <p class="error-msg" id="card-err-date-${id}"></p>
          </div>
          <div class="form-grid">
            <div>
              <label class="form-label">開始時間 <span class="req">*</span></label>
              <select id="card-start-${id}" onchange="updateEndTimeOptions(${id}); searchAvailable(${id})" class="form-select">${startOpts}</select>
              <p class="error-msg" id="card-err-start-${id}"></p>
            </div>
            <div>
              <label class="form-label">終了時間 <span class="req">*</span></label>
              <select id="card-end-${id}" onchange="searchAvailable(${id})" class="form-select">${endOpts}</select>
              <p class="error-msg" id="card-err-end-${id}"></p>
            </div>
          </div>
          <div>
            <label class="form-label">${esc(s.labels.room)} <span class="req">*</span></label>
            <div id="card-rooms-${id}" class="room-placeholder">利用日を選択すると空き室を表示します</div>
            <p class="error-msg" id="card-err-room-${id}"></p>
          </div>
          <div>
            <label class="form-label">${esc(s.labels.meetingName)} <span class="req">*</span></label>
            <input type="text" id="card-meeting-${id}" placeholder="${esc(s.labels.meetingName)}を入力" class="form-input">
            <p class="error-msg" id="card-err-meeting-${id}"></p>
          </div>
        </div>`;
    }

    // Update labels/remove-buttons without touching form values
    function updateCardLabels(s) {
      const isMulti = reserveCards.length > 1;
      reserveCards.forEach((id, idx) => {
        const card = document.getElementById('card-' + id);
        if (!card) return;
        const labelEl = card.querySelector('.reserve-card-label');
        if (labelEl) labelEl.textContent = isMulti ? `${idx + 1}件目` : '予約内容';
        const rmBtn = card.querySelector('.reserve-card-remove');
        if (isMulti && !rmBtn) {
          card.querySelector('.reserve-card-header').insertAdjacentHTML('beforeend',
            `<button type="button" onclick="removeReserveCard(${id})" class="reserve-card-remove">削除</button>`);
        } else if (!isMulti && rmBtn) {
          rmBtn.remove();
        }
      });
    }

    // Save/restore form state across full re-renders (e.g. on config load)
    function saveCardData() {
      return reserveCards.map(id => ({
        id,
        date:    document.getElementById(`card-date-${id}`)?.value ?? '',
        start:   document.getElementById(`card-start-${id}`)?.value ?? '',
        end:     document.getElementById(`card-end-${id}`)?.value ?? '',
        meeting: document.getElementById(`card-meeting-${id}`)?.value ?? '',
      }));
    }
    function restoreCardData(saved) {
      saved.forEach(({ id, date, start, end, meeting }) => {
        if (date)    { const el = document.getElementById(`card-date-${id}`);    if (el) { el.value = date;    searchAvailable(id); } }
        if (start)   { const el = document.getElementById(`card-start-${id}`);   if (el) el.value = start; }
        if (end)     { const el = document.getElementById(`card-end-${id}`);     if (el) el.value = end; }
        if (meeting) { const el = document.getElementById(`card-meeting-${id}`); if (el) el.value = meeting; }
      });
    }

    // Incremental add — only appends new card, preserves existing cards' data
    function addReserveCard() {
      const s = appConfig ? appConfig.settings : defaultConfig().settings;
      if (reserveCards.length >= s.maxReservationsPerSubmit) {
        showToast(`一度に${s.maxReservationsPerSubmit}件までです。`);
        return;
      }
      const id = ++cardIdCounter;
      reserveCards.push(id);
      document.getElementById('reserve-cards').insertAdjacentHTML('beforeend', buildOneCardHTML(id, s));
      if (reserveCards.length === 2) updateCardLabels(s); // first card needs remove-btn + "1件目" label
    }

    // Incremental remove — only removes target card, preserves others' data
    function removeReserveCard(id) {
      reserveCards = reserveCards.filter(c => c !== id);
      if (!reserveCards.length) { addReserveCard(); return; }
      document.getElementById('card-' + id)?.remove();
      const s = appConfig ? appConfig.settings : defaultConfig().settings;
      updateCardLabels(s);
    }

    // Full rebuild with save/restore (called only from applyConfig)
    function renderReserveCards() {
      const s = appConfig ? appConfig.settings : defaultConfig().settings;
      const saved = saveCardData();
      document.getElementById('reserve-cards').innerHTML = reserveCards.map(id => buildOneCardHTML(id, s)).join('');
      restoreCardData(saved);
    }

    function searchAvailable(id) {
      const date = document.getElementById(`card-date-${id}`).value;
      const start = document.getElementById(`card-start-${id}`).value;
      const end = document.getElementById(`card-end-${id}`).value;
      const container = document.getElementById(`card-rooms-${id}`);

      if (!date || !start || !end || toMin(start) >= toMin(end)) {
        container.className = 'room-placeholder';
        container.innerHTML = '利用日・時間を選択すると空き室を表示します';
        return;
      }
      if (!reservationsLoaded) {
        container.className = 'room-placeholder';
        container.innerHTML = '予約情報を読み込み中...';
        return;
      }

      const rooms = appConfig ? appConfig.rooms : [];
      if (!rooms.length) {
        container.className = 'room-placeholder';
        container.innerHTML = '会議室情報がありません';
        return;
      }

      const busyIds = new Set(
        allReservations.filter(r =>
          r.usage_date === date && r.status === '有効' &&
          timeOverlap(r.start_time, r.end_time, start, end)
        ).map(r => r.room_id)
      );

      container.className = 'room-grid';
      container.innerHTML = rooms.map(r => {
        const busy = busyIds.has(r.room_id);
        if (busy) {
          return `<div class="room-busy">
            <div class="room-busy-name">${esc(r.room_name)}</div>
            <div class="room-busy-tag">予約済</div>
          </div>`;
        }
        return `<label class="room-radio">
          <input type="radio" name="room-${id}" value="${esc(r.room_id)}" class="room-radio-input">
          <span>${esc(r.room_name)}</span>
        </label>`;
      }).join('');
    }

    // Confirm & Submit
    function goToConfirm() {
      clearErrors();
      const { ok, common, reservations, errors } = collectFormData();
      if (!ok) { showErrors(errors); return; }

      const s = (appConfig || defaultConfig()).settings;
      let html = '';
      if (s.fieldConfig.organizationName) html += `<div class="modal-row"><span class="modal-row-label">${esc(s.labels.organizationName)}</span><span class="modal-row-value">${esc(common.organization_name)}</span></div>`;
      if (s.fieldConfig.userName) html += `<div class="modal-row"><span class="modal-row-label">${esc(s.labels.userName)}</span><span class="modal-row-value">${esc(common.user_name)}</span></div>`;

      reservations.forEach((r, i) => {
        html += `<div class="modal-section-head">${reservations.length > 1 ? `${i + 1}件目` : '予約内容'}</div>`;
        html += `<div class="modal-row"><span class="modal-row-label">${esc(s.labels.meetingName)}</span><span class="modal-row-value">${esc(r.meeting_name)}</span></div>`;
        html += `<div class="modal-row"><span class="modal-row-label">日時</span><span class="modal-row-value">${fmtDate(r.usage_date)} ${esc(r.start_time)}〜${esc(r.end_time)}</span></div>`;
        html += `<div class="modal-row"><span class="modal-row-label">${esc(s.labels.room)}</span><span class="modal-row-value">${esc(r.room_name)}</span></div>`;
      });

      document.getElementById('confirm-content').innerHTML = html;
      document.getElementById('confirm-modal').classList.add('visible');
    }

    function closeConfirm() {
      document.getElementById('confirm-modal').classList.remove('visible');
    }

    async function submitReservations() {
      const btn = document.getElementById('btn-submit');
      btn.disabled = true;
      showLoading('予約を送信中...');
      const { common, reservations } = collectFormData();
      const dupErrors = checkDuplicates(reservations);
      if (dupErrors.length > 0) {
        closeConfirm();
        btn.disabled = false;
        hideLoading();
        showErrors(dupErrors);
        return;
      }
      try {
        const res = await fetch(CONFIG.GAS_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ action: 'insert_reservations', payload: { common, reservations } }),
        });
        const data = await res.json();
        if (data.ok) {
          closeConfirm();
          mergeReservations(data.reservations || []);
          showDone(data.reservations);
        } else {
          closeConfirm();
          showGlobalError(data.error || '登録に失敗しました。');
        }
      } catch (e) {
        closeConfirm();
        showGlobalError('通信エラーが発生しました。');
      }
      btn.disabled = false;
      hideLoading();
    }

    function showGlobalError(msg) {
      const el = document.getElementById('global-error');
      el.textContent = msg;
      el.classList.remove('hidden');
    }

    function showDone(reservations) {
      document.getElementById('screen-reserve').classList.add('hidden');
      document.getElementById('screen-done').classList.remove('hidden');
      document.getElementById('done-list').innerHTML = (reservations || []).map(r =>
        `<div class="done-list-item">${esc(r.meeting_name)} — ${fmtDate(r.usage_date)} ${esc(r.start_time)}〜${esc(r.end_time)} / ${esc(r.room_name)}</div>`
      ).join('');
    }

    function mergeReservations(reservations) {
      const incoming = Array.isArray(reservations) ? reservations : [];
      if (!incoming.length) return;
      const existingIds = new Set(allReservations.map((item) => item.reservation_id));
      incoming.forEach((item) => {
        if (!existingIds.has(item.reservation_id)) {
          allReservations.push({ reservation_id: item.reservation_id, organization_name: '', meeting_name: item.meeting_name, user_name: '', room_id: item.room_id, room_name: item.room_name, usage_date: item.usage_date, start_time: item.start_time, end_time: item.end_time, status: '有効' });
        }
      });
      reservationsLoaded = true;
    }

    function resetReserveForm() {
      document.getElementById('screen-done').classList.add('hidden');
      document.getElementById('screen-reserve').classList.remove('hidden');
      document.getElementById('input-org').value = '';
      document.getElementById('input-name').value = '';
      reserveCards = [];
      cardIdCounter = 0;
      addReserveCard();
    }

    // Validation
    function collectFormData() {
      const s = appConfig ? appConfig.settings : defaultConfig().settings;
      const errors = [];
      const org = document.getElementById('input-org').value.trim();
      const name = document.getElementById('input-name').value.trim();
      if (s.fieldConfig.organizationName && !org) errors.push({ field: 'org', message: `${s.labels.organizationName}を入力してください。` });
      if (s.fieldConfig.userName && !name) errors.push({ field: 'name', message: `${s.labels.userName}を入力してください。` });

      const rooms = appConfig ? appConfig.rooms : [];
      const roomMap = Object.fromEntries(rooms.map(r => [r.room_id, r]));

      const reservations = reserveCards.map((id, idx) => {
        const date = document.getElementById(`card-date-${id}`).value;
        const start = document.getElementById(`card-start-${id}`).value;
        const end = document.getElementById(`card-end-${id}`).value;
        const roomRadio = document.querySelector(`input[name="room-${id}"]:checked`);
        const roomId = roomRadio ? roomRadio.value : '';
        const meeting = document.getElementById(`card-meeting-${id}`).value.trim();

        if (!date) errors.push({ index: idx, field: `date-${id}`, message: '利用日を入力してください。' });
        if (!start) errors.push({ index: idx, field: `start-${id}`, message: '開始時間を入力してください。' });
        if (!end) errors.push({ index: idx, field: `end-${id}`, message: '終了時間を入力してください。' });
        if (start && end && toMin(start) >= toMin(end)) errors.push({ index: idx, field: `end-${id}`, message: '終了時間は開始時間より後にしてください。' });
        if (!roomId) errors.push({ index: idx, field: `room-${id}`, message: '会議室を選択してください。' });
        if (!meeting) errors.push({ index: idx, field: `meeting-${id}`, message: `${s.labels.meetingName}を入力してください。` });

        return { meeting_name: meeting, usage_date: date, start_time: start, end_time: end, room_id: roomId, room_name: roomMap[roomId] ? roomMap[roomId].room_name : '' };
      });

      return { ok: errors.length === 0, common: { organization_name: org, user_name: name }, reservations, errors };
    }

    function checkDuplicates(reservations) {
      return reservations.flatMap((r, idx) => {
        const dup = allReservations.find(e =>
          e.room_id === r.room_id && e.usage_date === r.usage_date && e.status === '有効' &&
          timeOverlap(e.start_time, e.end_time, r.start_time, r.end_time)
        );
        return dup ? [{ index: idx, field: `room-${reserveCards[idx]}`, message: `${r.room_name}は${r.start_time}〜${r.end_time}に予約が入っています。` }] : [];
      });
    }

    function clearErrors() {
      document.querySelectorAll('.error-msg').forEach(el => { el.textContent = ''; el.classList.remove('visible'); });
      document.getElementById('global-error').classList.add('hidden');
    }

    function showErrors(errors) {
      errors.forEach(e => {
        const el = document.getElementById(`err-${e.field}`) || document.getElementById(`card-err-${e.field}`);
        if (el) { el.textContent = e.message; el.classList.add('visible'); }
      });
      if (errors.length > 0) showGlobalError('入力内容を確認してください。');
      document.querySelector('.error-msg.visible')?.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    // Toast
    function showToast(msg, type = 'warn') {
      const wrap = document.getElementById('toast-wrap');
      const el = document.createElement('div');
      el.className = `toast toast-${type}`;
      el.textContent = msg;
      wrap.appendChild(el);
      setTimeout(() => {
        el.style.opacity = '0';
        setTimeout(() => el.remove(), 300);
      }, 3000);
    }

    // Utils
    const _toCache = Object.create(null);
    function generateTimeOptions(startMin, endMin, selectedVal) {
      const key = `${startMin},${endMin}`;
      if (!_toCache[key]) {
        let html = '';
        for (let m = startMin; m <= endMin; m += 5) {
          const v = minToTime(m);
          html += `<option value="${v}">${v}</option>`;
        }
        _toCache[key] = html;
      }
      if (!selectedVal) return _toCache[key];
      return _toCache[key].replace(`value="${selectedVal}"`, `value="${selectedVal}" selected`);
    }

    function updateEndTimeOptions(id) {
      const startSel = document.getElementById(`card-start-${id}`);
      const endSel = document.getElementById(`card-end-${id}`);
      if (!startSel || !endSel) return;
      const s = appConfig ? appConfig.settings : defaultConfig().settings;
      const prevEnd = endSel.value;
      endSel.innerHTML = generateTimeOptions(toMin(startSel.value) + 5, toMin(s.businessEndTime || '22:00'), prevEnd);
    }

    function minToTime(m) { return `${String(Math.floor(m / 60)).padStart(2, '0')}:${String(m % 60).padStart(2, '0')}`; }
    function toMin(t) { if (!t) return 0; const [h, m] = t.split(':').map(Number); return h * 60 + m; }
    function timeOverlap(s1, e1, s2, e2) { return toMin(s1) < toMin(e2) && toMin(s2) < toMin(e1); }

    const _DAYS = ['日', '月', '火', '水', '木', '金', '土'];
    const _fmtCache = Object.create(null);
    function fmtDate(d) {
      if (!d) return '';
      if (_fmtCache[d]) return _fmtCache[d];
      const dt = new Date(d + 'T00:00:00');
      return (_fmtCache[d] = `${dt.getMonth() + 1}/${dt.getDate()}(${_DAYS[dt.getDay()]})`);
    }

    function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
  </script>
  <script src="dark.js"></script>
</body>
