<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>会議室予約・出欠管理システム</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    :root {
      --primary: #1a73e8;
      --primary-hover: #1557b0;
      --primary-light: #e8f0fe;
      --surface: #ffffff;
      --bg: #f0f4f9;
      --on-surface: #202124;
      --muted: #5f6368;
      --border: #e8eaed;
      --shadow-md: 0 1px 3px rgba(60,64,67,.12), 0 2px 8px rgba(60,64,67,.10);
      --shadow-hover: 0 2px 6px rgba(60,64,67,.16), 0 4px 16px rgba(60,64,67,.14);
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--on-surface);
      display: flex;
      flex-direction: column;
    }

    /* App bar */
    .app-bar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .app-bar-icon {
      width: 32px; height: 32px;
      background: var(--primary);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .app-bar-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--on-surface);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Main content */
    main {
      flex: 1;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    /* Hero */
    .hero {
      background: var(--surface);
      border-radius: 16px;
      padding: 28px 28px 24px;
      box-shadow: var(--shadow-md);
      margin-bottom: 24px;
      animation: fadeUp .4s ease both;
    }
    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--primary-light);
      color: var(--primary);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 999px;
      margin-bottom: 12px;
    }
    .hero h1 {
      font-size: clamp(20px, 4vw, 28px);
      font-weight: 800;
      line-height: 1.25;
      color: var(--on-surface);
      margin-bottom: 8px;
    }
    .hero p {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
    }

    /* Navigation cards */
    .nav-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .nav-card {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 20px;
      background: var(--surface);
      border-radius: 14px;
      border: 1.5px solid var(--border);
      box-shadow: var(--shadow-md);
      text-decoration: none;
      color: inherit;
      transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
      animation: fadeUp .4s ease both;
    }
    .nav-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
      border-color: var(--primary);
    }
    .nav-card:nth-child(1) { animation-delay: .05s; }
    .nav-card:nth-child(2) { animation-delay: .10s; }
    .nav-card:nth-child(3) { animation-delay: .15s; }
    .nav-card:nth-child(4) { animation-delay: .20s; }

    .card-icon {
      width: 40px; height: 40px;
      background: var(--primary-light);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .card-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--primary);
    }
    .card-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--on-surface);
    }
    .card-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.55;
    }
    .card-arrow {
      margin-top: auto;
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      font-weight: 600;
      color: var(--primary);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 520px) {
      .nav-grid { grid-template-columns: 1fr; }
      .hero { padding: 20px; }
      .nav-card { padding: 16px; }
      main { padding: 20px 14px 40px; }
    }
  </style>
</head>
<body>

  <header class="app-bar">
    <div class="app-bar-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/>
      </svg>
    </div>
    <span class="app-bar-title">会議室予約・出欠管理システム</span>
  </header>

  <main>
    <section class="hero">
      <div class="hero-eyebrow">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/></svg>
        システムトップ
      </div>
      <h1>会議室予約・出欠管理システム</h1>
      <p>会議室予約と会議出欠管理を、静的フロントと Google スプレッドシートでまとめて運用できます。</p>
    </section>

    <nav class="nav-grid">
      <a href="reserve.html" class="nav-card">
        <div class="card-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="#1a73e8"><path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/></svg>
        </div>
        <div class="card-label">Reservation</div>
        <div class="card-title">予約する</div>
        <div class="card-desc">会議室・利用日・開始時間・終了時間を指定して予約します。</div>
        <div class="card-arrow">開く <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8.59 16.58L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg></div>
      </a>

      <a href="status.html" class="nav-card">
        <div class="card-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="#1a73e8"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/></svg>
        </div>
        <div class="card-label">Status</div>
        <div class="card-title">予約確認画面</div>
        <div class="card-desc">現在の予約一覧やタイムライン、キャンセル依頼を確認できます。</div>
        <div class="card-arrow">開く <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8.59 16.58L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg></div>
      </a>

      <a href="attendance.html" class="nav-card">
        <div class="card-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="#1a73e8"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
        </div>
        <div class="card-label">Attendance</div>
        <div class="card-title">出欠登録画面</div>
        <div class="card-desc">名前を選び、募集中の会議に対して出席・欠席を登録できます。</div>
        <div class="card-arrow">開く <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8.59 16.58L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg></div>
      </a>

      <a href="admin.html" class="nav-card">
        <div class="card-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="#1a73e8"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
        </div>
        <div class="card-label">Admin</div>
        <div class="card-title">管理画面</div>
        <div class="card-desc">会議管理、出欠集計、設定更新、会議室予約管理をまとめて行います。</div>
        <div class="card-arrow">開く <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8.59 16.58L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg></div>
      </a>
    </nav>
  </main>

</body>
</html>
