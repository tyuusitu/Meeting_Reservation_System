<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>出欠登録</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    .hidden { display: none !important; }

    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --primary: #1a73e8;
      --primary-hover: #1557b0;
      --primary-light: #e8f0fe;
      --surface: #ffffff;
      --bg: #f0f4f9;
      --on-surface: #202124;
      --muted: #5f6368;
      --muted-light: #9aa0a6;
      --border: #e8eaed;
      --border-focus: #1a73e8;
      --success: #137333;
      --success-bg: #e6f4ea;
      --success-border: #a8d5b5;
      --error: #c5221f;
      --error-bg: #fce8e6;
      --error-border: #f5c6c4;
      --warn-bg: #fef7e0;
      --warn-border: #fde68a;
      --warn-text: #7c4b00;
      --shadow-sm: 0 1px 2px rgba(60,64,67,.10), 0 1px 3px rgba(60,64,67,.08);
      --shadow-md: 0 1px 3px rgba(60,64,67,.12), 0 2px 8px rgba(60,64,67,.10);
    }

    body { min-height: 100vh; background: var(--bg); color: var(--on-surface); }

    /* App bar */
    .app-bar {
      position: sticky; top: 0; z-index: 20;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 56px;
      display: flex; align-items: center; gap: 12px;
    }
    .app-bar-icon {
      width: 32px; height: 32px; background: var(--primary);
      border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .app-bar-title { font-size: 16px; font-weight: 700; color: var(--on-surface); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .app-bar-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .app-bar-btn {
      height: 34px; padding: 0 14px; border-radius: 6px;
      font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s;
      text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
      border: 1px solid var(--border); background: var(--surface); color: var(--muted);
    }
    .app-bar-btn:hover { background: #f8f9fa; border-color: var(--primary); color: var(--primary); }

    /* Loading overlay */
    .loading-box {
      background: var(--surface); border-radius: 14px; padding: 28px 36px;
      box-shadow: 0 8px 30px rgba(0,0,0,.15);
      display: flex; flex-direction: column; align-items: center; gap: 14px;
    }
    .loading-spinner {
      width: 40px; height: 40px; border: 4px solid var(--border);
      border-top-color: var(--primary); border-radius: 50%;
      will-change: transform;
    }
    .loading-text { font-size: 14px; font-weight: 500; color: var(--muted); }

    /* Page layout */
    .page { max-width: 720px; margin: 0 auto; padding: 24px 16px 60px; display: flex; flex-direction: column; gap: 16px; }

    /* Cards */
    .card {
      background: var(--surface); border-radius: 14px;
      box-shadow: var(--shadow-md);
      padding: 20px 24px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .card-title { font-size: 15px; font-weight: 700; color: var(--on-surface); }

    /* Form elements */
    .form-label { display: flex; flex-direction: column; gap: 5px; font-size: 12px; font-weight: 600; color: var(--muted); }
    .form-select, .form-input, .form-textarea {
      height: 44px; border: 1.5px solid var(--border); border-radius: 8px;
      background: var(--surface); color: var(--on-surface);
      padding: 0 14px; font-size: 14px; outline: none; width: 100%;
      transition: border-color .15s, box-shadow .15s;
    }
    .form-select:focus, .form-input:focus, .form-textarea:focus {
      border-color: var(--primary); box-shadow: 0 0 0 2px rgba(26,115,232,.18);
    }
    .form-textarea { height: auto; min-height: 80px; padding: 10px 14px; resize: vertical; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* Member info chips */
    .info-chips { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .info-chip {
      background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
      padding: 10px 14px;
    }
    .info-chip-label { font-size: 11px; color: var(--muted-light); font-weight: 500; margin-bottom: 4px; }
    .info-chip-value { font-size: 14px; font-weight: 700; color: var(--on-surface); }

    /* Notice box */
    .notice-info {
      background: var(--primary-light); border: 1px solid #c5d8fb;
      border-radius: 8px; padding: 10px 14px; font-size: 12px; color: #1a56c4; line-height: 1.6;
    }
    .notice-warn {
      background: var(--warn-bg); border: 1px solid var(--warn-border);
      border-radius: 8px; padding: 10px 14px; font-size: 12px; color: var(--warn-text); line-height: 1.6;
    }

    /* Meeting card sub-elements */
    .meeting-card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; flex-wrap: wrap; }
    .meeting-meta-sub { font-size: 11px; color: var(--muted-light); }
    .meeting-form-group { display: flex; flex-direction: column; gap: 10px; }
    .meeting-card-footer { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .icon-shrink { flex-shrink: 0; }

    /* Meeting card */
    .meeting-card {
      background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px;
      padding: 18px 20px; display: flex; flex-direction: column; gap: 14px;
      transition: box-shadow .15s;
    }
    .meeting-card:hover { box-shadow: var(--shadow-md); }
    .meeting-title { font-size: 15px; font-weight: 700; color: var(--on-surface); }
    .meeting-meta { font-size: 13px; color: var(--muted); display: flex; flex-direction: column; gap: 2px; margin-top: 4px; }
    .meeting-meta-row { display: flex; align-items: center; gap: 6px; }
    .status-badge {
      display: inline-flex; align-items: center; border-radius: 999px;
      padding: 4px 12px; font-size: 11px; font-weight: 700;
    }
    .badge-open { background: var(--success-bg); color: var(--success); border: 1px solid var(--success-border); }
    .badge-closed { background: var(--error-bg); color: var(--error); border: 1px solid var(--error-border); }

    /* Registered notice */
    .registered-box {
      background: var(--success-bg); border: 1px solid var(--success-border);
      border-radius: 8px; padding: 8px 12px; font-size: 12px; color: var(--success); font-weight: 500;
    }
    .unregistered-note { font-size: 12px; color: var(--muted-light); }

    /* Radio cards */
    .radio-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .radio-card {
      border: 1.5px solid var(--border); border-radius: 10px;
      background: var(--surface); padding: 12px 16px;
      display: flex; align-items: center; gap: 10px;
      cursor: pointer; transition: all .15s;
    }
    .radio-card:has(input:checked) { border-color: var(--primary); background: var(--primary-light); }
    .radio-card input { width: 16px; height: 16px; accent-color: var(--primary); flex-shrink: 0; }
    .radio-card-absent:has(input:checked) { border-color: var(--error); background: var(--error-bg); }
    .radio-card-absent input { accent-color: var(--error); }
    .radio-card span { font-size: 14px; font-weight: 700; color: var(--on-surface); }

    /* Submit button */
    .btn-primary {
      height: 44px; padding: 0 22px;
      background: var(--primary); color: #fff; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 700; cursor: pointer; transition: background .15s;
    }
    .btn-primary:hover:not(:disabled) { background: var(--primary-hover); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .submit-hint { font-size: 12px; color: var(--muted-light); }

    /* Loading */
    .loading-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,.35); z-index: 50;
      display: none; align-items: center; justify-content: center;
    }
    .loading-overlay.visible { display: flex; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin .8s linear infinite; }

    /* Hero section */
    .hero-title { font-size: 17px; font-weight: 700; color: var(--on-surface); margin-bottom: 6px; }
    .hero-desc { font-size: 13px; color: var(--muted); line-height: 1.6; }

    /* Meeting list container */
    .meeting-list { display: flex; flex-direction: column; gap: 12px; }

    /* Message */
    .msg { border-radius: 8px; padding: 10px 14px; font-size: 13px; }
    .msg-success { background: var(--success-bg); border: 1px solid var(--success-border); color: var(--success); }
    .msg-error { background: var(--error-bg); border: 1px solid var(--error-border); color: var(--error); }

    @media (max-width: 520px) {
      .form-grid { grid-template-columns: 1fr; }
      .info-chips { grid-template-columns: repeat(3, 1fr); }
      .radio-grid { grid-template-columns: 1fr 1fr; }
      .card { padding: 16px; }
      .app-bar-title { font-size: 14px; }
    }
  </style>
</head>

<body>

  <!-- ローディングオーバーレイ -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="loading-box">
      <div class="loading-spinner spin"></div>
      <p id="loading-text" class="loading-text">処理中...</p>
    </div>
  </div>

  <!-- App bar -->
  <header class="app-bar">
    <div class="app-bar-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
        <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
      </svg>
    </div>
    <span id="system-name" class="app-bar-title">会議出欠登録</span>
    <div class="app-bar-actions">
      <a href="index.html" class="app-bar-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        ホームに戻る
      </a>
    </div>
  </header>

  <main class="page">

    <!-- 説明 -->
    <section class="card">
      <div>
        <div class="hero-title">会議出欠登録</div>
        <p class="hero-desc">部局と名前を選ぶと、現在回答受付中の会議だけを表示します。欠席する場合は理由を必ず登録してください。</p>
      </div>
    </section>

    <!-- メンバー選択 -->
    <section class="card">
      <div class="card-title">メンバー選択</div>
      <div class="form-grid">
        <label class="form-label">
          部局
          <select id="department-select" class="form-select">
            <option value="">部局を選択してください</option>
          </select>
        </label>
        <label class="form-label">
          名前
          <select id="member-select" class="form-select">
            <option value="">名前を選択してください</option>
          </select>
        </label>
      </div>
      <div class="notice-info">先に部局を選び、その部局に所属する人から回答者を選択します。内部ではメンバーIDで処理します。</div>
      <div class="info-chips">
        <div class="info-chip">
          <div class="info-chip-label">所属部局</div>
          <div class="info-chip-value" id="member-department">-</div>
        </div>
        <div class="info-chip">
          <div class="info-chip-label">学年</div>
          <div class="info-chip-value" id="member-grade">-</div>
        </div>
        <div class="info-chip">
          <div class="info-chip-label">役職</div>
          <div class="info-chip-value" id="member-role">-</div>
        </div>
      </div>
      <div id="global-message" class="hidden msg"></div>
    </section>

    <!-- 会議一覧 -->
    <section class="card">
      <div class="card-title">回答受付中の会議</div>
      <div id="meeting-list" class="meeting-list"></div>
    </section>

  </main>

  <script src="config.js"></script>
  <script>
    const CONFIG = window.APP_CONFIG;

    let appSettings = {
      systemName: '会議出欠管理システム',
      otherReasonDetailRequired: true,
      absenceDetailAlwaysRequired: false,
    };
    let members = [];
    let meetings = [];
    let attendanceResponses = [];
    let selectedDepartment = '';
    let selectedMemberId = '';

    // Loading
    function showLoading(text) {
      document.getElementById('loading-text').textContent = text || '処理中...';
      document.getElementById('loading-overlay').classList.add('visible');
    }
    function hideLoading() {
      document.getElementById('loading-overlay').classList.remove('visible');
    }

    // Init
    document.addEventListener('DOMContentLoaded', async () => {
      await Promise.all([loadPublicSettings(), loadCsvData()]);
      renderDepartments();
      renderMembers();
      renderMeetings();
      document.getElementById('department-select').addEventListener('change', onDepartmentChange);
      document.getElementById('member-select').addEventListener('change', onMemberChange);
    });

    async function loadPublicSettings() {
      try {
        const res = await fetch(`${CONFIG.GAS_API_URL}?action=get_public_settings`);
        const data = await res.json();
        if (data.ok) {
          appSettings = {
            systemName: data.systemName || appSettings.systemName,
            otherReasonDetailRequired: !!data.otherReasonDetailRequired,
            absenceDetailAlwaysRequired: !!data.absenceDetailAlwaysRequired,
          };
        }
      } catch (_) {}
      document.title = `${appSettings.systemName} - 出欠登録`;
      document.getElementById('system-name').textContent = `${appSettings.systemName} - 出欠登録`;
    }

    async function loadCsvData() {
      members = await fetchSheetCsv('members', memberMapper);
      meetings = await fetchSheetCsv('meetings', meetingMapper);
      attendanceResponses = await fetchSheetCsv('attendanceResponses', attendanceMapper);
    }

    async function fetchSheetCsv(key, mapper, bustCache = false) {
      const url = CONFIG.buildSheetCsvUrl(key, bustCache);
      if (!url) { showMessage('config.js のシート設定が不足しています。', 'error'); return []; }
      try {
        const text = CONFIG.fetchSheetCsvText ? await CONFIG.fetchSheetCsvText(key, bustCache) : await fetch(url).then((r) => r.text());
        return parseCsv(text, mapper);
      } catch (_) {
        showMessage('CSV の読み込みに失敗しました。シート公開設定と config.js のシート設定を確認してください。', 'error');
        return [];
      }
    }

    function parseCsv(text, mapper) {
      const rows = parseCsvRows(text);
      if (rows.length < 2) return [];
      const headers = rows[0];
      return rows.slice(1).filter((row) => row.some((cell) => String(cell || '').trim() !== '')).map((row) => mapper(rowToObject(headers, row))).filter(Boolean);
    }

    function parseCsvRows(text) {
      const rows = []; let row = [], value = '', inQuotes = false;
      for (let i = 0; i < text.length; i += 1) {
        const char = text[i];
        if (char === '"') { if (inQuotes && text[i + 1] === '"') { value += '"'; i += 1; } else { inQuotes = !inQuotes; } }
        else if (char === ',' && !inQuotes) { row.push(value); value = ''; }
        else if ((char === '\n' || char === '\r') && !inQuotes) { if (char === '\r' && text[i + 1] === '\n') i += 1; row.push(value); rows.push(row); row = []; value = ''; }
        else { value += char; }
      }
      if (value.length || row.length) { row.push(value); rows.push(row); }
      return rows;
    }

    function rowToObject(headers, row) {
      const obj = {};
      headers.forEach((header, index) => { obj[String(header || '').trim()] = String(row[index] || '').trim(); });
      return obj;
    }

    function memberMapper(row) {
      if (!row['メンバーID']) return null;
      return { memberId: row['メンバーID'], name: row['名前'], department: row['部局'], grade: row['学年'], role: row['役職'], displayOrder: Number(row['表示順'] || 0), status: row['有効状態'] };
    }

    function meetingMapper(row) {
      if (!row['会議ID']) return null;
      return { meetingId: row['会議ID'], meetingName: row['会議名'], meetingDate: normalizeDate(row['会議日']), startTime: normalizeTime(row['開始時間']), endTime: normalizeTime(row['終了時間']), recruitStartAt: normalizeDateTime(row['募集開始日時']), recruitEndAt: normalizeDateTime(row['募集終了日時']), answerDeadlineAt: normalizeDateTime(row['回答締切日時']), note: row['備考'], status: row['有効状態'] };
    }

    function attendanceMapper(row) {
      if (!row['回答ID']) return null;
      return { answerId: row['回答ID'], meetingId: row['会議ID'], memberId: row['メンバーID'], attendance: row['出欠'], absenceReason: row['欠席理由'], absenceDetail: row['欠席理由詳細'], answeredAt: row['回答日時'], updatedAt: row['更新日時'] };
    }

    // Render
    function renderDepartments() {
      const select = document.getElementById('department-select');
      const departments = Array.from(new Set(members.filter((m) => m.status === '有効').map((m) => m.department).filter(Boolean))).sort((a, b) => a.localeCompare(b, 'ja'));
      if (selectedDepartment && !departments.includes(selectedDepartment)) selectedDepartment = '';
      select.innerHTML = '<option value="">部局を選択してください</option>' + departments.map((d) => `<option value="${escapeHtml(d)}">${escapeHtml(d)}</option>`).join('');
      select.value = selectedDepartment;
    }

    function renderMembers() {
      const select = document.getElementById('member-select');
      const activeMembers = members.filter((m) => m.status === '有効').filter((m) => !selectedDepartment || m.department === selectedDepartment).sort((a, b) => a.displayOrder - b.displayOrder || a.name.localeCompare(b.name, 'ja'));
      if (!activeMembers.some((m) => m.memberId === selectedMemberId)) selectedMemberId = '';
      select.innerHTML = '<option value="">名前を選択してください</option>' + activeMembers.map((m) => `<option value="${escapeHtml(m.memberId)}">${escapeHtml(m.name)}</option>`).join('');
      select.value = selectedMemberId;
      updateSelectedMemberInfo();
    }

    function onDepartmentChange() {
      selectedDepartment = document.getElementById('department-select').value;
      selectedMemberId = '';
      renderMembers();
      renderMeetings();
    }

    function onMemberChange() {
      selectedMemberId = document.getElementById('member-select').value;
      updateSelectedMemberInfo();
      renderMeetings();
    }

    function updateSelectedMemberInfo() {
      const member = members.find((item) => item.memberId === selectedMemberId);
      document.getElementById('member-department').textContent = member ? member.department || '-' : '-';
      document.getElementById('member-grade').textContent = member ? member.grade || '-' : '-';
      document.getElementById('member-role').textContent = member ? member.role || '-' : '-';
    }

    function renderMeetings() {
      const container = document.getElementById('meeting-list');
      const openMeetings = meetings.filter((m) => m.status === '有効' && isOpenRecruitment(m)).sort((a, b) => `${a.meetingDate}${a.startTime}`.localeCompare(`${b.meetingDate}${b.startTime}`));

      if (!selectedMemberId) {
        container.innerHTML = `<div class="notice-warn">${selectedDepartment ? '回答する人を選択してください。' : '先に部局を選択してください。'}</div>`;
        return;
      }
      if (openMeetings.length === 0) {
        container.innerHTML = `<div class="notice-warn">現在回答受付中の会議はありません。</div>`;
        return;
      }

      container.innerHTML = openMeetings.map((meeting) => {
        const existing = attendanceResponses.find((r) => r.meetingId === meeting.meetingId && r.memberId === selectedMemberId);
        const editable = isBeforeDeadline(meeting.answerDeadlineAt);
        return `
          <article class="meeting-card">
            <div class="meeting-card-header">
              <div>
                <div class="meeting-title">${escapeHtml(meeting.meetingName)}</div>
                <div class="meeting-meta">
                  <span class="meeting-meta-row">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" class="icon-shrink"><path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/></svg>
                    ${formatDateLabel(meeting.meetingDate)} ${escapeHtml(meeting.startTime)}〜${escapeHtml(meeting.endTime)}
                  </span>
                  <span class="meeting-meta-sub">募集終了: ${escapeHtml(formatDateTimeLabel(meeting.recruitEndAt))} / 回答締切: ${escapeHtml(formatDateTimeLabel(meeting.answerDeadlineAt))}</span>
                </div>
              </div>
              <span class="status-badge ${editable ? 'badge-open' : 'badge-closed'}">${editable ? '回答可能' : '締切後'}</span>
            </div>
            ${meeting.note ? `<div class="notice-warn">${escapeHtml(meeting.note)}</div>` : ''}
            ${existing
              ? `<div class="registered-box">登録済み: <strong>${escapeHtml(existing.attendance)}</strong>${existing.updatedAt ? ` &nbsp;|&nbsp; 更新日時: ${escapeHtml(formatDateTimeLabel(existing.updatedAt))}` : ''}</div>`
              : `<div class="unregistered-note">未提出です。集計上は出席扱いですが、欠席する場合は理由を登録してください。</div>`
            }
            <div class="meeting-form-group">
              <div class="radio-grid">
                <label class="radio-card">
                  <input type="radio" name="attendance-${escapeHtml(meeting.meetingId)}" value="出席"
                    ${existing && existing.attendance === '出席' ? 'checked' : ''} ${!existing ? 'checked' : ''} ${!editable ? 'disabled' : ''}>
                  <span>出席</span>
                </label>
                <label class="radio-card radio-card-absent">
                  <input type="radio" name="attendance-${escapeHtml(meeting.meetingId)}" value="欠席"
                    ${existing && existing.attendance === '欠席' ? 'checked' : ''} ${!editable ? 'disabled' : ''}>
                  <span>欠席</span>
                </label>
              </div>
              <label class="form-label">
                欠席理由
                <select id="reason-${escapeHtml(meeting.meetingId)}" ${!editable ? 'disabled' : ''} class="form-select">
                  <option value="">欠席しない場合は未選択のままで構いません</option>
                  ${CONFIG.ABSENCE_REASONS.map((reason) => `<option value="${escapeHtml(reason)}" ${existing && existing.absenceReason === reason ? 'selected' : ''}>${escapeHtml(reason)}</option>`).join('')}
                </select>
              </label>
              <label class="form-label">
                欠席理由の詳細
                <textarea id="detail-${escapeHtml(meeting.meetingId)}" placeholder="必要な場合のみ入力してください。" ${!editable ? 'disabled' : ''} class="form-textarea">${existing ? escapeHtml(existing.absenceDetail) : ''}</textarea>
              </label>
            </div>
            <div class="meeting-card-footer">
              <button type="button" class="btn-primary" ${!editable ? 'disabled' : ''} onclick="submitAttendance('${escapeJs(meeting.meetingId)}')">この会議の回答を保存</button>
              <span class="submit-hint">${editable ? '締切までは上書き更新できます。' : '締切後は管理者による直接修正のみです。'}</span>
            </div>
          </article>
        `;
      }).join('');
    }

    // Submit
    async function submitAttendance(meetingId) {
      const member = members.find((item) => item.memberId === selectedMemberId);
      if (!member) { showMessage('名前を選択してください。', 'error'); return; }
      const attendance = getRadioValue(`attendance-${meetingId}`);
      const absenceReason = document.getElementById(`reason-${meetingId}`).value.trim();
      const absenceDetail = document.getElementById(`detail-${meetingId}`).value.trim();
      if (attendance === '欠席') {
        if (!absenceReason) { showMessage('欠席理由を選択してください。', 'error'); return; }
        if (absenceReason === 'その他' && appSettings.otherReasonDetailRequired && !absenceDetail) { showMessage('その他を選んだ場合は詳細理由を入力してください。', 'error'); return; }
        if (appSettings.absenceDetailAlwaysRequired && !absenceDetail) { showMessage('欠席理由の詳細を入力してください。', 'error'); return; }
      }
      showLoading('回答を保存中...');
      try {
        const res = await fetch(CONFIG.GAS_API_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ action: 'submitAttendance', payload: { meetingId, memberId: selectedMemberId, attendance, absenceReason, absenceDetail } }) });
        const data = await res.json();
        if (!data.ok) { showMessage(data.error || '登録に失敗しました。', 'error'); hideLoading(); return; }
        upsertAttendanceResponse({ answerId: data.answerId, meetingId: data.meetingId, memberId: data.memberId, name: member.name, department: member.department, grade: member.grade, role: member.role, attendance: data.attendance, absenceReason: data.absenceReason, absenceDetail: data.absenceDetail, answeredAt: data.answeredAt, updatedAt: data.updatedAt, updateCount: data.updateCount });
        renderMeetings();
        showMessage(`${member.name} さんの回答を保存しました。`, 'success');
      } catch (_) { showMessage('通信エラーが発生しました。', 'error'); }
      hideLoading();
    }

    function upsertAttendanceResponse(response) {
      const r = response || {};
      const index = attendanceResponses.findIndex((item) => item.meetingId === r.meetingId && item.memberId === r.memberId);
      if (index === -1) { attendanceResponses.push(r); return; }
      attendanceResponses[index] = r;
    }

    // Utils
    function getRadioValue(name) {
      const checked = document.querySelector(`input[name="${name}"]:checked`);
      return checked ? checked.value : '出席';
    }

    function isOpenRecruitment(meeting) {
      const now = new Date();
      const start = new Date(meeting.recruitStartAt);
      const end = new Date(meeting.recruitEndAt);
      return !Number.isNaN(start.getTime()) && !Number.isNaN(end.getTime()) && start <= now && now <= end;
    }

    function isBeforeDeadline(value) {
      const deadline = new Date(value);
      return !Number.isNaN(deadline.getTime()) && new Date() <= deadline;
    }

    function normalizeDate(value) { return String(value || '').replace(/\//g, '-').slice(0, 10); }
    function normalizeTime(value) { const match = String(value || '').trim().match(/^(\d{1,2}):(\d{1,2})/); return match ? `${String(match[1]).padStart(2, '0')}:${String(match[2]).padStart(2, '0')}` : String(value || '').trim(); }
    function normalizeDateTime(value) { return String(value || '').trim().replace(/\//g, '-').replace(' ', 'T'); }

    function formatDateLabel(value) {
      const date = new Date(`${value}T00:00:00`);
      if (Number.isNaN(date.getTime())) return value;
      const days = ['日', '月', '火', '水', '木', '金', '土'];
      return `${date.getMonth() + 1}/${date.getDate()}(${days[date.getDay()]})`;
    }

    function formatDateTimeLabel(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      const days = ['日', '月', '火', '水', '木', '金', '土'];
      return `${date.getFullYear()}/${date.getMonth() + 1}/${date.getDate()}(${days[date.getDay()]}) ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
    }

    function showMessage(text, type) {
      const el = document.getElementById('global-message');
      el.className = `msg ${type === 'error' ? 'msg-error' : 'msg-success'}`;
      el.textContent = text;
      el.classList.remove('hidden');
      window.clearTimeout(showMessage.timer);
      showMessage.timer = window.setTimeout(() => el.classList.add('hidden'), 5000);
    }

    function escapeHtml(text) { return String(text || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
    function escapeJs(text) { return String(text || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'"); }
  </script>
</body>
</html>
