<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>出欠登録</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .hidden { display: none !important; }
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: radial-gradient(circle at top left, rgba(29,111,214,.10), transparent 30%), linear-gradient(180deg,#f8faff 0%,#eef3fa 100%); }
  </style>
</head>

<body class="min-h-screen text-gray-800">

  <!-- ローディングオーバーレイ -->
  <div id="loading-overlay" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center">
    <div class="bg-white rounded-2xl px-8 py-6 flex flex-col items-center gap-3 shadow-2xl">
      <div class="w-10 h-10 border-4 border-blue-100 border-t-blue-600 rounded-full animate-spin"></div>
      <p id="loading-text" class="text-sm text-gray-600 font-semibold">処理中...</p>
    </div>
  </div>

  <main class="max-w-3xl mx-auto px-4 py-6 pb-16 flex flex-col gap-5">

    <!-- ヒーロー -->
    <section class="bg-white/90 border border-slate-200 rounded-2xl shadow-md p-5 sm:p-6 flex flex-col gap-3">
      <h1 id="system-name" class="text-2xl sm:text-3xl font-black text-gray-900 leading-tight">会議出欠登録</h1>
      <p class="text-sm text-gray-500 leading-relaxed">部局と名前を選ぶと、現在回答受付中の会議だけを表示します。欠席する場合は理由を必ず登録してください。</p>
      <div class="flex gap-2 flex-wrap">
        <a href="index.html" class="inline-flex items-center justify-center min-h-[44px] px-4 bg-white border border-blue-500 text-blue-600 hover:bg-blue-50 rounded-xl font-bold text-sm transition">トップへ戻る</a>
        <a href="admin.html" class="inline-flex items-center justify-center min-h-[44px] px-4 bg-white border border-slate-200 text-gray-500 hover:bg-slate-50 rounded-xl font-bold text-sm transition">管理画面</a>
      </div>
    </section>

    <!-- メンバー選択 -->
    <section class="bg-white/90 border border-slate-200 rounded-2xl shadow-md p-5 sm:p-6 flex flex-col gap-4">
      <div class="font-extrabold text-gray-900 text-lg">メンバー選択</div>
      <div class="grid sm:grid-cols-2 gap-4">
        <label class="flex flex-col gap-1 text-xs font-semibold text-gray-500">
          部局
          <select id="department-select"
            class="min-h-[46px] border border-slate-200 rounded-xl bg-white text-gray-900 px-3 py-2.5 text-sm font-normal focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition w-full">
            <option value="">部局を選択してください</option>
          </select>
        </label>
        <label class="flex flex-col gap-1 text-xs font-semibold text-gray-500">
          名前
          <select id="member-select"
            class="min-h-[46px] border border-slate-200 rounded-xl bg-white text-gray-900 px-3 py-2.5 text-sm font-normal focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition w-full">
            <option value="">名前を選択してください</option>
          </select>
        </label>
      </div>
      <div class="bg-amber-50 border border-amber-200 rounded-xl px-3 py-2.5 text-xs text-amber-700 leading-relaxed flex items-start">
        先に部局を選び、その部局に所属する人から回答者を選択します。内部ではメンバーIDで処理します。
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
        <div class="border border-slate-200 rounded-xl p-3 bg-white">
          <div class="text-xs text-gray-400 mb-1">所属部局</div>
          <div class="font-extrabold text-gray-900 text-sm" id="member-department">-</div>
        </div>
        <div class="border border-slate-200 rounded-xl p-3 bg-white">
          <div class="text-xs text-gray-400 mb-1">学年</div>
          <div class="font-extrabold text-gray-900 text-sm" id="member-grade">-</div>
        </div>
        <div class="border border-slate-200 rounded-xl p-3 bg-white">
          <div class="text-xs text-gray-400 mb-1">役職</div>
          <div class="font-extrabold text-gray-900 text-sm" id="member-role">-</div>
        </div>
      </div>
      <div id="global-message" class="hidden rounded-xl px-4 py-3 text-sm"></div>
    </section>

    <!-- 会議一覧 -->
    <section class="bg-white/90 border border-slate-200 rounded-2xl shadow-md p-5 sm:p-6 flex flex-col gap-4">
      <div class="font-extrabold text-gray-900 text-lg">回答受付中の会議</div>
      <div id="meeting-list" class="flex flex-col gap-4"></div>
    </section>

  </main>

  <script src="config.js"></script>
  <script>
    const CONFIG = window.APP_CONFIG;

    /** @type {Object} 公開設定。 */
    let appSettings = {
      systemName: '会議出欠管理システム',
      otherReasonDetailRequired: true,
      absenceDetailAlwaysRequired: false,
    };
    /** @type {Array<Object>} メンバー一覧。 */
    let members = [];
    /** @type {Array<Object>} 会議一覧。 */
    let meetings = [];
    /** @type {Array<Object>} 出欠回答一覧。 */
    let attendanceResponses = [];
    /** @type {string} 選択中の部局名。 */
    let selectedDepartment = '';
    /** @type {string} 選択中のメンバーID。 */
    let selectedMemberId = '';

    // ============================================================
    // ローディング
    // ============================================================
    /**
     * ローディング表示を切り替えます。
     *
     * @param {string} text 表示文言。
     * @return {void}
     */
    function showLoading(text) {
      document.getElementById('loading-text').textContent = text || '処理中...';
      document.getElementById('loading-overlay').classList.remove('hidden');
    }

    /**
     * ローディング表示を閉じます。
     *
     * @return {void}
     */
    function hideLoading() {
      document.getElementById('loading-overlay').classList.add('hidden');
    }

    // ============================================================
    // 初期化
    // ============================================================
    document.addEventListener('DOMContentLoaded', async () => {
      await Promise.all([loadPublicSettings(), loadCsvData()]);
      renderDepartments();
      renderMembers();
      renderMeetings();
      document.getElementById('department-select').addEventListener('change', onDepartmentChange);
      document.getElementById('member-select').addEventListener('change', onMemberChange);
    });

    /**
     * 公開設定を読み込みます。
     *
     * @return {Promise<void>} 完了Promise。
     */
    async function loadPublicSettings() {
      try {
        const res = await fetch(`${CONFIG.GAS_API_URL}?action=get_public_settings`);
        const data = await res.json();
        if (data.ok) {
          appSettings = {
            systemName: data.systemName || appSettings.systemName,
            otherReasonDetailRequired: !!data.otherReasonDetailRequired,
            absenceDetailAlwaysRequired: !!data.absenceDetailAlwaysRequired,
          };
        }
      } catch (_) {
      }
      document.title = `${appSettings.systemName} - 出欠登録`;
      document.getElementById('system-name').textContent = `${appSettings.systemName} - 出欠登録`;
    }

    /**
     * CSV データをまとめて読み込みます。
     *
     * @return {Promise<void>} 完了Promise。
     */
    async function loadCsvData() {
      members = await fetchSheetCsv('members', memberMapper);
      meetings = await fetchSheetCsv('meetings', meetingMapper);
      attendanceResponses = await fetchSheetCsv('attendanceResponses', attendanceMapper);
    }

    /**
     * 指定シートの CSV を取得して変換します。
     *
     * @param {string} key シートキー。
     * @param {Function} mapper 1行変換関数。
     * @param {boolean} bustCache キャッシュ破棄有無。
     * @return {Promise<Array<Object>>} 変換後配列。
     */
    async function fetchSheetCsv(key, mapper, bustCache = false) {
      const url = CONFIG.buildSheetCsvUrl(key, bustCache);
      if (!url) {
        showMessage('config.js のシート設定が不足しています。', 'error');
        return [];
      }
      try {
        const text = CONFIG.fetchSheetCsvText ? await CONFIG.fetchSheetCsvText(key, bustCache) : await fetch(url).then((res) => res.text());
        return parseCsv(text, mapper);
      } catch (_) {
        showMessage('CSV の読み込みに失敗しました。シート公開設定と config.js のシート設定を確認してください。', 'error');
        return [];
      }
    }

    /**
     * CSV テキストをオブジェクト配列へ変換します。
     *
     * @param {string} text CSV文字列。
     * @param {Function} mapper 1行変換関数。
     * @return {Array<Object>} 変換後配列。
     */
    function parseCsv(text, mapper) {
      const rows = parseCsvRows(text);
      if (rows.length < 2) return [];
      const headers = rows[0];
      return rows.slice(1)
        .filter((row) => row.some((cell) => String(cell || '').trim() !== ''))
        .map((row) => mapper(rowToObject(headers, row)))
        .filter(Boolean);
    }

    /**
     * CSV 文字列を二次元配列へ変換します。
     *
     * @param {string} text CSV文字列。
     * @return {Array<Array<string>>} 行列データ。
     */
    function parseCsvRows(text) {
      const rows = [];
      let row = [];
      let value = '';
      let inQuotes = false;
      for (let i = 0; i < text.length; i += 1) {
        const char = text[i];
        if (char === '"') {
          if (inQuotes && text[i + 1] === '"') {
            value += '"';
            i += 1;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === ',' && !inQuotes) {
          row.push(value);
          value = '';
        } else if ((char === '\n' || char === '\r') && !inQuotes) {
          if (char === '\r' && text[i + 1] === '\n') i += 1;
          row.push(value);
          rows.push(row);
          row = [];
          value = '';
        } else {
          value += char;
        }
      }
      if (value.length || row.length) {
        row.push(value);
        rows.push(row);
      }
      return rows;
    }

    /**
     * ヘッダー配列と値配列から行オブジェクトを作ります。
     *
     * @param {Array<string>} headers ヘッダー一覧。
     * @param {Array<string>} row 値一覧。
     * @return {Object} 行オブジェクト。
     */
    function rowToObject(headers, row) {
      const obj = {};
      headers.forEach((header, index) => {
        obj[String(header || '').trim()] = String(row[index] || '').trim();
      });
      return obj;
    }

    /**
     * メンバーCSV行を変換します。
     *
     * @param {Object} row CSV行。
     * @return {Object|null} メンバー情報。
     */
    function memberMapper(row) {
      if (!row['メンバーID']) return null;
      return {
        memberId: row['メンバーID'],
        name: row['名前'],
        department: row['部局'],
        grade: row['学年'],
        role: row['役職'],
        displayOrder: Number(row['表示順'] || 0),
        status: row['有効状態'],
      };
    }

    /**
     * 会議CSV行を変換します。
     *
     * @param {Object} row CSV行。
     * @return {Object|null} 会議情報。
     */
    function meetingMapper(row) {
      if (!row['会議ID']) return null;
      return {
        meetingId: row['会議ID'],
        meetingName: row['会議名'],
        meetingDate: normalizeDate(row['会議日']),
        startTime: normalizeTime(row['開始時間']),
        endTime: normalizeTime(row['終了時間']),
        recruitStartAt: normalizeDateTime(row['募集開始日時']),
        recruitEndAt: normalizeDateTime(row['募集終了日時']),
        answerDeadlineAt: normalizeDateTime(row['回答締切日時']),
        note: row['備考'],
        status: row['有効状態'],
      };
    }

    /**
     * 出欠CSV行を変換します。
     *
     * @param {Object} row CSV行。
     * @return {Object|null} 出欠情報。
     */
    function attendanceMapper(row) {
      if (!row['回答ID']) return null;
      return {
        answerId: row['回答ID'],
        meetingId: row['会議ID'],
        memberId: row['メンバーID'],
        attendance: row['出欠'],
        absenceReason: row['欠席理由'],
        absenceDetail: row['欠席理由詳細'],
        answeredAt: row['回答日時'],
        updatedAt: row['更新日時'],
      };
    }

    // ============================================================
    // 描画
    // ============================================================
    /**
     * 部局選択肢を描画します。
     *
     * @return {void}
     */
    function renderDepartments() {
      const select = document.getElementById('department-select');
      const departments = Array.from(new Set(
        members
          .filter((member) => member.status === '有効')
          .map((member) => member.department)
          .filter(Boolean)
      )).sort((a, b) => a.localeCompare(b, 'ja'));
      if (selectedDepartment && !departments.includes(selectedDepartment)) {
        selectedDepartment = '';
      }
      select.innerHTML = '<option value="">部局を選択してください</option>' + departments.map((department) => `<option value="${escapeHtml(department)}">${escapeHtml(department)}</option>`).join('');
      select.value = selectedDepartment;
    }

    /**
     * メンバー選択肢を描画します。
     *
     * @return {void}
     */
    function renderMembers() {
      const select = document.getElementById('member-select');
      const activeMembers = members
        .filter((member) => member.status === '有効')
        .filter((member) => !selectedDepartment || member.department === selectedDepartment)
        .sort((a, b) => a.displayOrder - b.displayOrder || a.name.localeCompare(b.name, 'ja'));
      if (!activeMembers.some((member) => member.memberId === selectedMemberId)) {
        selectedMemberId = '';
      }
      select.innerHTML = '<option value="">名前を選択してください</option>' + activeMembers.map((member) => `<option value="${escapeHtml(member.memberId)}">${escapeHtml(member.name)}</option>`).join('');
      select.value = selectedMemberId;
      updateSelectedMemberInfo();
    }

    /**
     * 部局変更時にメンバー一覧と会議一覧を更新します。
     *
     * @return {void}
     */
    function onDepartmentChange() {
      selectedDepartment = document.getElementById('department-select').value;
      selectedMemberId = '';
      renderMembers();
      renderMeetings();
    }

    /**
     * メンバー変更時に会議一覧を更新します。
     *
     * @return {void}
     */
    function onMemberChange() {
      selectedMemberId = document.getElementById('member-select').value;
      updateSelectedMemberInfo();
      renderMeetings();
    }

    /**
     * 選択中メンバーの詳細表示を更新します。
     *
     * @return {void}
     */
    function updateSelectedMemberInfo() {
      const member = members.find((item) => item.memberId === selectedMemberId);
      document.getElementById('member-department').textContent = member ? member.department || '-' : '-';
      document.getElementById('member-grade').textContent = member ? member.grade || '-' : '-';
      document.getElementById('member-role').textContent = member ? member.role || '-' : '-';
    }

    /**
     * 会議一覧を描画します。
     *
     * @return {void}
     */
    function renderMeetings() {
      const container = document.getElementById('meeting-list');
      const openMeetings = meetings
        .filter((meeting) => meeting.status === '有効' && isOpenRecruitment(meeting))
        .sort((a, b) => `${a.meetingDate}${a.startTime}`.localeCompare(`${b.meetingDate}${b.startTime}`));

      if (!selectedMemberId) {
        container.innerHTML = `<div class="bg-amber-50 border border-amber-200 rounded-xl px-4 py-3 text-sm text-amber-700">${selectedDepartment ? '回答する人を選択してください。' : '先に部局を選択してください。'}</div>`;
        return;
      }
      if (openMeetings.length === 0) {
        container.innerHTML = `<div class="bg-amber-50 border border-amber-200 rounded-xl px-4 py-3 text-sm text-amber-700">現在回答受付中の会議はありません。</div>`;
        return;
      }

      const inputCls = 'min-h-[46px] border border-slate-200 rounded-xl bg-white text-gray-900 px-3 py-2.5 text-sm font-normal focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition w-full';

      container.innerHTML = openMeetings.map((meeting) => {
        const existing = attendanceResponses.find((response) => response.meetingId === meeting.meetingId && response.memberId === selectedMemberId);
        const editable = isBeforeDeadline(meeting.answerDeadlineAt);
        return `
          <article class="bg-white/90 border border-slate-200 rounded-2xl shadow-sm p-4 sm:p-5 flex flex-col gap-4">
            <div class="flex justify-between gap-3 flex-wrap items-start">
              <div class="flex flex-col gap-1">
                <div class="font-extrabold text-gray-900 text-base">${escapeHtml(meeting.meetingName)}</div>
                <div class="text-sm text-gray-500">${formatDateLabel(meeting.meetingDate)} ${escapeHtml(meeting.startTime)}〜${escapeHtml(meeting.endTime)}</div>
                <div class="text-xs text-gray-400">募集終了: ${escapeHtml(formatDateTimeLabel(meeting.recruitEndAt))}</div>
                <div class="text-xs text-gray-400">回答締切: ${escapeHtml(formatDateTimeLabel(meeting.answerDeadlineAt))}</div>
              </div>
              <span class="inline-flex items-center rounded-full px-3 py-1 text-xs font-extrabold ${editable ? 'bg-emerald-50 text-emerald-700' : 'bg-red-50 text-red-600'}">${editable ? '回答可能' : '締切後'}</span>
            </div>
            ${meeting.note ? `<div class="bg-amber-50 border border-amber-200 rounded-xl px-3 py-2.5 text-xs text-amber-700 leading-relaxed">${escapeHtml(meeting.note)}</div>` : ''}
            ${existing
              ? `<div class="bg-amber-50 border border-amber-200 rounded-xl px-3 py-2.5 text-xs text-amber-700">登録済み: ${escapeHtml(existing.attendance)}${existing.updatedAt ? ` / 更新日時 ${escapeHtml(formatDateTimeLabel(existing.updatedAt))}` : ''}</div>`
              : `<div class="text-xs text-gray-400">未提出です。集計上は出席扱いですが、欠席する場合は理由を登録してください。</div>`
            }
            <div class="flex flex-col gap-3">
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
                <label class="min-w-0 border border-slate-200 rounded-xl bg-white px-4 py-3 flex items-center gap-2.5 cursor-pointer has-[:checked]:bg-blue-50 has-[:checked]:border-blue-400 transition">
                  <input type="radio" name="attendance-${escapeHtml(meeting.meetingId)}" value="出席"
                    ${existing && existing.attendance === '出席' ? 'checked' : ''} ${!existing ? 'checked' : ''} ${!editable ? 'disabled' : ''}
                    class="w-4 h-4 accent-blue-600">
                  <span class="text-sm font-bold text-gray-700">出席</span>
                </label>
                <label class="min-w-0 border border-slate-200 rounded-xl bg-white px-4 py-3 flex items-center gap-2.5 cursor-pointer has-[:checked]:bg-red-50 has-[:checked]:border-red-400 transition">
                  <input type="radio" name="attendance-${escapeHtml(meeting.meetingId)}" value="欠席"
                    ${existing && existing.attendance === '欠席' ? 'checked' : ''} ${!editable ? 'disabled' : ''}
                    class="w-4 h-4 accent-red-500">
                  <span class="text-sm font-bold text-gray-700">欠席</span>
                </label>
              </div>
              <label class="flex flex-col gap-1 text-xs font-semibold text-gray-500">
                欠席理由
                <select id="reason-${escapeHtml(meeting.meetingId)}" ${!editable ? 'disabled' : ''} class="${inputCls}">
                  <option value="">欠席しない場合は未選択のままで構いません</option>
                  ${CONFIG.ABSENCE_REASONS.map((reason) => `<option value="${escapeHtml(reason)}" ${existing && existing.absenceReason === reason ? 'selected' : ''}>${escapeHtml(reason)}</option>`).join('')}
                </select>
              </label>
              <label class="flex flex-col gap-1 text-xs font-semibold text-gray-500">
                欠席理由の詳細
                <textarea id="detail-${escapeHtml(meeting.meetingId)}" placeholder="必要な場合のみ入力してください。" ${!editable ? 'disabled' : ''}
                  class="min-h-[80px] border border-slate-200 rounded-xl bg-white text-gray-900 px-3 py-2.5 text-sm font-normal focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition resize-vertical w-full">${existing ? escapeHtml(existing.absenceDetail) : ''}</textarea>
              </label>
            </div>
            <div class="flex items-center gap-3 flex-wrap">
              <button type="button" class="min-h-[46px] px-5 bg-blue-600 hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed text-white rounded-xl font-bold text-sm transition shadow-sm"
                ${!editable ? 'disabled' : ''} onclick="submitAttendance('${escapeJs(meeting.meetingId)}')">この会議の回答を保存</button>
              <span class="text-xs text-gray-400">${editable ? '締切までは上書き更新できます。' : '締切後は管理者による直接修正のみです。'}</span>
            </div>
          </article>
        `;
      }).join('');
    }

    // ============================================================
    // 出欠送信
    // ============================================================
    /**
     * 出欠回答を送信します。
     *
     * @param {string} meetingId 会議ID。
     * @return {Promise<void>} 完了Promise。
     */
    async function submitAttendance(meetingId) {
      const member = members.find((item) => item.memberId === selectedMemberId);
      if (!member) {
        showMessage('名前を選択してください。', 'error');
        return;
      }
      const attendance = getRadioValue(`attendance-${meetingId}`);
      const absenceReason = document.getElementById(`reason-${meetingId}`).value.trim();
      const absenceDetail = document.getElementById(`detail-${meetingId}`).value.trim();

      if (attendance === '欠席') {
        if (!absenceReason) {
          showMessage('欠席理由を選択してください。', 'error');
          return;
        }
        if (absenceReason === 'その他' && appSettings.otherReasonDetailRequired && !absenceDetail) {
          showMessage('その他を選んだ場合は詳細理由を入力してください。', 'error');
          return;
        }
        if (appSettings.absenceDetailAlwaysRequired && !absenceDetail) {
          showMessage('欠席理由の詳細を入力してください。', 'error');
          return;
        }
      }

      showLoading('回答を保存中...');
      try {
        const res = await fetch(CONFIG.GAS_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({
            action: 'submitAttendance',
            payload: {
              meetingId,
              memberId: selectedMemberId,
              attendance,
              absenceReason,
              absenceDetail,
            },
          }),
        });
        const data = await res.json();
        if (!data.ok) {
          showMessage(data.error || '登録に失敗しました。', 'error');
          hideLoading();
          return;
        }
        attendanceResponses = await fetchSheetCsv('attendanceResponses', attendanceMapper, true);
        renderMeetings();
        showMessage(`${member.name} さんの回答を保存しました。`, 'success');
      } catch (_) {
        showMessage('通信エラーが発生しました。', 'error');
      }
      hideLoading();
    }

    // ============================================================
    // ユーティリティ
    // ============================================================
    /**
     * ラジオボタンの選択値を返します。
     *
     * @param {string} name ラジオグループ名。
     * @return {string} 選択値。
     */
    function getRadioValue(name) {
      const checked = document.querySelector(`input[name="${name}"]:checked`);
      return checked ? checked.value : '出席';
    }

    /**
     * 募集期間中か判定します。
     *
     * @param {Object} meeting 会議情報。
     * @return {boolean} 募集期間中かどうか。
     */
    function isOpenRecruitment(meeting) {
      const now = new Date();
      const start = new Date(meeting.recruitStartAt);
      const end = new Date(meeting.recruitEndAt);
      return !Number.isNaN(start.getTime()) && !Number.isNaN(end.getTime()) && start <= now && now <= end;
    }

    /**
     * 回答締切前か判定します。
     *
     * @param {string} value 回答締切日時。
     * @return {boolean} 締切前かどうか。
     */
    function isBeforeDeadline(value) {
      const deadline = new Date(value);
      return !Number.isNaN(deadline.getTime()) && new Date() <= deadline;
    }

    /**
     * 日付文字列を正規化します。
     *
     * @param {string} value 入力値。
     * @return {string} 正規化後文字列。
     */
    function normalizeDate(value) {
      return String(value || '').replace(/\//g, '-').slice(0, 10);
    }

    /**
     * 時刻文字列を正規化します。
     *
     * @param {string} value 入力値。
     * @return {string} 正規化後文字列。
     */
    function normalizeTime(value) {
      const match = String(value || '').trim().match(/^(\d{1,2}):(\d{1,2})/);
      return match ? `${String(match[1]).padStart(2, '0')}:${String(match[2]).padStart(2, '0')}` : String(value || '').trim();
    }

    /**
     * 日時文字列を正規化します。
     *
     * @param {string} value 入力値。
     * @return {string} 正規化後文字列。
     */
    function normalizeDateTime(value) {
      return String(value || '').trim().replace(/\//g, '-').replace(' ', 'T');
    }

    /**
     * 日付ラベルを整形します。
     *
     * @param {string} value 日付文字列。
     * @return {string} 表示用日付。
     */
    function formatDateLabel(value) {
      const date = new Date(`${value}T00:00:00`);
      if (Number.isNaN(date.getTime())) return value;
      const days = ['日', '月', '火', '水', '木', '金', '土'];
      return `${date.getMonth() + 1}/${date.getDate()}(${days[date.getDay()]})`;
    }

    /**
     * 日時ラベルを整形します。
     *
     * @param {string} value 日時文字列。
     * @return {string} 表示用日時。
     */
    function formatDateTimeLabel(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      const days = ['日', '月', '火', '水', '木', '金', '土'];
      return `${date.getFullYear()}/${date.getMonth() + 1}/${date.getDate()}(${days[date.getDay()]}) ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
    }

    /**
     * メッセージを表示します。
     *
     * @param {string} text 表示文言。
     * @param {string} type 種別。
     * @return {void}
     */
    function showMessage(text, type) {
      const el = document.getElementById('global-message');
      el.className = type === 'error'
        ? 'rounded-xl px-4 py-3 text-sm bg-red-50 border border-red-200 text-red-600'
        : 'rounded-xl px-4 py-3 text-sm bg-emerald-50 border border-emerald-200 text-emerald-700';
      el.textContent = text;
      el.classList.remove('hidden');
      window.clearTimeout(showMessage.timer);
      showMessage.timer = window.setTimeout(() => el.classList.add('hidden'), 5000);
    }

    /**
     * HTML エスケープします。
     *
     * @param {string} text 入力値。
     * @return {string} エスケープ後文字列。
     */
    function escapeHtml(text) {
      return String(text || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    /**
     * JavaScript 文字列としてエスケープします。
     *
     * @param {string} text 入力値。
     * @return {string} エスケープ後文字列。
     */
    function escapeJs(text) {
      return String(text || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    }
  </script>
</body>

</html>
