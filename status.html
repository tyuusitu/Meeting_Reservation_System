<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>会議室利用状況</title>
  <style>
    :root {
      --primary: #1d6fd6;
      --primary-dark: #1559ae;
      --accent: #0f8f68;
      --danger: #c73d3d;
      --surface: #ffffff;
      --background: #f6f8fb;
      --border: #d7e0ec;
      --text: #172033;
      --muted: #647085;
      --soft-blue: #eaf2ff;
      --soft-green: #eaf8f2;
      --soft-red: #fff0f0;
      --shadow: 0 2px 12px rgba(20, 36, 64, 0.07);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      background: var(--background);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
      line-height: 1.5
    }

    button,
    input,
    select,
    textarea {
      font: inherit
    }

    button {
      min-height: 44px;
      border: 0;
      border-radius: 8px;
      padding: 10px 16px;
      cursor: pointer;
      font-weight: 700;
      transition: background .15s
    }

    button:disabled {
      opacity: .5;
      cursor: not-allowed
    }

    input,
    select,
    textarea {
      width: 100%;
      min-height: 46px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      padding: 10px 12px
    }

    label {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700
    }

    a {
      color: var(--primary)
    }

    /* layout */
    .app {
      width: min(100%, 780px);
      margin: 0 auto;
      padding: 16px
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 20;
      margin: -16px -16px 16px;
      padding: 12px 16px;
      background: rgba(246, 248, 251, .96);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border)
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px
    }

    .header-top h1 {
      font-size: 20px;
      line-height: 1.2
    }

    .header-nav {
      display: flex;
      gap: 8px;
      align-items: center
    }

    /* cards */
    .screen {
      display: grid;
      gap: 14px
    }

    .panel {
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      box-shadow: var(--shadow);
      display: grid;
      gap: 12px
    }

    /* buttons */
    .btn-primary {
      background: var(--primary);
      color: #fff;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-weight: 700
    }

    .btn-primary:hover {
      background: var(--primary-dark)
    }

    .btn-ghost {
      background: #eef3f9;
      color: var(--text)
    }

    .btn-sm {
      min-height: 36px;
      padding: 6px 12px;
      font-size: 14px
    }

    /* admin button */
    .admin-link {
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 6px
    }

    .admin-link:hover {
      color: var(--primary)
    }

    .reserve-link {
      font-size: 13px;
      color: #fff;
      text-decoration: none;
      padding: 8px 14px;
      background: var(--primary);
      border-radius: 8px;
      font-weight: 700
    }

    .reserve-link:hover {
      background: var(--primary-dark)
    }

    /* status badges */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700
    }

    .badge-active {
      background: var(--soft-green);
      color: var(--accent)
    }

    .badge-request {
      background: #fff8e1;
      color: #7a5800
    }

    /* reservation list */
    .res-list {
      display: grid;
      gap: 8px
    }

    .res-card {
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      display: grid;
      gap: 4px
    }

    .res-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap
    }

    .res-card-title {
      font-weight: 700;
      font-size: 15px
    }

    .res-card-meta {
      font-size: 13px;
      color: var(--muted)
    }

    .res-card-actions {
      display: flex;
      gap: 6px;
      margin-top: 6px;
      flex-wrap: wrap
    }

    /* timeline */
    .timeline-day {
      margin-bottom: 16px
    }

    .timeline-day-label {
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 8px;
      padding: 6px 0;
      border-bottom: 2px solid var(--primary);
      color: var(--primary)
    }

    .timeline-room {
      margin-bottom: 10px
    }

    .timeline-room-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 4px
    }

    .timeline-track {
      position: relative;
      height: 36px;
      background: #f0f4fa;
      border-radius: 6px;
      overflow: hidden
    }

    .timeline-block {
      position: absolute;
      top: 0;
      height: 100%;
      background: var(--primary);
      border-radius: 4px;
      display: flex;
      align-items: center;
      padding: 0 6px;
      font-size: 11px;
      color: #fff;
      font-weight: 700;
      overflow: hidden;
      white-space: nowrap;
      cursor: default
    }

    .timeline-block.cancel-req {
      background: #e8a000
    }

    .timeline-labels {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
      padding: 0 2px
    }

    /* filter bar */
    .filter-bar {
      display: grid;
      gap: 10px
    }

    .filter-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px
    }

    /* view toggle */
    .view-toggle {
      display: flex;
      gap: 8px
    }

    .view-btn {
      background: #fff;
      border: 1px solid var(--border);
      color: var(--muted);
      min-height: 36px;
      padding: 6px 14px;
      font-size: 13px
    }

    .view-btn.active {
      background: var(--soft-blue);
      color: var(--primary);
      border-color: var(--primary)
    }

    /* modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .45);
      z-index: 100;
      align-items: center;
      justify-content: center
    }

    .modal-overlay.open {
      display: flex
    }

    .modal {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      width: min(90%, 420px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, .18);
      display: grid;
      gap: 14px
    }

    .modal h2 {
      font-size: 18px
    }

    .loading {
      text-align: center;
      padding: 24px;
      color: var(--muted);
      font-size: 14px
    }

    .empty {
      text-align: center;
      padding: 24px;
      color: var(--muted)
    }

    .hidden {
      display: none !important
    }

    @media(max-width:480px) {
      .filter-row {
        grid-template-columns: 1fr
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <!-- HEADER -->
    <div class="header">
      <div class="header-top">
        <h1 id="system-name">会議室予約システム</h1>
        <div class="header-nav">
          <a href="index.html" class="reserve-link">メニュー</a>
          <a href="reserve.html" class="reserve-link">予約する</a>
          <a href="admin.html" class="admin-link">管理者</a>
        </div>
      </div>
    </div>

    <!-- フィルター -->
    <div class="screen">
      <div class="panel">
        <div class="filter-bar">
          <div class="filter-row">
            <label>日付
              <input type="date" id="filter-date" onchange="applyFilters()">
            </label>
            <label>会議室
              <select id="filter-room" onchange="applyFilters()">
                <option value="">すべて</option>
              </select>
            </label>
          </div>
          <div class="filter-row">
            <label>開始時間以降
              <input type="time" id="filter-start" step="300" onchange="applyFilters()">
            </label>
            <label>終了時間以前
              <input type="time" id="filter-end" step="300" onchange="applyFilters()">
            </label>
          </div>
          <div class="filter-row">
            <label>会議名
              <input type="text" id="filter-meeting" placeholder="キーワード検索" oninput="applyFilters()">
            </label>
            <label>団体名
              <input type="text" id="filter-org" placeholder="キーワード検索" oninput="applyFilters()">
            </label>
          </div>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <div class="view-toggle">
              <button class="view-btn active" id="view-list-btn" onclick="setView('list')">一覧</button>
              <button class="view-btn" id="view-timeline-btn" onclick="setView('timeline')">タイムライン</button>
            </div>
            <button class="btn-ghost btn-sm" onclick="resetFilters()">リセット</button>
            <button class="btn-ghost btn-sm" onclick="loadReservations(true)">更新</button>
          </div>
        </div>
      </div>

      <!-- 一覧表示 -->
      <div id="view-list">
        <div id="res-list-container" class="res-list">
          <div class="loading">読み込み中...</div>
        </div>
      </div>

      <!-- タイムライン表示 -->
      <div id="view-timeline" class="hidden">
        <div id="timeline-container">
          <div class="loading">読み込み中...</div>
        </div>
      </div>
    </div>

    <!-- キャンセル依頼モーダル -->
    <div class="modal-overlay" id="cancel-modal">
      <div class="modal">
        <h2>キャンセル依頼</h2>
        <p style="font-size:14px;color:var(--muted)">キャンセル依頼を送信します。管理者が確認後に削除します。</p>
        <input type="hidden" id="cancel-res-id">
        <label>理由（任意）
          <textarea id="cancel-reason" placeholder="例：都合が悪くなったため"></textarea>
        </label>
        <div style="display:flex;flex-wrap:wrap;gap:8px">
          <button class="btn-ghost" style="flex:1 1 120px" onclick="closeCancelModal()">キャンセル</button>
          <button class="btn-danger" style="flex:1 1 120px;background:var(--danger);color:#fff;border:0;border-radius:8px;padding:10px 16px;font-weight:700;cursor:pointer" onclick="submitCancelRequest()">依頼を送信</button>
        </div>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    // ============================================================
    // 設定
    // ============================================================
    const CONFIG = window.APP_CONFIG;

    // ============================================================
    // 状態
    // ============================================================
    let appConfig = null;
    let allReservations = [];
    let filteredReservations = [];
    let currentView = 'list';

    // ============================================================
    // 初期化
    // ============================================================
    document.addEventListener('DOMContentLoaded', async () => {
      applyConfig(defaultConfig());
      const today = appConfig ? appConfig.today : todayStr();
      document.getElementById('filter-date').value = today;
      applyFilters();
      Promise.allSettled([loadConfig(), loadReservations()]).then(() => {
        const resolvedToday = appConfig ? appConfig.today : todayStr();
        document.getElementById('filter-date').value = resolvedToday;
        applyFilters();
      });
    });

    /**
     * 今日の日付を yyyy-MM-dd 形式で返します。
     *
     * @return {string} 今日の日付。
     */
    function todayStr() {
      return new Date().toISOString().slice(0, 10);
    }

    // ============================================================
    // GAS から設定取得
    // ============================================================
    /**
     * GAS から表示設定と会議室一覧を読み込みます。
     *
     * @return {Promise<void>} 読み込み完了。
     */
    async function loadConfig() {
      try {
        const url = CONFIG.GAS_API_URL + '?action=get_config';
        const res = await fetch(url);
        const data = await res.json();
        if (data.ok) {
          appConfig = data;
          applyConfig(data);
        }
      } catch (e) {
        console.warn('設定の取得に失敗しました（デフォルト値を使用）', e);
        appConfig = defaultConfig();
        applyConfig(appConfig);
      }
    }

    /**
     * GAS 設定取得に失敗した場合に使う既定設定を返します。
     *
     * @return {Object} 予約確認画面の既定設定。
     */
    function defaultConfig() {
      return {
        ok: true,
        today: todayStr(),
        settings: {
          systemName: '会議室予約システム',
          businessStartTime: '09:00',
          businessEndTime: '22:00',
          spreadsheetUrl: '',
        },
        rooms: [],
      };
    }

    /**
     * 読み込んだ設定値を画面タイトル、ラベル、フィルターへ反映します。
     *
     * @param {Object} cfg GAS から取得した設定。
     */
    function applyConfig(cfg) {
      const s = cfg.settings;
      document.getElementById('system-name').textContent = s.systemName;
      document.title = s.systemName;

      const sel = document.getElementById('filter-room');
      sel.innerHTML = '<option value="">すべて</option>';
      (cfg.rooms || []).forEach(r => {
        const opt = document.createElement('option');
        opt.value = r.room_id;
        opt.textContent = r.room_name;
        sel.appendChild(opt);
      });
    }

    // ============================================================
    // スプレッドシートCSV取得
    // ============================================================
    /**
     * 予約シート CSV を読み込み、画面の予約一覧を更新します。
     *
     * @param {boolean} bustCache true の場合はキャッシュ回避します。
     * @return {Promise<void>} 読み込み完了。
     */
    async function loadReservations(bustCache = false) {
      const url = CONFIG.buildSheetCsvUrl('reservations', bustCache);
      try {
        const text = CONFIG.fetchSheetCsvText ? await CONFIG.fetchSheetCsvText('reservations', bustCache) : await fetch(url).then((res) => res.text());
        allReservations = parseCSV(text).filter(r =>
          r.reservation_id && (r.status === '有効' || r.status === 'キャンセル依頼')
        );
      } catch (e) {
        console.warn('予約データの取得に失敗しました', e);
        allReservations = [];
      }
      applyFilters();
    }

    // ============================================================
    // CSV パーサー
    // ============================================================
    const CSV_NEEDED = new Set(['予約ID', '団体名', '会議名', 'お名前', '会議室ID', '会議室名', '利用日', '開始時間', '終了時間', 'ステータス']);
    const CSV_KEY_MAP = {
      '予約ID': 'reservation_id',
      '団体名': 'organization_name', '会議名': 'meeting_name', 'お名前': 'user_name',
      '会議室ID': 'room_id', '会議室名': 'room_name', '利用日': 'usage_date',
      '開始時間': 'start_time', '終了時間': 'end_time', 'ステータス': 'status',
    };

    /**
     * 予約 CSV を画面用オブジェクト配列へ変換します。
     *
     * @param {string} text CSV 文字列。
     * @return {Array<Object>} 予約一覧。
     */
    function parseCSV(text) {
      const lines = text.trim().split('\n');
      if (lines.length < 2) return [];
      const headers = parseCSVRow(lines[0]);
      const colMap = [];
      headers.forEach((h, i) => {
        if (CSV_NEEDED.has(h)) colMap.push({ i, key: CSV_KEY_MAP[h] });
      });
      const result = [];
      for (let li = 1; li < lines.length; li++) {
        if (!lines[li].trim()) continue;
        const vals = parseCSVRow(lines[li]);
        const obj = {};
        for (let ci = 0; ci < colMap.length; ci++) {
          obj[colMap[ci].key] = (vals[colMap[ci].i] || '').trim();
        }
        if (obj.reservation_id) result.push(obj);
      }
      return result;
    }

    /**
     * CSV 1行を、クォート内カンマを考慮して列配列へ変換します。
     *
     * @param {string} line CSV 1行。
     * @return {Array<string>} 列値配列。
     */
    function parseCSVRow(line) {
      const result = [];
      let cur = '', inQ = false;
      for (let i = 0; i < line.length; i++) {
        const c = line[i];
        if (c === '"') {
          if (inQ && line[i + 1] === '"') { cur += '"'; i++; }
          else inQ = !inQ;
        } else if (c === ',' && !inQ) { result.push(cur); cur = ''; }
        else cur += c;
      }
      result.push(cur);
      return result;
    }

    // ============================================================
    // フィルター・表示
    // ============================================================
    /**
     * フィルター入力を初期化します。
     */
    function resetFilters() {
      document.getElementById('filter-date').value = appConfig ? appConfig.today : todayStr();
      document.getElementById('filter-room').value = '';
      document.getElementById('filter-start').value = '';
      document.getElementById('filter-end').value = '';
      document.getElementById('filter-meeting').value = '';
      document.getElementById('filter-org').value = '';
      applyFilters();
    }

    /**
     * フィルター条件を予約一覧へ適用し、現在表示を再描画します。
     */
    function applyFilters() {
      const date = document.getElementById('filter-date').value;
      const room = document.getElementById('filter-room').value;
      const start = document.getElementById('filter-start').value;
      const end = document.getElementById('filter-end').value;
      const meeting = document.getElementById('filter-meeting').value.toLowerCase();
      const org = document.getElementById('filter-org').value.toLowerCase();

      filteredReservations = allReservations.filter(r => {
        if (date && r.usage_date !== date) return false;
        if (room && r.room_id !== room) return false;
        if (meeting && !r.meeting_name.toLowerCase().includes(meeting)) return false;
        if (org && !r.organization_name.toLowerCase().includes(org)) return false;
        if (start && end && !timeOverlap(r.start_time, r.end_time, start, end)) return false;
        if (start && !end && toMin(r.end_time) <= toMin(start)) return false;
        if (!start && end && toMin(r.start_time) >= toMin(end)) return false;
        return true;
      });

      filteredReservations.sort((a, b) =>
        (a.usage_date + a.start_time + a.room_name).localeCompare(b.usage_date + b.start_time + b.room_name)
      );

      renderCurrentView();
    }

    /**
     * 一覧表示とタイムライン表示を切り替えます。
     *
     * @param {string} v 表示モード。
     */
    function setView(v) {
      currentView = v;
      document.getElementById('view-list-btn').classList.toggle('active', v === 'list');
      document.getElementById('view-timeline-btn').classList.toggle('active', v === 'timeline');
      document.getElementById('view-list').classList.toggle('hidden', v !== 'list');
      document.getElementById('view-timeline').classList.toggle('hidden', v !== 'timeline');
      renderCurrentView();
    }

    /**
     * 現在選択中の表示モードに合わせて一覧またはタイムラインを描画します。
     */
    function renderCurrentView() {
      if (currentView === 'list') renderList();
      else renderTimeline();
    }

    // ---- 一覧 ----
    /**
     * 予約一覧カードを描画します。
     */
    function renderList() {
      const container = document.getElementById('res-list-container');
      if (filteredReservations.length === 0) {
        container.innerHTML = '<div class="empty">該当する予約はありません</div>';
        return;
      }
      container.innerHTML = filteredReservations.map(r => {
        const dateLabel = fmtDate(r.usage_date);
        const statusBadge = r.status === '有効'
          ? '<span class="badge badge-active">有効</span>'
          : '<span class="badge badge-request">キャンセル依頼中</span>';
        const cancelBtn = r.status === '有効'
          ? `<button class="btn-ghost btn-sm" onclick="openCancelModal('${esc(r.reservation_id)}')">キャンセル依頼</button>`
          : '';
        return `
      <div class="res-card">
        <div class="res-card-header">
          <span class="res-card-title">${esc(r.meeting_name)}</span>
          ${statusBadge}
        </div>
        <div class="res-card-meta">${dateLabel}　${esc(r.start_time)}〜${esc(r.end_time)}　${esc(r.room_name)}</div>
        <div class="res-card-meta">${esc(r.organization_name)}　${esc(r.user_name)}</div>
        <div class="res-card-actions">${cancelBtn}</div>
      </div>`;
      }).join('');
    }

    // ---- タイムライン ----
    /**
     * 日付別・会議室別のタイムラインを描画します。
     */
    function renderTimeline() {
      const container = document.getElementById('timeline-container');
      const cfg = appConfig ? appConfig.settings : defaultConfig().settings;
      const startMin = toMin(cfg.businessStartTime || '09:00');
      const endMin = toMin(cfg.businessEndTime || '22:00');
      const totalMin = endMin - startMin;

      if (filteredReservations.length === 0) {
        container.innerHTML = '<div class="empty">該当する予約はありません</div>';
        return;
      }

      const days = {};
      filteredReservations.forEach(r => {
        if (!days[r.usage_date]) days[r.usage_date] = {};
        if (!days[r.usage_date][r.room_id]) days[r.usage_date][r.room_id] = { room_name: r.room_name, reservations: [] };
        days[r.usage_date][r.room_id].reservations.push(r);
      });

      const rooms = appConfig ? appConfig.rooms : [];

      let html = '';
      Object.keys(days).sort().forEach(date => {
        html += `<div class="timeline-day"><div class="timeline-day-label">${fmtDate(date)}</div>`;
        const dayRooms = days[date];
        const roomOrder = rooms.length > 0 ? rooms : Object.values(dayRooms).map(v => ({ room_id: Object.keys(dayRooms).find(k => dayRooms[k] === v), room_name: v.room_name }));
        roomOrder.forEach(room => {
          const roomData = dayRooms[room.room_id];
          if (!roomData) return;
          html += `<div class="timeline-room">
        <div class="timeline-room-label">${esc(room.room_name)}</div>
        <div class="timeline-track">`;
          roomData.reservations.forEach(r => {
            const rStart = Math.max(toMin(r.start_time), startMin);
            const rEnd = Math.min(toMin(r.end_time), endMin);
            const left = ((rStart - startMin) / totalMin * 100).toFixed(2);
            const width = ((rEnd - rStart) / totalMin * 100).toFixed(2);
            const cls = r.status === '有効' ? '' : ' cancel-req';
            html += `<div class="timeline-block${cls}" style="left:${left}%;width:${width}%" title="${esc(r.meeting_name)} ${r.start_time}〜${r.end_time}">${esc(r.meeting_name)}</div>`;
          });
          html += `</div>
        <div class="timeline-labels"><span>${cfg.businessStartTime || '09:00'}</span><span>${cfg.businessEndTime || '22:00'}</span></div>
      </div>`;
        });
        html += '</div>';
      });
      container.innerHTML = html;
    }

    // ============================================================
    // キャンセル依頼
    // ============================================================
    /**
     * キャンセル依頼モーダルを開きます。
     *
     * @param {string} reservationId 予約ID。
     */
    function openCancelModal(reservationId) {
      document.getElementById('cancel-res-id').value = reservationId;
      document.getElementById('cancel-reason').value = '';
      document.getElementById('cancel-modal').classList.add('open');
    }

    /**
     * キャンセル依頼モーダルを閉じます。
     */
    function closeCancelModal() {
      document.getElementById('cancel-modal').classList.remove('open');
    }

    /**
     * キャンセル依頼を GAS API へ送信します。
     *
     * @return {Promise<void>} 送信完了。
     */
    async function submitCancelRequest() {
      const reservationId = document.getElementById('cancel-res-id').value;
      const reason = document.getElementById('cancel-reason').value;
      const btn = document.querySelector('#cancel-modal .btn-danger');
      btn.disabled = true;
      btn.textContent = '送信中...';

      try {
        const res = await fetch(CONFIG.GAS_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'cancel_request', payload: { reservation_id: reservationId, reason } }),
        });
        const data = await res.json();
        if (data.ok) {
          closeCancelModal();
          sendLineNotification(reservationId, reason);
          await loadReservations(true);
          alert('キャンセル依頼を送信しました。管理者が確認後に対応します。');
        } else {
          alert(data.error || 'キャンセル依頼の送信に失敗しました。');
        }
      } catch (e) {
        alert('通信エラーが発生しました。');
      }
      btn.disabled = false;
      btn.textContent = '依頼を送信';
    }

    /**
     * LINE 共有 URL を開いてキャンセル依頼文を送信しやすくします。
     *
     * @param {string} reservationId 予約ID。
     * @param {string} reason キャンセル理由。
     */
    function sendLineNotification(reservationId, reason) {
      const spreadsheetUrl = appConfig && appConfig.settings && appConfig.settings.spreadsheetUrl
        ? appConfig.settings.spreadsheetUrl : '';
      const text = `【キャンセル依頼】\n予約ID: ${reservationId}\n理由: ${reason || 'なし'}\nスプレッドシート: ${spreadsheetUrl}`;
      const lineUrl = `https://line.me/R/msg/text/?${encodeURIComponent(text)}`;
      window.open(lineUrl, '_blank');
    }

    // ============================================================
    // ユーティリティ
    // ============================================================
    /**
     * HH:mm 形式の時刻を分数へ変換します。
     *
     * @param {string} t 時刻文字列。
     * @return {number} 0:00 からの分数。
     */
    function toMin(t) {
      if (!t) return 0;
      const [h, m] = t.split(':').map(Number);
      return h * 60 + m;
    }

    /**
     * 2つの時間帯が重複しているか判定します。
     *
     * @param {string} s1 1つ目の開始時刻。
     * @param {string} e1 1つ目の終了時刻。
     * @param {string} s2 2つ目の開始時刻。
     * @param {string} e2 2つ目の終了時刻。
     * @return {boolean} 重複する場合は true。
     */
    function timeOverlap(s1, e1, s2, e2) {
      return toMin(s1) < toMin(e2) && toMin(s2) < toMin(e1);
    }

    /**
     * 日付を画面表示用の短いラベルに変換します。
     *
     * @param {string} d yyyy-MM-dd 形式の日付。
     * @return {string} 表示用日付。
     */
    function fmtDate(d) {
      if (!d) return '';
      const dt = new Date(d + 'T00:00:00');
      const days = ['日', '月', '火', '水', '木', '金', '土'];
      return `${dt.getMonth() + 1}/${dt.getDate()}(${days[dt.getDay()]})`;
    }

    /**
     * HTML へ埋め込む文字列をエスケープします。
     *
     * @param {*} s 対象値。
     * @return {string} エスケープ済み文字列。
     */
    function esc(s) {
      return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
  </script>
</body>

</html>
