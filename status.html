<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>利用状況</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .hidden { display: none !important; }
    body { -webkit-tap-highlight-color: transparent; }
  </style>
</head>

<body class="bg-gray-50 min-h-screen text-gray-800">

  <!-- ローディングオーバーレイ -->
  <div id="loading-overlay" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center">
    <div class="bg-white rounded-2xl px-10 py-7 flex flex-col items-center gap-3 shadow-xl">
      <div class="w-9 h-9 border-4 border-blue-100 border-t-blue-500 rounded-full animate-spin"></div>
      <p id="loading-text" class="text-sm text-gray-500">処理中...</p>
    </div>
  </div>

  <div class="max-w-6xl mx-auto px-4">
    <!-- ヘッダー -->
    <div class="sticky top-0 z-20 bg-gray-50/95 backdrop-blur pt-4 pb-3 flex items-center justify-between border-b border-gray-200 mb-5">
      <h1 id="system-name" class="text-lg font-bold text-gray-900">利用状況</h1>
      <a href="reserve.html" class="text-sm font-medium text-blue-600">予約する →</a>
    </div>

    <!-- フィルター -->
    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-4 mb-4 space-y-3">
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1">日付</label>
          <input type="date" id="filter-date" onchange="applyFilters()" title="日付"
            class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1">会議室</label>
          <select id="filter-room" onchange="applyFilters()" title="会議室"
            class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="">すべて</option>
          </select>
        </div>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1">開始時間以降</label>
          <select id="filter-start" onchange="applyFilters()" title="開始時間以降"
            class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="">指定なし</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1">終了時間以前</label>
          <select id="filter-end" onchange="applyFilters()" title="終了時間以前"
            class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="">指定なし</option>
          </select>
        </div>
      </div>
      <div class="flex gap-2 flex-wrap">
        <div class="flex rounded-xl overflow-hidden border border-gray-200 flex-shrink-0">
          <button type="button" id="view-list-btn" onclick="setView('list')"
            class="px-4 py-2 text-sm font-semibold bg-blue-600 text-white transition">一覧</button>
          <button type="button" id="view-timeline-btn" onclick="setView('timeline')"
            class="px-4 py-2 text-sm font-semibold bg-white text-gray-500 transition">タイムライン</button>
        </div>
        <button type="button" onclick="resetFilters()"
          class="px-4 py-2 text-sm font-semibold rounded-xl bg-gray-100 text-gray-600 transition">リセット</button>
        <button type="button" onclick="reloadData()"
          class="px-4 py-2 text-sm font-semibold rounded-xl bg-gray-100 text-gray-600 transition">更新</button>
      </div>
    </div>

    <!-- 一覧表示 -->
    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-4 mb-4 space-y-3">
      <div class="flex items-start justify-between gap-3">
        <div>
          <h2 class="text-sm font-bold text-gray-900">Googleカレンダー</h2>
          <p class="text-xs text-gray-500 mt-1">会議室を選ぶと、対応するGoogleカレンダーをこの画面で確認できます。</p>
        </div>
        <a id="calendar-open-link" href="#" target="_blank" rel="noopener noreferrer"
          class="hidden px-3 py-2 text-xs font-semibold rounded-xl bg-blue-50 text-blue-600">
          別タブで開く
        </a>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-[minmax(0,220px)_1fr] gap-3 items-start">
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1">表示する会議室</label>
          <select id="calendar-room" onchange="handleCalendarRoomChange()" title="表示する会議室"
            class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="">会議室を選択</option>
          </select>
        </div>
        <div id="calendar-viewer" class="min-h-[220px] rounded-2xl border border-dashed border-gray-200 bg-gray-50"></div>
      </div>
    </div>

    <div id="view-list">
      <div id="res-list-container" class="space-y-2 pb-10">
        <div class="text-center py-10 text-gray-400 text-sm">読み込み中...</div>
      </div>
    </div>

    <!-- タイムライン表示 -->
    <div id="view-timeline" class="hidden pb-10">
      <div id="timeline-container">
        <div class="text-center py-10 text-gray-400 text-sm">読み込み中...</div>
      </div>
    </div>
  </div>

  <!-- キャンセル依頼モーダル（スマホ: 下から / PC: 中央） -->
  <div id="cancel-modal" class="hidden fixed inset-0 bg-black/50 z-40 flex items-end sm:items-center justify-center">
    <div class="bg-white rounded-t-3xl sm:rounded-2xl p-5 w-full sm:max-w-md space-y-4 shadow-2xl">
      <h2 class="text-base font-bold text-gray-900">キャンセル依頼</h2>
      <p class="text-sm text-gray-500">依頼を送信します。管理者が確認後に対応します。</p>
      <input type="hidden" id="cancel-res-id">
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">理由（任意）</label>
        <textarea id="cancel-reason" placeholder="例：都合が悪くなったため" rows="3"
          class="w-full border border-gray-200 rounded-xl px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>
      </div>
      <div class="flex gap-3 pb-2">
        <button type="button" onclick="closeCancelModal()"
          class="flex-1 py-3.5 bg-gray-100 text-gray-700 rounded-xl font-semibold text-sm">戻る</button>
        <button type="button" onclick="submitCancelRequest()" id="btn-cancel-submit"
          class="flex-[2] py-3.5 bg-red-500 text-white rounded-xl font-bold text-sm disabled:opacity-50">
          キャンセル依頼を送信
        </button>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    const CONFIG = window.APP_CONFIG;
    let appConfig = null;
    let allReservations = [];
    let filteredReservations = [];
    let currentView = 'list';
    let selectedCalendarRoomId = '';

    // ============================================================
    // ローディング
    // ============================================================
    function showLoading(text) {
      document.getElementById('loading-text').textContent = text || '処理中...';
      document.getElementById('loading-overlay').classList.remove('hidden');
    }
    function hideLoading() {
      document.getElementById('loading-overlay').classList.add('hidden');
    }

    // ============================================================
    // 初期化
    // ============================================================
    document.addEventListener('DOMContentLoaded', async () => {
      populateTimeFilters('09:00', '22:00');
      document.getElementById('filter-date').value = todayStr();
      applyFilters();
      await Promise.allSettled([loadConfig(), loadReservations()]);
      applyFilters();
      renderCalendarViewer();
    });

    function todayStr() {
      return new Date().toISOString().slice(0, 10);
    }

    function populateTimeFilters(businessStart, businessEnd) {
      const start = document.getElementById('filter-start');
      const end = document.getElementById('filter-end');
      const prevStart = start.value;
      const prevEnd = end.value;
      const opts = generateTimeOptions(toMin(businessStart), toMin(businessEnd), '');
      start.innerHTML = `<option value="">指定なし</option>${opts}`;
      end.innerHTML = `<option value="">指定なし</option>${opts}`;
      start.value = prevStart;
      end.value = prevEnd;
    }

    // ============================================================
    // 設定取得
    // ============================================================
    async function loadConfig() {
      try {
        const res = await fetch(CONFIG.GAS_API_URL + '?action=get_config');
        const data = await res.json();
        if (data.ok) {
          appConfig = data;
          applyConfig(data);
          syncCalendarRoomOptions(data.rooms || []);
          renderCalendarViewer();
        }
      } catch (e) {
        console.warn('設定取得失敗', e);
        appConfig = defaultConfig();
      }
    }

    function defaultConfig() {
      return {
        ok: true, today: todayStr(),
        settings: { systemName: '会議室予約システム', businessStartTime: '09:00', businessEndTime: '22:00', spreadsheetUrl: '' },
        rooms: [],
      };
    }

    function applyConfig(data) {
      const s = data.settings;
      document.getElementById('system-name').textContent = s.systemName + ' - 利用状況';
      document.title = s.systemName + ' - 利用状況';
      populateTimeFilters(s.businessStartTime || '09:00', s.businessEndTime || '22:00');

      const sel = document.getElementById('filter-room');
      const prevRoom = sel.value;
      sel.innerHTML = '<option value="">すべて</option>';
      (data.rooms || []).forEach(r => {
        const opt = document.createElement('option');
        opt.value = r.room_id;
        opt.textContent = r.room_name;
        sel.appendChild(opt);
      });
      sel.value = prevRoom;
    }

    /**
     * Googleカレンダー表示用の会議室選択肢を同期します。
     *
     * @param {Array<Object>} rooms 会議室一覧。
     * @return {void}
     */
    function syncCalendarRoomOptions(rooms) {
      /** @type {HTMLSelectElement} カレンダー表示用の会議室セレクト。 */
      const calendarSelect = document.getElementById('calendar-room');
      /** @type {string} 直前に選択されていた会議室ID。 */
      const previousRoomId = selectedCalendarRoomId || calendarSelect.value;

      calendarSelect.innerHTML = '<option value="">会議室を選択</option>';
      rooms.filter((room) => room.calendar_url).forEach((room) => {
        /** @type {HTMLOptionElement} カレンダー表示用の選択肢。 */
        const option = document.createElement('option');
        option.value = room.room_id;
        option.textContent = room.room_name;
        calendarSelect.appendChild(option);
      });

      selectedCalendarRoomId = rooms.some((room) => room.room_id === previousRoomId && room.calendar_url)
        ? previousRoomId
        : (rooms.find((room) => room.calendar_url) || {}).room_id || '';
      calendarSelect.value = selectedCalendarRoomId;
    }

    // ============================================================
    // CSV 取得
    // ============================================================
    async function loadReservations(bustCache = false) {
      try {
        const text = CONFIG.fetchSheetCsvText
          ? await CONFIG.fetchSheetCsvText('reservations', bustCache)
          : await fetch(CONFIG.buildSheetCsvUrl('reservations', bustCache)).then(r => r.text());
        allReservations = parseCSV(text).filter(r =>
          r.reservation_id && (r.status === '有効' || r.status === 'キャンセル依頼')
        );
      } catch (e) {
        console.warn('予約データ取得失敗', e);
        allReservations = [];
      }
    }

    async function reloadData() {
      showLoading('最新データを読み込み中...');
      await loadReservations(true);
      hideLoading();
      applyFilters();
      renderCalendarViewer();
    }

    // ============================================================
    // CSV パーサー
    // ============================================================
    const CSV_KEY_MAP = {
      '予約ID': 'reservation_id', '団体名': 'organization_name', '会議名': 'meeting_name',
      'お名前': 'user_name', '会議室ID': 'room_id', '会議室名': 'room_name',
      '利用日': 'usage_date', '開始時間': 'start_time', '終了時間': 'end_time', 'ステータス': 'status',
    };

    function parseCSV(text) {
      const lines = text.trim().split('\n');
      if (lines.length < 2) return [];
      const headers = parseCSVRow(lines[0]);
      const colMap = headers.map((h, i) => CSV_KEY_MAP[h] ? { i, key: CSV_KEY_MAP[h] } : null).filter(Boolean);
      return lines.slice(1).filter(l => l.trim()).map(line => {
        const vals = parseCSVRow(line);
        const obj = {};
        colMap.forEach(({ i, key }) => obj[key] = (vals[i] || '').trim());
        return obj.reservation_id ? obj : null;
      }).filter(Boolean);
    }

    function parseCSVRow(line) {
      const result = [];
      let cur = '', inQ = false;
      for (let i = 0; i < line.length; i++) {
        const c = line[i];
        if (c === '"') {
          if (inQ && line[i + 1] === '"') { cur += '"'; i++; }
          else inQ = !inQ;
        } else if (c === ',' && !inQ) { result.push(cur); cur = ''; }
        else cur += c;
      }
      result.push(cur);
      return result;
    }

    // ============================================================
    // フィルター・表示
    // ============================================================
    function resetFilters() {
      document.getElementById('filter-date').value = appConfig ? appConfig.today : todayStr();
      document.getElementById('filter-room').value = '';
      document.getElementById('filter-start').value = '';
      document.getElementById('filter-end').value = '';
      applyFilters();
    }

    function applyFilters() {
      const date = document.getElementById('filter-date').value;
      const room = document.getElementById('filter-room').value;
      const start = document.getElementById('filter-start').value;
      const end = document.getElementById('filter-end').value;

      filteredReservations = allReservations.filter(r => {
        if (date && r.usage_date !== date) return false;
        if (room && r.room_id !== room) return false;
        if (start && end && !timeOverlap(r.start_time, r.end_time, start, end)) return false;
        if (start && !end && toMin(r.end_time) <= toMin(start)) return false;
        if (!start && end && toMin(r.start_time) >= toMin(end)) return false;
        return true;
      });

      filteredReservations.sort((a, b) =>
        (a.usage_date + a.start_time + a.room_name).localeCompare(b.usage_date + b.start_time + b.room_name)
      );

      renderCurrentView();
    }

    function setView(v) {
      currentView = v;
      const listBtn = document.getElementById('view-list-btn');
      const tlBtn = document.getElementById('view-timeline-btn');
      if (v === 'list') {
        listBtn.className = 'px-4 py-2 text-sm font-semibold bg-blue-600 text-white transition';
        tlBtn.className = 'px-4 py-2 text-sm font-semibold bg-white text-gray-500 transition';
      } else {
        tlBtn.className = 'px-4 py-2 text-sm font-semibold bg-blue-600 text-white transition';
        listBtn.className = 'px-4 py-2 text-sm font-semibold bg-white text-gray-500 transition';
      }
      document.getElementById('view-list').classList.toggle('hidden', v !== 'list');
      document.getElementById('view-timeline').classList.toggle('hidden', v !== 'timeline');
      renderCurrentView();
    }

    function renderCurrentView() {
      if (currentView === 'list') renderList();
      else renderTimeline();
    }

    // ---- 一覧 ----
    /**
     * カレンダー表示用の会議室選択を反映します。
     *
     * @return {void}
     */
    function handleCalendarRoomChange() {
      /** @type {HTMLSelectElement} カレンダー表示用の会議室セレクト。 */
      const calendarSelect = document.getElementById('calendar-room');
      selectedCalendarRoomId = calendarSelect.value;
      renderCalendarViewer();
    }

    /**
     * 選択した会議室のGoogleカレンダーを埋め込み表示します。
     *
     * @return {void}
     */
    function renderCalendarViewer() {
      /** @type {HTMLElement} カレンダー描画先。 */
      const viewer = document.getElementById('calendar-viewer');
      /** @type {HTMLAnchorElement} Googleカレンダーの別タブリンク。 */
      const openLink = document.getElementById('calendar-open-link');
      /** @type {Array<Object>} 現在の会議室一覧。 */
      const rooms = appConfig && Array.isArray(appConfig.rooms) ? appConfig.rooms : [];
      /** @type {Object|undefined} 選択中の会議室。 */
      const selectedRoom = rooms.find((room) => room.room_id === selectedCalendarRoomId && room.calendar_url);

      if (!rooms.some((room) => room.calendar_url)) {
        viewer.innerHTML = '<div class="h-full min-h-[220px] flex items-center justify-center px-4 text-sm text-gray-400">Googleカレンダーが設定された会議室がありません。</div>';
        openLink.classList.add('hidden');
        openLink.removeAttribute('href');
        return;
      }

      if (!selectedRoom) {
        viewer.innerHTML = '<div class="h-full min-h-[220px] flex items-center justify-center px-4 text-sm text-gray-400">会議室を選択するとGoogleカレンダーを表示します。</div>';
        openLink.classList.add('hidden');
        openLink.removeAttribute('href');
        return;
      }

      openLink.href = selectedRoom.calendar_url;
      openLink.classList.remove('hidden');
      viewer.innerHTML = `<iframe
        src="${esc(selectedRoom.calendar_url)}"
        title="${esc(selectedRoom.room_name)} のGoogleカレンダー"
        class="w-full h-[420px] rounded-2xl bg-white"
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"></iframe>`;
    }

    function renderList() {
      const container = document.getElementById('res-list-container');
      if (!filteredReservations.length) {
        container.innerHTML = '<div class="text-center py-10 text-gray-400 text-sm">該当する予約はありません</div>';
        return;
      }
      container.innerHTML = filteredReservations.map(r => {
        const badge = r.status === '有効'
          ? '<span class="bg-emerald-100 text-emerald-700 text-xs font-bold px-2.5 py-1 rounded-full">有効</span>'
          : '<span class="bg-amber-100 text-amber-700 text-xs font-bold px-2.5 py-1 rounded-full">キャンセル依頼中</span>';
        const cancelBtn = r.status === '有効'
          ? `<button type="button" onclick="openCancelModal('${esc(r.reservation_id)}')"
               class="mt-3 text-xs text-gray-400 hover:text-red-500 font-semibold transition py-1">
               キャンセル依頼
             </button>`
          : '';
        return `<div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-4">
          <div class="flex items-start justify-between gap-2">
            <span class="font-bold text-gray-900 text-sm">${esc(r.meeting_name)}</span>
            ${badge}
          </div>
          <div class="text-sm text-gray-600 mt-1.5">${fmtDate(r.usage_date)}　${esc(r.start_time)}〜${esc(r.end_time)}</div>
          <div class="text-sm text-gray-600">${esc(r.room_name)}</div>
          <div class="text-xs text-gray-400 mt-0.5">${esc(r.organization_name)}　${esc(r.user_name)}</div>
          ${cancelBtn}
        </div>`;
      }).join('');
    }

    // ---- タイムライン ----
    function renderTimeline() {
      const container = document.getElementById('timeline-container');
      const s = appConfig ? appConfig.settings : defaultConfig().settings;
      const startMin = toMin(s.businessStartTime || '09:00');
      const endMin = toMin(s.businessEndTime || '22:00');
      const totalMin = endMin - startMin;

      if (!filteredReservations.length) {
        container.innerHTML = '<div class="text-center py-10 text-gray-400 text-sm">該当する予約はありません</div>';
        return;
      }

      const days = {};
      filteredReservations.forEach(r => {
        if (!days[r.usage_date]) days[r.usage_date] = {};
        if (!days[r.usage_date][r.room_id]) days[r.usage_date][r.room_id] = { room_name: r.room_name, reservations: [] };
        days[r.usage_date][r.room_id].reservations.push(r);
      });

      const rooms = appConfig ? appConfig.rooms : [];

      let html = '';
      Object.keys(days).sort().forEach(date => {
        const dayRooms = days[date];
        const roomOrder = rooms.length > 0 ? rooms : Object.keys(dayRooms).map(id => ({ room_id: id, room_name: dayRooms[id].room_name }));
        html += `<div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-4 mb-3">
          <div class="font-bold text-blue-600 text-sm mb-3">${fmtDate(date)}</div>`;
        roomOrder.forEach(room => {
          const roomData = dayRooms[room.room_id];
          if (!roomData) return;
          html += `<div class="mb-3">
            <div class="text-xs font-semibold text-gray-500 mb-1">${esc(room.room_name)}</div>
            <div class="relative h-9 bg-gray-100 rounded-lg overflow-hidden">`;
          roomData.reservations.forEach(r => {
            const rStart = Math.max(toMin(r.start_time), startMin);
            const rEnd = Math.min(toMin(r.end_time), endMin);
            const left = ((rStart - startMin) / totalMin * 100).toFixed(2);
            const width = ((rEnd - rStart) / totalMin * 100).toFixed(2);
            const bg = r.status === '有効' ? 'bg-blue-500' : 'bg-amber-400';
            html += `<div class="absolute top-0 h-full ${bg} flex items-center px-2 overflow-hidden rounded"
              style="left:${left}%;width:${width}%" title="${esc(r.meeting_name)} ${r.start_time}〜${r.end_time}">
              <span class="text-white text-xs font-bold truncate">${esc(r.meeting_name)}</span>
            </div>`;
          });
          html += `</div>
            <div class="flex justify-between text-xs text-gray-400 mt-0.5">
              <span>${s.businessStartTime || '09:00'}</span>
              <span>${s.businessEndTime || '22:00'}</span>
            </div>
          </div>`;
        });
        html += '</div>';
      });
      container.innerHTML = html;
    }

    // ============================================================
    // キャンセル依頼
    // ============================================================
    function openCancelModal(reservationId) {
      document.getElementById('cancel-res-id').value = reservationId;
      document.getElementById('cancel-reason').value = '';
      document.getElementById('cancel-modal').classList.remove('hidden');
    }

    function closeCancelModal() {
      document.getElementById('cancel-modal').classList.add('hidden');
    }

    async function submitCancelRequest() {
      const reservationId = document.getElementById('cancel-res-id').value;
      const reason = document.getElementById('cancel-reason').value;
      const btn = document.getElementById('btn-cancel-submit');
      btn.disabled = true;
      showLoading('キャンセル依頼を送信中...');
      try {
        const res = await fetch(CONFIG.GAS_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ action: 'cancel_request', payload: { reservation_id: reservationId, reason } }),
        });
        const data = await res.json();
        if (data.ok) {
          closeCancelModal();
          sendLineNotification(reservationId, reason);
          const target = allReservations.find((item) => item.reservation_id === reservationId);
          if (target) {
            target.status = 'キャンセル依頼';
          }
          applyFilters();
          alert('キャンセル依頼を送信しました。管理者が確認後に対応します。');
        } else {
          alert(data.error || 'キャンセル依頼の送信に失敗しました。');
        }
      } catch (e) {
        alert('通信エラーが発生しました。');
      }
      btn.disabled = false;
      hideLoading();
    }

    function sendLineNotification(reservationId, reason) {
      const spreadsheetUrl = appConfig?.settings?.spreadsheetUrl || '';
      const text = `【キャンセル依頼】\n予約ID: ${reservationId}\n理由: ${reason || 'なし'}\nスプレッドシート: ${spreadsheetUrl}`;
      window.open(`https://line.me/R/msg/text/?${encodeURIComponent(text)}`, '_blank');
    }

    // ============================================================
    // ユーティリティ
    // ============================================================
    function generateTimeOptions(startMin, endMin, selectedVal) {
      let html = '';
      for (let m = startMin; m <= endMin; m += 5) {
        const val = minToTime(m);
        html += `<option value="${val}"${val === selectedVal ? ' selected' : ''}>${val}</option>`;
      }
      return html;
    }

    function minToTime(m) {
      return `${String(Math.floor(m / 60)).padStart(2, '0')}:${String(m % 60).padStart(2, '0')}`;
    }

    function toMin(t) {
      if (!t) return 0;
      const [h, m] = t.split(':').map(Number);
      return h * 60 + m;
    }

    function timeOverlap(s1, e1, s2, e2) {
      return toMin(s1) < toMin(e2) && toMin(s2) < toMin(e1);
    }

    function fmtDate(d) {
      if (!d) return '';
      const dt = new Date(d + 'T00:00:00');
      const days = ['日', '月', '火', '水', '木', '金', '土'];
      return `${dt.getMonth() + 1}/${dt.getDate()}(${days[dt.getDay()]})`;
    }

    function esc(s) {
      return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
  </script>
