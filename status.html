<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>利用状況</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    .hidden { display: none !important; }

    :root {
      --primary: #1a73e8;
      --primary-hover: #1557b0;
      --primary-light: #e8f0fe;
      --surface: #ffffff;
      --bg: #f0f4f9;
      --on-surface: #202124;
      --muted: #5f6368;
      --muted-light: #9aa0a6;
      --border: #e8eaed;
      --error: #c5221f;
      --error-bg: #fce8e6;
      --error-border: #f5c6c4;
      --success: #137333;
      --success-bg: #e6f4ea;
      --success-border: #a8d5b5;
      --warn-text: #7c4b00;
      --warn-bg: #fef7e0;
      --warn-border: #fde68a;
      --shadow-md: 0 1px 3px rgba(60,64,67,.12), 0 2px 8px rgba(60,64,67,.10);
    }

    body { min-height: 100vh; background: var(--bg); color: var(--on-surface); }

    /* Loading */
    .loading-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,.35); z-index: 50;
      display: none; align-items: center; justify-content: center;
    }
    .loading-overlay.visible { display: flex; }
    .loading-box {
      background: var(--surface); border-radius: 14px; padding: 28px 36px;
      box-shadow: 0 8px 30px rgba(0,0,0,.15);
      display: flex; flex-direction: column; align-items: center; gap: 14px;
    }
    .loading-spinner {
      width: 40px; height: 40px; border: 4px solid var(--border);
      border-top-color: var(--primary); border-radius: 50%;
      will-change: transform;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin .8s linear infinite; }
    .loading-text { font-size: 14px; font-weight: 500; color: var(--muted); }

    /* App bar */
    .app-bar {
      position: sticky; top: 0; z-index: 20;
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 20px; height: 56px;
      display: flex; align-items: center; gap: 12px;
    }
    .app-bar-icon {
      width: 32px; height: 32px; background: var(--primary);
      border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .app-bar-title { font-size: 16px; font-weight: 700; color: var(--on-surface); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .app-bar-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .app-bar-btn {
      height: 34px; padding: 0 14px; border-radius: 6px;
      font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s;
      text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
      border: 1px solid var(--border); background: var(--surface); color: var(--muted);
    }
    .app-bar-btn:hover { background: #f8f9fa; border-color: var(--primary); color: var(--primary); }
    .app-bar-btn-primary { border-color: var(--primary); color: var(--primary); }
    .app-bar-btn-primary:hover { background: var(--primary-light); }

    /* Page */
    .page { max-width: 900px; margin: 0 auto; padding: 20px 16px 60px; display: flex; flex-direction: column; gap: 14px; }

    /* Card */
    .card { background: var(--surface); border-radius: 14px; box-shadow: var(--shadow-md); padding: 18px 20px; display: flex; flex-direction: column; gap: 12px; }
    .card-title { font-size: 14px; font-weight: 700; color: var(--on-surface); }
    .card-subtitle { font-size: 12px; color: var(--muted); margin-top: 2px; line-height: 1.5; }

    /* Filter panel */
    .filter-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .filter-label { display: flex; flex-direction: column; gap: 4px; font-size: 12px; font-weight: 600; color: var(--muted); }
    .filter-input, .filter-select {
      height: 38px; border: 1.5px solid var(--border); border-radius: 7px;
      background: var(--surface); color: var(--on-surface); padding: 0 12px;
      font-size: 13px; outline: none; width: 100%; transition: border-color .15s, box-shadow .15s;
      cursor: pointer;
    }
    .filter-input:focus, .filter-select:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(26,115,232,.18); }
    .filter-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

    /* View toggle */
    .view-toggle { display: flex; border: 1.5px solid var(--border); border-radius: 8px; overflow: hidden; }
    .view-btn { padding: 6px 16px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; transition: all .15s; background: var(--surface); color: var(--muted); }
    .view-btn.active { background: var(--primary); color: #fff; }
    .view-btn:not(.active):hover { background: #f8f9fa; color: var(--primary); }

    /* Action buttons */
    .btn-sm {
      height: 34px; padding: 0 14px; border-radius: 6px;
      font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s;
      border: 1px solid var(--border); background: var(--surface); color: var(--muted);
    }
    .btn-sm:hover { background: #f8f9fa; }

    /* Calendar viewer */
    .calendar-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .calendar-grid { display: grid; grid-template-columns: 200px 1fr; gap: 12px; align-items: start; }
    .calendar-iframe { width: 100%; height: 420px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); display: block; }
    .calendar-placeholder { min-height: 200px; border-radius: 10px; border: 1.5px dashed var(--border); background: #fafafa; display: flex; align-items: center; justify-content: center; padding: 20px; font-size: 13px; color: var(--muted-light); text-align: center; }
    .calendar-open-btn { height: 32px; padding: 0 14px; border-radius: 6px; border: 1px solid var(--primary); background: var(--primary-light); color: var(--primary); font-size: 12px; font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .calendar-open-btn:hover { background: #d2e3fc; }

    /* List view */
    .res-list { display: flex; flex-direction: column; gap: 8px; padding-bottom: 16px; }
    .res-empty { text-align: center; padding: 40px 0; font-size: 14px; color: var(--muted-light); }
    .res-card { background: var(--surface); border-radius: 12px; box-shadow: var(--shadow-md); padding: 14px 16px; display: flex; flex-direction: column; gap: 6px; }
    .res-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
    .res-card-name { font-size: 14px; font-weight: 700; color: var(--on-surface); }
    .res-card-meta { font-size: 13px; color: var(--muted); }
    .res-card-sub { font-size: 12px; color: var(--muted-light); }
    .badge { display: inline-flex; align-items: center; border-radius: 999px; padding: 3px 10px; font-size: 11px; font-weight: 700; border-width: 1px; border-style: solid; }
    .badge-green { background: var(--success-bg); color: var(--success); border-color: var(--success-border); }
    .badge-warn { background: var(--warn-bg); color: var(--warn-text); border-color: var(--warn-border); }
    /* Timeline */
    .timeline-day { background: var(--surface); border-radius: 12px; box-shadow: var(--shadow-md); padding: 14px 16px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 10px; }
    .timeline-day-title { font-size: 13px; font-weight: 700; color: var(--primary); }
    .timeline-room-label { font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 4px; }
    .timeline-bar-wrap { position: relative; height: 34px; background: #f1f3f4; border-radius: 6px; overflow: hidden; }
    .timeline-bar { position: absolute; top: 0; height: 100%; border-radius: 4px; display: flex; align-items: center; padding: 0 8px; overflow: hidden; }
    .timeline-bar-available { background: #1a73e8; }
    .timeline-bar-pending { background: #f29900; }
    .timeline-bar-label { color: #fff; font-size: 11px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .timeline-scale { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted-light); margin-top: 2px; }

    .btn-icon { vertical-align: -2px; }

    @media (max-width: 640px) {
      .filter-grid { grid-template-columns: 1fr; }
      .calendar-grid { grid-template-columns: 1fr; }
      .calendar-iframe { height: 300px; }
    }
  </style>
</head>
<body>

  <!-- Loading -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="loading-box">
      <div class="loading-spinner spin"></div>
      <p id="loading-text" class="loading-text">処理中...</p>
    </div>
  </div>

  <!-- App bar -->
  <header class="app-bar">
    <div class="app-bar-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
        <path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/>
      </svg>
    </div>
    <h1 id="system-name" class="app-bar-title">利用状況</h1>
    <div class="app-bar-actions">
      <a href="index.html" class="app-bar-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        ホームに戻る
      </a>
      <a href="reserve.html" class="app-bar-btn app-bar-btn-primary">予約する →</a>
    </div>
  </header>

  <div class="page">

    <!-- フィルターパネル -->
    <div class="card">
      <div class="filter-grid">
        <div class="filter-label">
          日付
          <input type="date" id="filter-date" title="日付でフィルター" onchange="applyFilters()" class="filter-input" onclick="openNativePicker('filter-date')">
        </div>
        <div class="filter-label">
          会議室
          <select id="filter-room" title="会議室でフィルター" onchange="applyFilters()" class="filter-select">
            <option value="">すべて</option>
          </select>
        </div>
        <div class="filter-label">
          開始時間以降
          <select id="filter-start" title="開始時間以降でフィルター" onchange="applyFilters()" class="filter-select">
            <option value="">指定なし</option>
          </select>
        </div>
        <div class="filter-label">
          終了時間以前
          <select id="filter-end" title="終了時間以前でフィルター" onchange="applyFilters()" class="filter-select">
            <option value="">指定なし</option>
          </select>
        </div>
      </div>
      <div class="filter-actions">
        <div class="view-toggle">
          <button type="button" id="view-list-btn" onclick="setView('list')" class="view-btn active">一覧</button>
          <button type="button" id="view-timeline-btn" onclick="setView('timeline')" class="view-btn">タイムライン</button>
        </div>
        <button type="button" onclick="resetFilters()" class="btn-sm">リセット</button>
        <button type="button" onclick="reloadData()" class="btn-sm">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" class="btn-icon"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
          更新
        </button>
      </div>
    </div>

    <!-- Googleカレンダー -->
    <div class="card">
      <div class="calendar-header">
        <div>
          <div class="card-title">Googleカレンダー</div>
          <div class="card-subtitle">会議室を選ぶと対応するGoogleカレンダーをここで確認できます。</div>
        </div>
        <a id="calendar-open-link" href="#" target="_blank" rel="noopener noreferrer" class="calendar-open-btn hidden">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M19 19H5V5h7V3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/></svg>
          別タブで開く
        </a>
      </div>
      <div class="calendar-grid">
        <div class="filter-label">
          表示する会議室
          <select id="calendar-room" title="カレンダーに表示する会議室を選択" onchange="handleCalendarRoomChange()" class="filter-select">
            <option value="">会議室を選択</option>
          </select>
        </div>
        <div id="calendar-viewer" class="calendar-placeholder">会議室を選択するとGoogleカレンダーを表示します。</div>
      </div>
    </div>

    <!-- 一覧 -->
    <div id="view-list">
      <div id="res-list-container" class="res-list">
        <div class="res-empty">読み込み中...</div>
      </div>
    </div>

    <!-- タイムライン -->
    <div id="view-timeline" class="hidden">
      <div id="timeline-container">
        <div class="res-empty">読み込み中...</div>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    const CONFIG = window.APP_CONFIG;
    let appConfig = null;
    let allReservations = [];
    let filteredReservations = [];
    let currentView = 'list';
    let selectedCalendarRoomId = '';

    // Loading
    function showLoading(text) {
      document.getElementById('loading-text').textContent = text || '処理中...';
      document.getElementById('loading-overlay').classList.add('visible');
    }
    function hideLoading() {
      document.getElementById('loading-overlay').classList.remove('visible');
    }

    function openNativePicker(id) {
      const input = document.getElementById(id);
      if (!input) return;
      input.focus();
      if (typeof input.showPicker === 'function') input.showPicker();
    }

    // Init
    document.addEventListener('DOMContentLoaded', async () => {
      populateTimeFilters('09:00', '22:00');
      document.getElementById('filter-date').value = todayStr();
      applyFilters();
      await Promise.allSettled([loadConfig(), loadReservations()]);
      applyFilters();
      renderCalendarViewer();
    });

    function todayStr() { return new Date().toISOString().slice(0, 10); }

    function populateTimeFilters(businessStart, businessEnd) {
      const start = document.getElementById('filter-start');
      const end = document.getElementById('filter-end');
      const prevStart = start.value, prevEnd = end.value;
      const opts = generateTimeOptions(toMin(businessStart), toMin(businessEnd), '');
      start.innerHTML = `<option value="">指定なし</option>${opts}`;
      end.innerHTML = `<option value="">指定なし</option>${opts}`;
      start.value = prevStart;
      end.value = prevEnd;
    }

    // Config
    async function loadConfig() {
      try {
        const res = await fetch(CONFIG.GAS_API_URL + '?action=get_config');
        const data = await res.json();
        if (data.ok) {
          appConfig = data;
          applyConfig(data);
          syncCalendarRoomOptions(data.rooms || []);
          renderCalendarViewer();
        }
      } catch (e) {
        console.warn('設定取得失敗', e);
        appConfig = defaultConfig();
      }
    }

    function defaultConfig() {
      return { ok: true, today: todayStr(), settings: { systemName: '会議室予約システム', businessStartTime: '09:00', businessEndTime: '22:00', spreadsheetUrl: '' }, rooms: [] };
    }

    function applyConfig(data) {
      const s = data.settings;
      document.getElementById('system-name').textContent = s.systemName + ' - 利用状況';
      document.title = s.systemName + ' - 利用状況';
      populateTimeFilters(s.businessStartTime || '09:00', s.businessEndTime || '22:00');
      const sel = document.getElementById('filter-room');
      const prevRoom = sel.value;
      sel.innerHTML = '<option value="">すべて</option>';
      (data.rooms || []).forEach(r => {
        const opt = document.createElement('option');
        opt.value = r.room_id;
        opt.textContent = r.room_name;
        sel.appendChild(opt);
      });
      sel.value = prevRoom;
    }

    function syncCalendarRoomOptions(rooms) {
      const calendarSelect = document.getElementById('calendar-room');
      const previousRoomId = selectedCalendarRoomId || calendarSelect.value;
      calendarSelect.innerHTML = '<option value="">会議室を選択</option>';
      rooms.filter((room) => room.calendar_url).forEach((room) => {
        const option = document.createElement('option');
        option.value = room.room_id;
        option.textContent = room.room_name;
        calendarSelect.appendChild(option);
      });
      selectedCalendarRoomId = rooms.some((room) => room.room_id === previousRoomId && room.calendar_url)
        ? previousRoomId
        : (rooms.find((room) => room.calendar_url) || {}).room_id || '';
      calendarSelect.value = selectedCalendarRoomId;
    }

    // CSV
    async function loadReservations(bustCache = false) {
      try {
        const text = CONFIG.fetchSheetCsvText
          ? await CONFIG.fetchSheetCsvText('reservations', bustCache)
          : await fetch(CONFIG.buildSheetCsvUrl('reservations', bustCache)).then(r => r.text());
        allReservations = parseCSV(text).filter(r =>
          r.reservation_id && r.status === '有効'
        );
      } catch (e) {
        console.warn('予約データ取得失敗', e);
        allReservations = [];
      }
    }

    async function reloadData() {
      showLoading('最新データを読み込み中...');
      await loadReservations(true);
      hideLoading();
      applyFilters();
      renderCalendarViewer();
    }

    const CSV_KEY_MAP = {
      '予約ID': 'reservation_id', '団体名': 'organization_name', '会議名': 'meeting_name',
      'お名前': 'user_name', '会議室ID': 'room_id', '会議室名': 'room_name',
      '利用日': 'usage_date', '開始時間': 'start_time', '終了時間': 'end_time', 'ステータス': 'status',
    };

    function parseCSV(text) {
      const lines = text.trim().split('\n');
      if (lines.length < 2) return [];
      const headers = parseCSVRow(lines[0]);
      const colMap = headers.map((h, i) => CSV_KEY_MAP[h] ? { i, key: CSV_KEY_MAP[h] } : null).filter(Boolean);
      return lines.slice(1).filter(l => l.trim()).map(line => {
        const vals = parseCSVRow(line);
        const obj = {};
        colMap.forEach(({ i, key }) => obj[key] = (vals[i] || '').trim());
        return obj.reservation_id ? obj : null;
      }).filter(Boolean);
    }

    function parseCSVRow(line) {
      const result = [];
      let cur = '', inQ = false;
      for (let i = 0; i < line.length; i++) {
        const c = line[i];
        if (c === '"') {
          if (inQ && line[i + 1] === '"') { cur += '"'; i++; }
          else inQ = !inQ;
        } else if (c === ',' && !inQ) { result.push(cur); cur = ''; }
        else cur += c;
      }
      result.push(cur);
      return result;
    }

    // Filters & View
    function resetFilters() {
      document.getElementById('filter-date').value = appConfig ? appConfig.today : todayStr();
      document.getElementById('filter-room').value = '';
      document.getElementById('filter-start').value = '';
      document.getElementById('filter-end').value = '';
      applyFilters();
    }

    function applyFilters() {
      const date = document.getElementById('filter-date').value;
      const room = document.getElementById('filter-room').value;
      const start = document.getElementById('filter-start').value;
      const end = document.getElementById('filter-end').value;
      filteredReservations = allReservations.filter(r => {
        if (date && r.usage_date !== date) return false;
        if (room && r.room_id !== room) return false;
        if (start && end && !timeOverlap(r.start_time, r.end_time, start, end)) return false;
        if (start && !end && toMin(r.end_time) <= toMin(start)) return false;
        if (!start && end && toMin(r.start_time) >= toMin(end)) return false;
        return true;
      });
      filteredReservations.sort((a, b) =>
        (a.usage_date + a.start_time + a.room_name).localeCompare(b.usage_date + b.start_time + b.room_name)
      );
      renderCurrentView();
    }

    function setView(v) {
      currentView = v;
      document.getElementById('view-list-btn').className = `view-btn${v === 'list' ? ' active' : ''}`;
      document.getElementById('view-timeline-btn').className = `view-btn${v === 'timeline' ? ' active' : ''}`;
      document.getElementById('view-list').classList.toggle('hidden', v !== 'list');
      document.getElementById('view-timeline').classList.toggle('hidden', v !== 'timeline');
      renderCurrentView();
    }

    function renderCurrentView() {
      if (currentView === 'list') renderList();
      else renderTimeline();
    }

    // Calendar viewer
    function handleCalendarRoomChange() {
      selectedCalendarRoomId = document.getElementById('calendar-room').value;
      renderCalendarViewer();
    }

    function renderCalendarViewer() {
      const viewer = document.getElementById('calendar-viewer');
      const openLink = document.getElementById('calendar-open-link');
      const rooms = appConfig && Array.isArray(appConfig.rooms) ? appConfig.rooms : [];
      const selectedRoom = rooms.find((room) => room.room_id === selectedCalendarRoomId && room.calendar_url);

      if (!rooms.some((room) => room.calendar_url)) {
        viewer.className = 'calendar-placeholder';
        viewer.textContent = 'Googleカレンダーが設定された会議室がありません。';
        openLink.classList.add('hidden');
        openLink.removeAttribute('href');
        return;
      }
      if (!selectedRoom) {
        viewer.className = 'calendar-placeholder';
        viewer.textContent = '会議室を選択するとGoogleカレンダーを表示します。';
        openLink.classList.add('hidden');
        openLink.removeAttribute('href');
        return;
      }
      openLink.href = selectedRoom.calendar_url;
      openLink.classList.remove('hidden');
      viewer.className = '';
      viewer.innerHTML = `<iframe src="${esc(selectedRoom.calendar_url)}" title="${esc(selectedRoom.room_name)} のGoogleカレンダー" class="calendar-iframe" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>`;
    }

    // List view
    function renderList() {
      const container = document.getElementById('res-list-container');
      if (!filteredReservations.length) {
        container.innerHTML = '<div class="res-empty">該当する予約はありません</div>';
        return;
      }
      container.innerHTML = filteredReservations.map(r => {
        return `<div class="res-card">
          <div class="res-card-top">
            <span class="res-card-name">${esc(r.meeting_name)}</span>
            <span class="badge badge-green">有効</span>
          </div>
          <div class="res-card-meta">${fmtDate(r.usage_date)}　${esc(r.start_time)}〜${esc(r.end_time)}　${esc(r.room_name)}</div>
          <div class="res-card-sub">${esc(r.organization_name)}　${esc(r.user_name)}</div>
        </div>`;
      }).join('');
    }

    // Timeline view
    function renderTimeline() {
      const container = document.getElementById('timeline-container');
      const s = appConfig ? appConfig.settings : defaultConfig().settings;
      const startMin = toMin(s.businessStartTime || '09:00');
      const endMin = toMin(s.businessEndTime || '22:00');
      const totalMin = endMin - startMin;

      if (!filteredReservations.length) {
        container.innerHTML = '<div class="res-empty">該当する予約はありません</div>';
        return;
      }

      const days = {};
      filteredReservations.forEach(r => {
        if (!days[r.usage_date]) days[r.usage_date] = {};
        if (!days[r.usage_date][r.room_id]) days[r.usage_date][r.room_id] = { room_name: r.room_name, reservations: [] };
        days[r.usage_date][r.room_id].reservations.push(r);
      });

      const rooms = appConfig ? appConfig.rooms : [];
      let html = '';
      Object.keys(days).sort().forEach(date => {
        const dayRooms = days[date];
        const roomOrder = rooms.length > 0 ? rooms : Object.keys(dayRooms).map(id => ({ room_id: id, room_name: dayRooms[id].room_name }));
        html += `<div class="timeline-day"><div class="timeline-day-title">${fmtDate(date)}</div>`;
        roomOrder.forEach(room => {
          const roomData = dayRooms[room.room_id];
          if (!roomData) return;
          html += `<div>
            <div class="timeline-room-label">${esc(room.room_name)}</div>
            <div class="timeline-bar-wrap">`;
          roomData.reservations.forEach(r => {
            const rStart = Math.max(toMin(r.start_time), startMin);
            const rEnd = Math.min(toMin(r.end_time), endMin);
            const left = ((rStart - startMin) / totalMin * 100).toFixed(2);
            const width = ((rEnd - rStart) / totalMin * 100).toFixed(2);
            const cls = r.status === '有効' ? 'timeline-bar-available' : 'timeline-bar-pending';
            html += `<div class="timeline-bar ${cls}" style="left:${left}%;width:${width}%" title="${esc(r.meeting_name)} ${r.start_time}〜${r.end_time}">
              <span class="timeline-bar-label">${esc(r.meeting_name)}</span>
            </div>`;
          });
          html += `</div>
            <div class="timeline-scale">
              <span>${s.businessStartTime || '09:00'}</span>
              <span>${s.businessEndTime || '22:00'}</span>
            </div>
          </div>`;
        });
        html += '</div>';
      });
      container.innerHTML = html;
    }

    // Utils
    function generateTimeOptions(startMin, endMin, selectedVal) {
      let html = '';
      for (let m = startMin; m <= endMin; m += 5) {
        const val = minToTime(m);
        html += `<option value="${val}"${val === selectedVal ? ' selected' : ''}>${val}</option>`;
      }
      return html;
    }

    function minToTime(m) { return `${String(Math.floor(m / 60)).padStart(2, '0')}:${String(m % 60).padStart(2, '0')}`; }
    function toMin(t) { if (!t) return 0; const [h, m] = t.split(':').map(Number); return h * 60 + m; }
    function timeOverlap(s1, e1, s2, e2) { return toMin(s1) < toMin(e2) && toMin(s2) < toMin(e1); }

    function fmtDate(d) {
      if (!d) return '';
      const dt = new Date(d + 'T00:00:00');
      const days = ['日', '月', '火', '水', '木', '金', '土'];
      return `${dt.getMonth() + 1}/${dt.getDate()}(${days[dt.getDay()]})`;
    }

    function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
  </script>
</body>
</html>
