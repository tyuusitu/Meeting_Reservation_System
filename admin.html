<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>管理画面</title>
  <style>
    :root {
      --primary: #1d6fd6;
      --primary-dark: #1559ae;
      --accent: #0f8f68;
      --danger: #c73d3d;
      --warning: #9a6b00;
      --surface: #ffffff;
      --background: #f5f7fb;
      --border: #d7e0ec;
      --text: #172033;
      --muted: #647085;
      --soft-blue: #eaf2ff;
      --soft-green: #eaf8f2;
      --soft-red: #fff0f0;
      --soft-yellow: #fff8e1;
      --shadow: 0 8px 28px rgba(20, 36, 64, 0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background:
        radial-gradient(circle at top left, rgba(29, 111, 214, .11), transparent 25%),
        linear-gradient(180deg, #fbfcfe 0%, #edf2f9 100%);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button,
    .button-link {
      min-height: 42px;
      border: 0;
      border-radius: 10px;
      padding: 10px 16px;
      cursor: pointer;
      font-weight: 700;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    input,
    select,
    textarea {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      color: var(--text);
      padding: 10px 12px;
    }

    textarea {
      min-height: 88px;
      resize: vertical;
    }

    label {
      display: grid;
      gap: 6px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 700;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 720px;
    }

    th,
    td {
      border-bottom: 1px solid var(--border);
      text-align: left;
      padding: 10px 12px;
      font-size: 13px;
      vertical-align: top;
    }

    th {
      background: #f8fbff;
      font-weight: 800;
      color: var(--muted);
      position: sticky;
      top: 0;
    }

    .hidden {
      display: none !important;
    }

    .app {
      width: min(100%, 1240px);
      margin: 0 auto;
      padding: 18px 16px 40px;
      display: grid;
      gap: 16px;
    }

    .card {
      background: rgba(255, 255, 255, .95);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
    }

    .login-card {
      max-width: 480px;
      margin: 56px auto;
      padding: 24px;
      display: grid;
      gap: 16px;
    }

    .title {
      font-size: clamp(26px, 4vw, 34px);
      line-height: 1.15;
      font-weight: 900;
    }

    .sub {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .header {
      padding: 18px 20px;
      display: flex;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }

    .header h1 {
      font-size: 26px;
    }

    .header-actions,
    .tab-nav,
    .row-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--primary-dark);
    }

    .btn-secondary {
      background: #fff;
      color: var(--primary);
      border: 1.5px solid var(--primary);
    }

    .btn-danger {
      background: var(--danger);
      color: #fff;
    }

    .btn-ghost {
      background: #eef3f9;
      color: var(--text);
    }

    .btn-sm {
      min-height: 34px;
      padding: 6px 12px;
      font-size: 13px;
    }

    .tab-nav {
      padding: 0 20px 18px;
    }

    .tab-button {
      background: #fff;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .tab-button.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .section {
      padding: 0 20px 20px;
      display: grid;
      gap: 16px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .stat-box {
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fff;
    }

    .stat-label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 900;
    }

    .split2,
    .split3 {
      display: grid;
      gap: 14px;
    }

    .split2 {
      grid-template-columns: 1fr 1fr;
    }

    .split3 {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .panel {
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: #fff;
      display: grid;
      gap: 14px;
    }

    .panel-title {
      font-size: 18px;
      font-weight: 900;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fff;
    }

    .message {
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 14px;
      line-height: 1.6;
    }

    .message-success {
      background: var(--soft-green);
      border: 1px solid #9ad7b7;
      color: var(--accent);
    }

    .message-error {
      background: var(--soft-red);
      border: 1px solid #f1c0c0;
      color: var(--danger);
    }

    .notice {
      background: var(--soft-yellow);
      border: 1px solid #ead18a;
      color: var(--warning);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 13px;
      line-height: 1.6;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 900;
    }

    .badge-ok {
      background: var(--soft-green);
      color: var(--accent);
    }

    .badge-warn {
      background: var(--soft-yellow);
      color: var(--warning);
    }

    .badge-danger {
      background: var(--soft-red);
      color: var(--danger);
    }

    .filters {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .muted {
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 980px) {
      .stats-grid,
      .split2,
      .split3,
      .filters {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 720px) {
      .stats-grid,
      .split2,
      .split3,
      .filters {
        grid-template-columns: 1fr;
      }

      .header {
        align-items: flex-start;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <section id="login-screen" class="card login-card">
      <div class="title" id="login-title">管理画面</div>
      <div class="sub">会議室予約管理と会議出欠管理を同じ画面で扱います。認証状態はこのブラウザのセッションにだけ保持します。</div>
      <label>
        管理者パスワード
        <input id="login-password" type="password" placeholder="設定シートのパスワード">
      </label>
      <div class="row-actions">
        <button class="btn-primary" onclick="login()">ログイン</button>
        <a class="button-link btn-secondary" href="index.html">トップへ戻る</a>
      </div>
      <div id="login-message" class="hidden"></div>
    </section>

    <section id="admin-screen" class="card hidden">
      <div class="header">
        <div>
          <h1 id="system-name">管理画面</h1>
          <div class="sub">CSV 直接読み込みで一覧を表示し、更新系だけ GAS API に送信します。</div>
        </div>
        <div class="header-actions">
          <button class="btn-secondary" onclick="reloadAll(true)">最新化</button>
          <button class="btn-ghost" onclick="logout()">ログアウト</button>
        </div>
      </div>
      <div class="tab-nav" id="tab-nav"></div>
      <div class="section">
        <div id="global-message" class="hidden"></div>
        <div id="tab-dashboard" class="tab-content"></div>
        <div id="tab-meetings" class="tab-content hidden"></div>
        <div id="tab-attendance" class="tab-content hidden"></div>
        <div id="tab-members" class="tab-content hidden"></div>
        <div id="tab-departments" class="tab-content hidden"></div>
        <div id="tab-streaks" class="tab-content hidden"></div>
        <div id="tab-reasons" class="tab-content hidden"></div>
        <div id="tab-settings" class="tab-content hidden"></div>
        <div id="tab-reservations" class="tab-content hidden"></div>
      </div>
    </section>
  </main>

  <script src="config.js"></script>
  <script>
    const CONFIG = window.APP_CONFIG;
    const TABS = [
      ['dashboard', 'ダッシュボード'],
      ['meetings', '会議管理'],
      ['attendance', '出欠一覧'],
      ['members', '個人別集計'],
      ['departments', '部局別集計'],
      ['streaks', '連続欠席'],
      ['reasons', '欠席理由'],
      ['settings', '設定'],
      ['reservations', '予約管理'],
    ];
    const AUTH_KEY = 'meeting-system-admin-auth';
    const PASSWORD_KEY = 'meeting-system-admin-password';

    let state = {
      systemName: '会議室予約・出欠管理システム',
      reservations: [],
      rooms: [],
      settings: [],
      members: [],
      meetings: [],
      attendanceResponses: [],
      meetingAggregations: [],
      memberAggregations: [],
      departmentAggregations: [],
      streaks: [],
      activeTab: 'dashboard',
      selectedReservationIds: new Set(),
    };

    document.addEventListener('DOMContentLoaded', async () => {
      await loadPublicSettings();
      if (sessionStorage.getItem(AUTH_KEY) === '1' && sessionStorage.getItem(PASSWORD_KEY)) {
        showAdmin();
        await reloadAll(false);
      }
    });

    /**
     * 管理画面のタイトル表示に使う公開設定を読み込みます。
     *
     * @return {Promise<void>} 読み込み完了。
     */
    async function loadPublicSettings() {
      try {
        const res = await fetch(`${CONFIG.GAS_API_URL}?action=get_public_settings`);
        const data = await res.json();
        if (data.ok && data.systemName) {
          state.systemName = data.systemName;
        }
      } catch (_) {
      }
      document.title = `${state.systemName} - 管理画面`;
      document.getElementById('system-name').textContent = `${state.systemName} - 管理画面`;
      document.getElementById('login-title').textContent = `${state.systemName} - 管理画面`;
    }

    /**
     * 入力された管理者パスワードを GAS で検証し、成功時に管理画面を表示します。
     *
     * @return {Promise<void>} ログイン処理完了。
     */
    async function login() {
      const password = document.getElementById('login-password').value;
      if (!password) {
        showMessage('login-message', 'パスワードを入力してください。', 'error');
        return;
      }
      try {
        const res = await fetch(CONFIG.GAS_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'verifyAdminPassword', payload: { adminPassword: password } }),
        });
        const data = await res.json();
        if (!data.ok) {
          showMessage('login-message', data.error || 'ログインできません。', 'error');
          return;
        }
        sessionStorage.setItem(AUTH_KEY, '1');
        sessionStorage.setItem(PASSWORD_KEY, password);
        showAdmin();
        await reloadAll(false);
      } catch (_) {
        showMessage('login-message', '通信エラーが発生しました。', 'error');
      }
    }

    /**
     * セッション上の認証情報を削除してログイン画面に戻します。
     */
    function logout() {
      sessionStorage.removeItem(AUTH_KEY);
      sessionStorage.removeItem(PASSWORD_KEY);
      state.selectedReservationIds = new Set();
      document.getElementById('admin-screen').classList.add('hidden');
      document.getElementById('login-screen').classList.remove('hidden');
      document.getElementById('login-password').value = '';
    }

    /**
     * 管理画面本体を表示し、タブナビゲーションを描画します。
     */
    function showAdmin() {
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('admin-screen').classList.remove('hidden');
      renderTabs();
    }

    /**
     * 管理画面上部のタブボタンを描画します。
     */
    function renderTabs() {
      const nav = document.getElementById('tab-nav');
      nav.innerHTML = TABS.map(([key, label]) => `<button class="tab-button ${state.activeTab === key ? 'active' : ''}" onclick="switchTab('${key}')">${label}</button>`).join('');
    }

    /**
     * 表示する管理タブを切り替えます。
     *
     * @param {string} tabKey 表示するタブキー。
     */
    function switchTab(tabKey) {
      state.activeTab = tabKey;
      renderTabs();
      document.querySelectorAll('.tab-content').forEach((el) => el.classList.add('hidden'));
      document.getElementById(`tab-${tabKey}`).classList.remove('hidden');
    }

    /**
     * 管理画面で使う全シートの CSV を並列読み込みし、全タブを再描画します。
     *
     * @param {boolean} showToast true の場合は読み込み完了メッセージを表示します。
     * @return {Promise<void>} 読み込み完了。
     */
    async function reloadAll(showToast) {
      const results = await Promise.all([
        fetchSheetCsv('reservations', reservationMapper),
        fetchSheetCsv('rooms', roomMapper),
        fetchSheetCsv('settings', settingMapper),
        fetchSheetCsv('members', memberMapper),
        fetchSheetCsv('meetings', meetingMapper),
        fetchSheetCsv('attendanceResponses', attendanceMapper),
        fetchSheetCsv('meetingAggregations', meetingAggregationMapper),
        fetchSheetCsv('memberAggregations', memberAggregationMapper),
        fetchSheetCsv('departmentAggregations', departmentAggregationMapper),
        fetchSheetCsv('streaks', streakMapper),
      ]);
      [
        state.reservations,
        state.rooms,
        state.settings,
        state.members,
        state.meetings,
        state.attendanceResponses,
        state.meetingAggregations,
        state.memberAggregations,
        state.departmentAggregations,
        state.streaks,
      ] = results;
      renderAll();
      if (showToast) {
        showGlobal('最新データを再読み込みしました。', 'success');
      }
    }

    /**
     * config.js の設定を使って指定シートの CSV を取得し、画面用オブジェクトへ変換します。
     *
     * @param {string} key config.js の SHEET_GID / SHEET_NAME に対応するキー。
     * @param {Function} mapper CSV 行オブジェクトを画面用データへ変換する関数。
     * @return {Promise<Array<Object>>} 変換済みデータ配列。
     */
    async function fetchSheetCsv(key, mapper) {
      const url = CONFIG.buildSheetCsvUrl(key, true);
      if (!url) return [];
      try {
        const text = CONFIG.fetchSheetCsvText ? await CONFIG.fetchSheetCsvText(key, true) : await fetch(url).then((res) => res.text());
        return parseCsv(text, mapper);
      } catch (_) {
        return [];
      }
    }

    /**
     * CSV 文字列をヘッダー付き行オブジェクトへ変換し、mapper を通します。
     *
     * @param {string} text CSV 文字列。
     * @param {Function} mapper 行変換関数。
     * @return {Array<Object>} 変換済みデータ配列。
     */
    function parseCsv(text, mapper) {
      const rows = parseCsvRows(text);
      if (rows.length < 2) return [];
      const headers = rows[0];
      return rows.slice(1)
        .filter((row) => row.some((cell) => String(cell || '').trim() !== ''))
        .map((row) => mapper(rowToObject(headers, row)))
        .filter(Boolean);
    }

    /**
     * ダブルクォート内のカンマや改行を考慮して CSV を2次元配列へ分解します。
     *
     * @param {string} text CSV 文字列。
     * @return {Array<Array<string>>} CSV 行配列。
     */
    function parseCsvRows(text) {
      const rows = [];
      let row = [];
      let value = '';
      let inQuotes = false;
      for (let i = 0; i < text.length; i += 1) {
        const char = text[i];
        if (char === '"') {
          if (inQuotes && text[i + 1] === '"') {
            value += '"';
            i += 1;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === ',' && !inQuotes) {
          row.push(value);
          value = '';
        } else if ((char === '\n' || char === '\r') && !inQuotes) {
          if (char === '\r' && text[i + 1] === '\n') i += 1;
          row.push(value);
          rows.push(row);
          row = [];
          value = '';
        } else {
          value += char;
        }
      }
      if (value.length || row.length) {
        row.push(value);
        rows.push(row);
      }
      return rows;
    }

    /**
     * ヘッダー配列と値配列から、列名をキーにしたオブジェクトを作ります。
     *
     * @param {Array<string>} headers CSV ヘッダー。
     * @param {Array<string>} row CSV 1行分の値。
     * @return {Object} 行オブジェクト。
     */
    function rowToObject(headers, row) {
      const obj = {};
      headers.forEach((header, index) => {
        obj[String(header || '').trim()] = String(row[index] || '').trim();
      });
      return obj;
    }

    /**
     * 予約 CSV の日本語列名を画面用キーへ変換します。
     *
     * @param {Object} row CSV 行オブジェクト。
     * @return {Object|null} 予約情報。
     */
    function reservationMapper(row) {
      if (!row['予約ID']) return null;
      return {
        reservationId: row['予約ID'],
        organizationName: row['団体名'],
        meetingName: row['会議名'],
        userName: row['お名前'],
        roomId: row['会議室ID'],
        roomName: row['会議室名'],
        usageDate: normalizeDate(row['利用日']),
        startTime: normalizeTime(row['開始時間']),
        endTime: normalizeTime(row['終了時間']),
        status: row['ステータス'],
      };
    }

    /**
     * 会議室 CSV の日本語列名を画面用キーへ変換します。
     *
     * @param {Object} row CSV 行オブジェクト。
     * @return {Object|null} 会議室情報。
     */
    function roomMapper(row) {
      if (!row['会議室ID']) return null;
      return {
        roomId: row['会議室ID'],
        roomName: row['会議室名'],
      };
    }

    /**
     * 設定 CSV の日本語列名を画面用キーへ変換します。
     *
     * @param {Object} row CSV 行オブジェクト。
     * @return {Object|null} 設定情報。
     */
    function settingMapper(row) {
      if (!row['設定キー']) return null;
      return {
        settingKey: row['設定キー'],
        settingValue: row['設定値'],
        description: row['説明'],
        updatedAt: row['更新日時'],
      };
    }

    /**
     * メンバー一覧 CSV の日本語列名を画面用キーへ変換します。
     *
     * @param {Object} row CSV 行オブジェクト。
     * @return {Object|null} メンバー情報。
     */
    function memberMapper(row) {
      if (!row['メンバーID']) return null;
      return {
        memberId: row['メンバーID'],
        name: row['名前'],
        department: row['部局'],
        grade: row['学年'],
        role: row['役職'],
        displayOrder: Number(row['表示順'] || 0),
        status: row['有効状態'],
      };
    }

    /**
     * 会議一覧 CSV の日本語列名を画面用キーへ変換します。
     *
     * @param {Object} row CSV 行オブジェクト。
     * @return {Object|null} 会議情報。
     */
    function meetingMapper(row) {
      if (!row['会議ID']) return null;
      return {
        meetingId: row['会議ID'],
        meetingName: row['会議名'],
        meetingDate: normalizeDate(row['会議日']),
        startTime: normalizeTime(row['開始時間']),
        endTime: normalizeTime(row['終了時間']),
        recruitStartAt: normalizeDateTime(row['募集開始日時']),
        recruitEndAt: normalizeDateTime(row['募集終了日時']),
        answerDeadlineAt: normalizeDateTime(row['回答締切日時']),
        note: row['備考'],
        status: row['有効状態'],
      };
    }

    /**
     * 出欠回答 CSV の日本語列名を画面用キーへ変換します。
     *
     * @param {Object} row CSV 行オブジェクト。
     * @return {Object|null} 出欠回答。
     */
    function attendanceMapper(row) {
      if (!row['回答ID']) return null;
      return {
        answerId: row['回答ID'],
        meetingId: row['会議ID'],
        memberId: row['メンバーID'],
        name: row['名前'],
        department: row['部局'],
        grade: row['学年'],
        role: row['役職'],
        attendance: row['出欠'],
        absenceReason: row['欠席理由'],
        absenceDetail: row['欠席理由詳細'],
        answeredAt: row['回答日時'],
        updatedAt: row['更新日時'],
      };
    }

    /**
     * 会議別集計 CSV の日本語列名を画面用キーへ変換します。
     *
     * @param {Object} row CSV 行オブジェクト。
     * @return {Object|null} 会議別集計。
     */
    function meetingAggregationMapper(row) {
      if (!row['会議ID']) return null;
      return {
        meetingId: row['会議ID'],
        meetingName: row['会議名'],
        meetingDate: normalizeDate(row['会議日']),
        targetCount: Number(row['対象人数'] || 0),
        attendCount: Number(row['出席回答数'] || 0),
        absenceCount: Number(row['欠席回答数'] || 0),
        unansweredCount: Number(row['未提出数'] || 0),
        effectiveAttendCount: Number(row['出席扱い人数'] || 0),

    /**
     * 会議一覧と有効メンバー、回答済みデータから出欠一覧行を作成します。
     *
     * @return {Array<Object>} 出欠一覧用の行データ。
     */
    function buildAttendanceRows() {
      const activeMembers = state.members.filter((member) => member.status === '有効').sort((a, b) => a.displayOrder - b.displayOrder || a.name.localeCompare(b.name, 'ja'));
      const activeMeetings = state.meetings.filter((meeting) => meeting.status === '有効').sort((a, b) => `${a.meetingDate}${a.startTime}`.localeCompare(`${b.meetingDate}${b.startTime}`));
      const responseMap = new Map(state.attendanceResponses.map((item) => [`${item.meetingId}__${item.memberId}`, item]));
      const rows = [];
      activeMeetings.forEach((meeting) => {
        activeMembers.forEach((member) => {
          const response = responseMap.get(`${meeting.meetingId}__${member.memberId}`);
          rows.push({
            meetingName: meeting.meetingName,
            meetingDate: meeting.meetingDate,
            name: member.name,
            department: member.department,
            grade: member.grade,
            role: member.role,
            answerState: response ? response.attendance : '未提出',
            aggregateStatus: response && response.attendance === '欠席' ? '欠席扱い' : '出席扱い',
            absenceReason: response ? response.absenceReason : '',
            absenceDetail: response ? response.absenceDetail : '',
            answeredAt: response ? response.answeredAt : '',
            updatedAt: response ? response.updatedAt : '',
          });
        });
      });
      return rows;
    }

    /**
     * 2次元配列をシンプルな HTML テーブルに変換します。
     *
     * @param {Array<string>} headers 表ヘッダー。
     * @param {Array<Array<*>>} rows 表示行。
     * @return {string} テーブル HTML。
     */
    function renderSimpleTable(headers, rows) {
      return `<table><thead><tr>${headers.map((header) => `<th>${header}</th>`).join('')}</tr></thead><tbody>${rows.length ? rows.map((row) => `<tr>${row.map((cell) => `<td>${cell === 0 ? '0' : (cell || '')}</td>`).join('')}</tr>`).join('') : `<tr><td colspan="${headers.length}" class="muted">データがありません。</td></tr>`}</tbody></table>`;
    }

    function fillMeetingForm(meetingId) {

      document.getElementById('meeting-id').value = meeting.meetingId;
      document.getElementById('meeting-name').value = meeting.meetingName;
      document.getElementById('meeting-date').value = meeting.meetingDate;
      document.getElementById('meeting-start').value = meeting.startTime;
      document.getElementById('meeting-end').value = meeting.endTime;
      document.getElementById('meeting-status').value = meeting.status;
      document.getElementById('meeting-recruit-start').value = toDateTimeLocal(meeting.recruitStartAt);

      document.getElementById('meeting-deadline').value = toDateTimeLocal(meeting.answerDeadlineAt);
      document.getElementById('meeting-note').value = meeting.note;

    /**
     * 会議編集フォームの内容を GAS API へ送信して保存します。
     *
     * @return {Promise<void>} 保存処理完了。
     */
    async function saveMeeting() {
      try {
        const res = await fetch(CONFIG.GAS_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'saveMeeting',
            payload: {
              adminPassword: getAdminPassword(),
              meetingId: document.getElementById('meeting-id').value.trim(),
              meetingName: document.getElementById('meeting-name').value.trim(),
              meetingDate: document.getElementById('meeting-date').value,
              startTime: document.getElementById('meeting-start').value,
              endTime: document.getElementById('meeting-end').value,
              recruitStartAt: document.getElementById('meeting-recruit-start').value,
              recruitEndAt: document.getElementById('meeting-recruit-end').value,
              answerDeadlineAt: document.getElementById('meeting-deadline').value,
              note: document.getElementById('meeting-note').value.trim(),
              status: document.getElementById('meeting-status').value,
            },
          }),
        });
        const data = await res.json();
        if (!data.ok) {
          showGlobal(data.error || '会議を保存できません。', 'error');
          return;
        }
        await reloadAll(false);
        clearMeetingForm();
        showGlobal('会議を保存しました。', 'success');
      } catch (_) {
        showGlobal('通信エラーが発生しました。', 'error');
      }
    }

    /**
     * GAS API へ集計再計算を依頼し、完了後に全データを再読み込みします。
     *
     * @return {Promise<void>} 集計更新完了。
     */
    async function refreshAggregations() {
      try {
        const res = await fetch(CONFIG.GAS_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'refreshAggregations', payload: { adminPassword: getAdminPassword() } }),
        });
        const data = await res.json();
        if (!data.ok) {
          showGlobal(data.error || '集計更新に失敗しました。', 'error');
          return;
        }
        await reloadAll(false);
        showGlobal('集計を更新しました。', 'success');
      } catch (_) {
        showGlobal('通信エラーが発生しました。', 'error');
      }
    }

    /**
     * 指定された設定キーの入力値を GAS API へ送信して保存します。
     *
     * @param {string} settingKey 更新対象の設定キー。
     * @return {Promise<void>} 設定更新完了。
     */
    async function saveSetting(settingKey) {
      const input = document.getElementById(`setting-${settingKey}`);
      try {
        const res = await fetch(CONFIG.GAS_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'updateSetting',
            payload: {
              adminPassword: getAdminPassword(),
              settingKey,
              settingValue: input.value.trim(),
            },
          }),
        });
        const data = await res.json();
        if (!data.ok) {
          showGlobal(data.error || '設定更新に失敗しました。', 'error');
          return;
        }
        await loadPublicSettings();
        await reloadAll(false);
        showGlobal(`${settingKey} を更新しました。`, 'success');
      } catch (_) {
        showGlobal('通信エラーが発生しました。', 'error');
      }
    }

    /**
     * 予約IDの選択状態を切り替えます。
     *
     * @param {string} reservationId 予約ID。
     */
    function toggleReservationSelection(reservationId) {
      if (state.selectedReservationIds.has(reservationId)) {
        state.selectedReservationIds.delete(reservationId);
      } else {
        state.selectedReservationIds.add(reservationId);
      }
      renderReservationsTab();
    }

    /**
     * 取消済み以外の予約をすべて選択します。
     */
    function selectAllReservations() {
      state.reservations.forEach((item) => {
        if (item.status !== '取消') state.selectedReservationIds.add(item.reservationId);
      });
      renderReservationsTab();
    }

    /**
     * 予約の選択状態をすべて解除します。
     */
    function clearReservationSelection() {
      state.selectedReservationIds = new Set();
      renderReservationsTab();
    }

    /**
     * 選択された予約を GAS API 経由で取消状態に更新します。
     *
     * @return {Promise<void>} 取消処理完了。
     */
    async function deleteSelectedReservations() {
      const ids = Array.from(state.selectedReservationIds);
      if (!ids.length) {
        showGlobal('削除する予約を選択してください。', 'error');
        return;
      }
      if (!window.confirm(`${ids.length}件の予約を取消に更新します。続けますか。`)) {
        return;
      }
      try {
        const res = await fetch(CONFIG.GAS_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'admin_delete',
            payload: { adminPassword: getAdminPassword(), reservation_ids: ids },
          }),
        });
        const data = await res.json();
        if (!data.ok) {
          showGlobal(data.error || '予約削除に失敗しました。', 'error');
          return;
        }
        state.selectedReservationIds = new Set();
        await reloadAll(false);
        showGlobal(`${data.deleted.length}件の予約を取消に更新しました。`, 'success');
      } catch (_) {
        showGlobal('通信エラーが発生しました。', 'error');
      }
    }

    /**
     * sessionStorage から管理者パスワードを取得します。
     *
     * @return {string} 管理者パスワード。
     */
    function getAdminPassword() {
      return sessionStorage.getItem(PASSWORD_KEY) || '';
    }

    /**
     * 会議が現在募集中かどうかを判定します。
     *
     * @param {Object} meeting 会議情報。
     * @return {boolean} 募集中の場合は true。
     */
    function isRecruiting(meeting) {
      const now = new Date();
      const start = new Date(meeting.recruitStartAt);
      const end = new Date(meeting.recruitEndAt);
      return !Number.isNaN(start.getTime()) && !Number.isNaN(end.getTime()) && start <= now && now <= end;
    }

    /**
     * 指定要素にメッセージを表示します。
     *
     * @param {string} id 表示先要素ID。
     * @param {string} text 表示文。
     * @param {string} type success または error。
     */
    function showMessage(id, text, type) {
      const el = document.getElementById(id);
      el.className = type === 'error' ? 'message message-error' : 'message message-success';
      el.textContent = text;
      el.classList.remove('hidden');
    }

    /**
     * 管理画面全体用のメッセージを表示します。
     *
     * @param {string} text 表示文。
     * @param {string} type success または error。
     */
    function showGlobal(text, type) {
      const el = document.getElementById('global-message');
      el.className = type === 'error' ? 'message message-error' : 'message message-success';
      el.textContent = text;
      el.classList.remove('hidden');
      clearTimeout(showGlobal.timer);
      showGlobal.timer = setTimeout(() => el.classList.add('hidden'), 5000);
    }

    /**
     * 連続欠席の注意レベルをバッジ HTML に変換します。
     *
     * @param {string} level 注意レベル。
     * @return {string} バッジ HTML。
     */
    function renderLevelBadge(level) {
      const cls = level === '要確認' ? 'badge-danger' : level === '注意' ? 'badge-warn' : 'badge-ok';
      return `<span class="badge ${cls}">${escapeHtml(level || '通常')}</span>`;
    }

    /**
     * 日付文字列を yyyy-MM-dd に近い形式へ整えます。
     *
     * @param {*} value 対象値。
     * @return {string} 正規化済み日付。
     */
    function normalizeDate(value) {
      return String(value || '').replace(/\//g, '-').slice(0, 10);
    }

    /**
     * 時刻文字列を HH:mm 形式へ整えます。
     *
     * @param {*} value 対象値。
     * @return {string} 正規化済み時刻。
     */
    function normalizeTime(value) {
      const match = String(value || '').trim().match(/^(\d{1,2}):(\d{1,2})/);
      return match ? `${String(match[1]).padStart(2, '0')}:${String(match[2]).padStart(2, '0')}` : String(value || '').trim();
    }

    /**
     * 日時文字列を Date で解釈しやすい ISO 風表記へ整えます。
     *
     * @param {*} value 対象値。
     * @return {string} 正規化済み日時。
     */
    function normalizeDateTime(value) {
      return String(value || '').trim().replace(/\//g, '-').replace(' ', 'T');
    }

    /**
     * 日付を画面表示用ラベルに変換します。
     *
     * @param {string} value yyyy-MM-dd 形式の日付。
     * @return {string} 表示用日付。
     */
    function formatDateLabel(value) {
      if (!value) return '';
      const date = new Date(`${value}T00:00:00`);
      if (Number.isNaN(date.getTime())) return value;
      const days = ['日', '月', '火', '水', '木', '金', '土'];
      return `${date.getMonth() + 1}/${date.getDate()}(${days[date.getDay()]})`;
    }

    /**
     * 日時を画面表示用ラベルに変換します。
     *
     * @param {string} value 日時文字列。
     * @return {string} 表示用日時。
     */
    function formatDateTimeLabel(value) {
      if (!value) return '';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      const days = ['日', '月', '火', '水', '木', '金', '土'];
      return `${date.getFullYear()}/${date.getMonth() + 1}/${date.getDate()}(${days[date.getDay()]}) ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
    }

    /**
     * Date で解釈できる日時を datetime-local 入力値へ変換します。
     *
     * @param {string} value 日時文字列。
     * @return {string} datetime-local 用の値。
     */
    function toDateTimeLocal(value) {
      if (!value) return '';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}T${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
    }

    /**
     * シートから取得した割合表記を 0 から 1 の数値へ変換します。
     *
     * @param {*} value 割合値またはパーセント文字列。
     * @return {number} 0 から 1 の割合。
     */
    function toRatio(value) {
      const text = String(value || '').trim();
      if (!text) return 0;
      if (text.endsWith('%')) return Number(text.replace('%', '')) / 100;
      const numeric = Number(text);
      return numeric > 1 ? numeric / 100 : numeric;
    }

    /**
     * 0 から 1 の割合をパーセント表記へ変換します。
     *
     * @param {*} value 割合値。
     * @return {string} パーセント表示。
     */
    function formatPercent(value) {
      return `${(Number(value || 0) * 100).toFixed(1)}%`;
    }

    /**
     * HTML へ埋め込む文字列をエスケープします。
     *
     * @param {*} text 対象値。
     * @return {string} エスケープ済み文字列。
     */
    function escapeHtml(text) {
      return String(text || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    /**
     * HTML 属性へ埋め込む文字列をエスケープします。
     *
     * @param {*} text 対象値。
     * @return {string} エスケープ済み文字列。
     */
    function escapeAttr(text) {
      return escapeHtml(text).replace(/'/g, '&#39;');
    }

    /**
     * JavaScript 文字列リテラルへ埋め込む値をエスケープします。
     *
     * @param {*} text 対象値。
     * @return {string} エスケープ済み文字列。
     */
    function escapeJs(text) {
      return String(text || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    }
  </script>
</body>

</html>
