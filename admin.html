<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>管理画面</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .hidden { display: none !important; }
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: radial-gradient(circle at top left, rgba(29,111,214,.09), transparent 25%), linear-gradient(180deg,#fbfcfe 0%,#edf2f9 100%); }
    .data-table { width: 100%; border-collapse: collapse; min-width: 640px; }
    .data-table th { background: #f8fbff; font-weight: 800; color: #647085; font-size: 12px; padding: 10px 12px; text-align: left; border-bottom: 2px solid #e2eaf5; position: sticky; top: 0; white-space: nowrap; }
    .data-table td { padding: 9px 12px; font-size: 13px; border-bottom: 1px solid #f0f4fb; vertical-align: top; color: #2d3a52; }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: #f8fbff; }
    .data-table input { min-height: 36px; width: 100%; border: 1px solid #d7e0ec; border-radius: 8px; padding: 4px 10px; font-size: 13px; background: #fff; color: #172033; }
    .data-table input:focus { outline: none; box-shadow: 0 0 0 2px rgba(29,111,214,0.2); border-color: #1d6fd6; }
  </style>
</head>

<body class="min-h-screen text-gray-800">

  <!-- ローディングオーバーレイ -->
  <div id="loading-overlay" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center">
    <div class="bg-white rounded-2xl px-8 py-6 flex flex-col items-center gap-3 shadow-2xl">
      <div class="w-10 h-10 border-4 border-blue-100 border-t-blue-600 rounded-full animate-spin"></div>
      <p id="loading-text" class="text-sm text-gray-600 font-semibold">処理中...</p>
    </div>
  </div>

  <main class="max-w-6xl mx-auto px-4 py-5 pb-16 flex flex-col gap-5">

    <!-- ログイン画面 -->
    <section id="login-screen" class="max-w-md mx-auto w-full mt-12 bg-white/95 border border-slate-200 rounded-2xl shadow-lg p-6 flex flex-col gap-4">
      <div>
        <div id="login-title" class="text-2xl sm:text-3xl font-black text-gray-900 leading-tight">管理画面</div>
        <div class="text-sm text-gray-500 mt-1 leading-relaxed">会議室予約管理と会議出欠管理を同じ画面で扱います。認証状態はこのブラウザのセッションにだけ保持します。</div>
      </div>
      <label class="flex flex-col gap-1 text-xs font-semibold text-gray-500">
        管理者パスワード
        <input id="login-password" type="password" placeholder="設定シートのパスワード"
          class="min-h-[46px] border border-slate-200 rounded-xl bg-white text-gray-900 px-3 py-2.5 text-sm font-normal focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition w-full">
      </label>
      <div class="flex flex-wrap gap-2">
        <button type="button" onclick="login()"
          class="flex-1 min-h-[46px] bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold text-sm transition shadow-sm">ログイン</button>
        <a href="index.html"
          class="flex-1 flex items-center justify-center min-h-[46px] bg-white border border-blue-500 text-blue-600 hover:bg-blue-50 rounded-xl font-bold text-sm transition">トップへ戻る</a>
      </div>
      <div id="login-message" class="hidden rounded-xl px-4 py-3 text-sm"></div>
    </section>

    <!-- 管理画面本体 -->
    <section id="admin-screen" class="hidden bg-white/95 border border-slate-200 rounded-2xl shadow-lg">
      <!-- ヘッダー -->
      <div class="px-5 py-4 flex flex-wrap gap-3 justify-between items-center border-b border-slate-100">
        <div>
          <h1 id="system-name" class="text-2xl font-black text-gray-900">管理画面</h1>
          <div class="text-xs text-gray-400 mt-0.5">CSV 直接読み込みで一覧を表示し、更新系だけ GAS API に送信します。</div>
        </div>
        <div class="flex gap-2 flex-wrap">
          <button type="button" onclick="reloadAll(true)"
            class="min-h-[40px] px-4 bg-white border border-blue-500 text-blue-600 hover:bg-blue-50 rounded-xl font-bold text-sm transition">最新化</button>
          <button type="button" onclick="logout()"
            class="min-h-[40px] px-4 bg-slate-100 hover:bg-slate-200 text-gray-700 rounded-xl font-bold text-sm transition">ログアウト</button>
        </div>
      </div>
      <!-- タブナビ -->
      <div id="tab-nav" class="px-5 py-3 flex flex-wrap gap-1.5 border-b border-slate-100 overflow-x-auto"></div>
      <!-- コンテンツ -->
      <div class="p-5 flex flex-col gap-5">
        <div id="global-message" class="hidden rounded-xl px-4 py-3 text-sm"></div>
        <div id="tab-dashboard" class="tab-content"></div>
        <div id="tab-meetings" class="tab-content hidden"></div>
        <div id="tab-attendance" class="tab-content hidden"></div>
        <div id="tab-members" class="tab-content hidden"></div>
        <div id="tab-departments" class="tab-content hidden"></div>
        <div id="tab-streaks" class="tab-content hidden"></div>
        <div id="tab-reasons" class="tab-content hidden"></div>
        <div id="tab-settings" class="tab-content hidden"></div>
        <div id="tab-reservations" class="tab-content hidden"></div>
      </div>
    </section>

  </main>

  <script src="config.js"></script>
  <script>
    const CONFIG = window.APP_CONFIG;
    const TABS = [
      ['dashboard', 'ダッシュボード'],
      ['meetings', '会議管理'],
      ['attendance', '出欠一覧'],
      ['members', '個人別集計'],
      ['departments', '部局別集計'],
      ['streaks', '連続欠席'],
      ['reasons', '欠席理由'],
      ['settings', '設定'],
      ['reservations', '予約管理'],
    ];
    const AUTH_KEY = 'meeting-system-admin-auth';
    const PASSWORD_KEY = 'meeting-system-admin-password';

    let state = {
      systemName: '会議室予約・出欠管理システム',
      reservations: [],
      rooms: [],
      settings: [],
      members: [],
      meetings: [],
      attendanceResponses: [],
      meetingAggregations: [],
      memberAggregations: [],
      departmentAggregations: [],
      streaks: [],
      activeTab: 'dashboard',
      selectedReservationIds: new Set(),
    };

    // ============================================================
    // ローディング
    // ============================================================
    function showLoading(text) {
      document.getElementById('loading-text').textContent = text || '処理中...';
      document.getElementById('loading-overlay').classList.remove('hidden');
    }
    function hideLoading() {
      document.getElementById('loading-overlay').classList.add('hidden');
    }

    // ============================================================
    // 初期化
    // ============================================================
    document.addEventListener('DOMContentLoaded', async () => {
      await loadPublicSettings();
      if (sessionStorage.getItem(AUTH_KEY) === '1' && sessionStorage.getItem(PASSWORD_KEY)) {
        showAdmin();
        await reloadAll(false);
      }
    });

    async function loadPublicSettings() {
      try {
        const res = await fetch(`${CONFIG.GAS_API_URL}?action=get_public_settings`);
        const data = await res.json();
        if (data.ok && data.systemName) {
          state.systemName = data.systemName;
        }
      } catch (_) {
      }
      document.title = `${state.systemName} - 管理画面`;
      document.getElementById('system-name').textContent = `${state.systemName} - 管理画面`;
      document.getElementById('login-title').textContent = `${state.systemName} - 管理画面`;
    }

    // ============================================================
    // 認証
    // ============================================================
    async function login() {
      const password = document.getElementById('login-password').value;
      if (!password) {
        showMessage('login-message', 'パスワードを入力してください。', 'error');
        return;
      }
      showLoading('ログイン中...');
      try {
        const res = await fetch(CONFIG.GAS_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ action: 'verifyAdminPassword', payload: { adminPassword: password } }),
        });
        const data = await res.json();
        if (!data.ok) {
          hideLoading();
          showMessage('login-message', data.error || 'ログインできません。', 'error');
          return;
        }
        sessionStorage.setItem(AUTH_KEY, '1');
        sessionStorage.setItem(PASSWORD_KEY, password);
        showAdmin();
        await reloadAll(false);
      } catch (_) {
        showMessage('login-message', '通信エラーが発生しました。', 'error');
      }
      hideLoading();
    }

    function logout() {
      sessionStorage.removeItem(AUTH_KEY);
      sessionStorage.removeItem(PASSWORD_KEY);
      state.selectedReservationIds = new Set();
      document.getElementById('admin-screen').classList.add('hidden');
      document.getElementById('login-screen').classList.remove('hidden');
      document.getElementById('login-password').value = '';
    }

    function showAdmin() {
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('admin-screen').classList.remove('hidden');
      renderTabs();
    }

    // ============================================================
    // タブ
    // ============================================================
    function renderTabs() {
      const nav = document.getElementById('tab-nav');
      nav.innerHTML = TABS.map(([key, label]) => {
        const active = state.activeTab === key;
        const cls = active
          ? 'min-h-[34px] px-3 text-xs font-bold rounded-lg bg-blue-600 text-white border border-blue-600 transition whitespace-nowrap'
          : 'min-h-[34px] px-3 text-xs font-bold rounded-lg bg-white text-gray-500 border border-slate-200 hover:bg-slate-50 transition whitespace-nowrap';
        return `<button type="button" class="${cls}" onclick="switchTab('${key}')">${label}</button>`;
      }).join('');
    }

    function switchTab(tabKey) {
      state.activeTab = tabKey;
      renderTabs();
      document.querySelectorAll('.tab-content').forEach((el) => el.classList.add('hidden'));
      document.getElementById(`tab-${tabKey}`).classList.remove('hidden');
    }

    // ============================================================
    // データ読み込み
    // ============================================================
    async function reloadAll(showToast) {
      showLoading('データを読み込み中...');
      const results = await Promise.all([
        fetchSheetCsv('reservations', reservationMapper),
        fetchSheetCsv('rooms', roomMapper),
        fetchSheetCsv('settings', settingMapper),
        fetchSheetCsv('members', memberMapper),
        fetchSheetCsv('meetings', meetingMapper),
        fetchSheetCsv('attendanceResponses', attendanceMapper),
        fetchSheetCsv('meetingAggregations', meetingAggregationMapper),
        fetchSheetCsv('memberAggregations', memberAggregationMapper),
        fetchSheetCsv('departmentAggregations', departmentAggregationMapper),
        fetchSheetCsv('streaks', streakMapper),
      ]);
      [
        state.reservations,
        state.rooms,
        state.settings,
        state.members,
        state.meetings,
        state.attendanceResponses,
        state.meetingAggregations,
        state.memberAggregations,
        state.departmentAggregations,
        state.streaks,
      ] = results;
      renderAll();
      hideLoading();
      if (showToast) {
        showGlobal('最新データを再読み込みしました。', 'success');
      }
    }

    async function fetchSheetCsv(key, mapper) {
      const url = CONFIG.buildSheetCsvUrl(key, true);
      if (!url) return [];
      try {
        const text = CONFIG.fetchSheetCsvText ? await CONFIG.fetchSheetCsvText(key, true) : await fetch(url).then((res) => res.text());
        return parseCsv(text, mapper);
      } catch (_) {
        return [];
      }
    }

    function parseCsv(text, mapper) {
      const rows = parseCsvRows(text);
      if (rows.length < 2) return [];
      const headers = rows[0];
      return rows.slice(1)
        .filter((row) => row.some((cell) => String(cell || '').trim() !== ''))
        .map((row) => mapper(rowToObject(headers, row)))
        .filter(Boolean);
    }

    function parseCsvRows(text) {
      const rows = [];
      let row = [];
      let value = '';
      let inQuotes = false;
      for (let i = 0; i < text.length; i += 1) {
        const char = text[i];
        if (char === '"') {
          if (inQuotes && text[i + 1] === '"') {
            value += '"';
            i += 1;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === ',' && !inQuotes) {
          row.push(value);
          value = '';
        } else if ((char === '\n' || char === '\r') && !inQuotes) {
          if (char === '\r' && text[i + 1] === '\n') i += 1;
          row.push(value);
          rows.push(row);
          row = [];
          value = '';
        } else {
          value += char;
        }
      }
      if (value.length || row.length) {
        row.push(value);
        rows.push(row);
      }
      return rows;
    }

    function rowToObject(headers, row) {
      const obj = {};
      headers.forEach((header, index) => {
        obj[String(header || '').trim()] = String(row[index] || '').trim();
      });
      return obj;
    }

    // ============================================================
    // マッパー
    // ============================================================
    function reservationMapper(row) {
      if (!row['予約ID']) return null;
      return {
        reservationId: row['予約ID'],
        organizationName: row['団体名'],
        meetingName: row['会議名'],
        userName: row['お名前'],
        roomId: row['会議室ID'],
        roomName: row['会議室名'],
        usageDate: normalizeDate(row['利用日']),
        startTime: normalizeTime(row['開始時間']),
        endTime: normalizeTime(row['終了時間']),
        status: row['ステータス'],
      };
    }

    function roomMapper(row) {
      if (!row['会議室ID']) return null;
      return { roomId: row['会議室ID'], roomName: row['会議室名'] };
    }

    function settingMapper(row) {
      if (!row['設定キー']) return null;
      return {
        settingKey: row['設定キー'],
        settingValue: row['設定値'],
        description: row['説明'],
        updatedAt: row['更新日時'],
      };
    }

    function memberMapper(row) {
      if (!row['メンバーID']) return null;
      return {
        memberId: row['メンバーID'],
        name: row['名前'],
        department: row['部局'],
        grade: row['学年'],
        role: row['役職'],
        displayOrder: Number(row['表示順'] || 0),
        status: row['有効状態'],
      };
    }

    function meetingMapper(row) {
      if (!row['会議ID']) return null;
      return {
        meetingId: row['会議ID'],
        meetingName: row['会議名'],
        meetingDate: normalizeDate(row['会議日']),
        startTime: normalizeTime(row['開始時間']),
        endTime: normalizeTime(row['終了時間']),
        recruitStartAt: normalizeDateTime(row['募集開始日時']),
        recruitEndAt: normalizeDateTime(row['募集終了日時']),
        answerDeadlineAt: normalizeDateTime(row['回答締切日時']),
        note: row['備考'],
        status: row['有効状態'],
      };
    }

    function attendanceMapper(row) {
      if (!row['回答ID']) return null;
      return {
        answerId: row['回答ID'],
        meetingId: row['会議ID'],
        memberId: row['メンバーID'],
        name: row['名前'],
        department: row['部局'],
        grade: row['学年'],
        role: row['役職'],
        attendance: row['出欠'],
        absenceReason: row['欠席理由'],
        absenceDetail: row['欠席理由詳細'],
        answeredAt: row['回答日時'],
        updatedAt: row['更新日時'],
      };
    }

    function meetingAggregationMapper(row) {
      if (!row['会議ID']) return null;
      return {
        meetingId: row['会議ID'],
        meetingName: row['会議名'],
        meetingDate: normalizeDate(row['会議日']),
        targetCount: Number(row['対象人数'] || 0),
        attendCount: Number(row['出席回答数'] || 0),
        absenceCount: Number(row['欠席回答数'] || 0),
        unansweredCount: Number(row['未提出数'] || 0),
        effectiveAttendCount: Number(row['出席扱い人数'] || 0),
        attendanceRate: toRatio(row['参加率']),
        absenceRate: toRatio(row['欠席率']),
      };
    }

    function memberAggregationMapper(row) {
      if (!row['メンバーID']) return null;
      return {
        memberId: row['メンバーID'],
        name: row['名前'],
        department: row['部局'],
        grade: row['学年'],
        role: row['役職'],
        targetMeetingCount: Number(row['対象会議数'] || 0),
        attendCount: Number(row['出席回答数'] || 0),
        absenceCount: Number(row['欠席回答数'] || 0),
        unansweredCount: Number(row['未提出数'] || 0),
        effectiveAttendCount: Number(row['出席扱い回数'] || 0),
        attendanceRate: toRatio(row['参加率']),
        absenceStreak: Number(row['連続欠席回数'] || 0),
        lastAnsweredAt: row['最終回答日時'],
      };
    }

    function departmentAggregationMapper(row) {
      if (!row['部局']) return null;
      return {
        department: row['部局'],
        memberCount: Number(row['所属人数'] || 0),
        targetMeetingCount: Number(row['対象会議数'] || 0),
        attendCount: Number(row['出席回答数'] || 0),
        absenceCount: Number(row['欠席回答数'] || 0),
        unansweredCount: Number(row['未提出数'] || 0),
        effectiveAttendCount: Number(row['出席扱い回数'] || 0),
        attendanceRate: toRatio(row['参加率']),
        absenceRate: toRatio(row['欠席率']),
      };
    }

    function streakMapper(row) {
      if (!row['メンバーID']) return null;
      return {
        memberId: row['メンバーID'],
        name: row['名前'],
        department: row['部局'],
        grade: row['学年'],
        role: row['役職'],
        streak: Number(row['連続欠席回数'] || 0),
        alertLevel: row['注意レベル'],
        latestMeeting: row['直近欠席会議'],
        latestReason: row['直近欠席理由'],
      };
    }

    // ============================================================
    // 描画
    // ============================================================
    function renderAll() {
      renderDashboard();
      renderMeetingsTab();
      renderAttendanceTab();
      renderMembersTab();
      renderDepartmentsTab();
      renderStreaksTab();
      renderReasonsTab();
      renderSettingsTab();
      renderReservationsTab();
      switchTab(state.activeTab);
    }

    const panelCls = 'bg-white border border-slate-200 rounded-2xl p-4 sm:p-5 flex flex-col gap-3';
    const panelTitleCls = 'font-extrabold text-gray-900 text-base';
    const tableWrapCls = 'overflow-auto rounded-xl border border-slate-200';
    const noticeCls = 'bg-amber-50 border border-amber-200 rounded-xl px-3 py-2.5 text-xs text-amber-700 leading-relaxed';
    const inputCls = 'min-h-[44px] border border-slate-200 rounded-xl bg-white text-gray-900 px-3 py-2.5 text-sm font-normal focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition w-full';
    const labelCls = 'flex flex-col gap-1 text-xs font-semibold text-gray-500';
    const btnPrimary = 'min-h-[40px] px-4 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold text-sm transition shadow-sm';
    const btnSecondary = 'min-h-[40px] px-4 bg-white border border-blue-500 text-blue-600 hover:bg-blue-50 rounded-xl font-bold text-sm transition';
    const btnGhost = 'min-h-[40px] px-4 bg-slate-100 hover:bg-slate-200 text-gray-700 rounded-xl font-bold text-sm transition';
    const btnDanger = 'min-h-[40px] px-4 bg-red-600 hover:bg-red-700 text-white rounded-xl font-bold text-sm transition';
    const btnSmPrimary = 'min-h-[32px] px-3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-bold text-xs transition';
    const btnSmSecondary = 'min-h-[32px] px-3 bg-white border border-blue-500 text-blue-600 hover:bg-blue-50 rounded-lg font-bold text-xs transition';
    const btnSmGhost = 'min-h-[32px] px-3 bg-slate-100 hover:bg-slate-200 text-gray-700 rounded-lg font-bold text-xs transition';
    const btnSmDanger = 'min-h-[32px] px-3 bg-red-600 hover:bg-red-700 text-white rounded-lg font-bold text-xs transition';

    function renderDashboard() {
      const openMeetings = state.meetings.filter((m) => m.status === '有効' && isRecruiting(m));
      const upcomingMeetings = state.meetings
        .filter((m) => m.status === '有効')
        .sort((a, b) => `${a.meetingDate}${a.startTime}`.localeCompare(`${b.meetingDate}${b.startTime}`))
        .slice(0, 5);
      const overallRate = state.meetingAggregations.length
        ? state.meetingAggregations.reduce((sum, item) => sum + item.attendanceRate, 0) / state.meetingAggregations.length
        : 0;
      const warnings = state.streaks.filter((item) => item.alertLevel === '注意' || item.alertLevel === '要確認');
      const topDepartments = state.departmentAggregations.slice().sort((a, b) => b.attendanceRate - a.attendanceRate).slice(0, 4);

      document.getElementById('tab-dashboard').innerHTML = `
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
          ${[
            ['現在募集中の会議', openMeetings.length],
            ['有効メンバー', state.members.filter((m) => m.status === '有効').length],
            ['全体参加率', formatPercent(overallRate)],
            ['注意が必要なメンバー', warnings.length],
          ].map(([label, val]) => `
            <div class="bg-white border border-slate-200 rounded-2xl p-4">
              <div class="text-xs text-gray-400 mb-1.5">${label}</div>
              <div class="text-2xl font-black text-gray-900">${val}</div>
            </div>`).join('')}
        </div>
        <div class="grid sm:grid-cols-2 gap-4 mt-1">
          <div class="${panelCls}">
            <div class="${panelTitleCls}">直近の会議</div>
            ${upcomingMeetings.length
              ? upcomingMeetings.map((m) => `<div class="text-sm text-gray-600">${escapeHtml(m.meetingName)} / ${escapeHtml(formatDateLabel(m.meetingDate))} ${escapeHtml(m.startTime)}〜${escapeHtml(m.endTime)}</div>`).join('')
              : '<div class="text-sm text-gray-400">会議データがありません。</div>'}
          </div>
          <div class="${panelCls}">
            <div class="${panelTitleCls}">部局別参加率</div>
            ${topDepartments.length
              ? topDepartments.map((item) => `<div class="text-sm text-gray-600">${escapeHtml(item.department)}: ${formatPercent(item.attendanceRate)}</div>`).join('')
              : '<div class="text-sm text-gray-400">集計データがありません。</div>'}
          </div>
        </div>
        <div class="${panelCls}">
          <div class="${panelTitleCls}">会議ごとの出欠状況</div>
          <div class="${tableWrapCls}">${renderSimpleTable(['会議名', '会議日', '出席', '欠席', '未提出', '参加率'], state.meetingAggregations.map((item) => [item.meetingName, formatDateLabel(item.meetingDate), item.attendCount, item.absenceCount, item.unansweredCount, formatPercent(item.attendanceRate)]))}</div>
        </div>
      `;
    }

    function renderMeetingsTab() {
      document.getElementById('tab-meetings').innerHTML = `
        <div class="${panelCls}">
          <div class="${panelTitleCls}">会議登録・更新</div>
          <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
            <label class="${labelCls}">会議ID<input id="meeting-id" placeholder="未入力なら自動採番" class="${inputCls}"></label>
            <label class="${labelCls}">会議名<input id="meeting-name" class="${inputCls}"></label>
            <label class="${labelCls}">会議日<input id="meeting-date" type="date" class="${inputCls}"></label>
            <label class="${labelCls}">開始時間<input id="meeting-start" type="time" class="${inputCls}"></label>
            <label class="${labelCls}">終了時間<input id="meeting-end" type="time" class="${inputCls}"></label>
            <label class="${labelCls}">有効状態
              <select id="meeting-status" class="${inputCls}">
                <option value="有効">有効</option>
                <option value="無効">無効</option>
              </select>
            </label>
            <label class="${labelCls}">募集開始日時<input id="meeting-recruit-start" type="datetime-local" class="${inputCls}"></label>
            <label class="${labelCls}">募集終了日時<input id="meeting-recruit-end" type="datetime-local" class="${inputCls}"></label>
            <label class="${labelCls}">回答締切日時<input id="meeting-deadline" type="datetime-local" class="${inputCls}"></label>
          </div>
          <label class="${labelCls}">備考
            <textarea id="meeting-note" class="min-h-[80px] border border-slate-200 rounded-xl bg-white text-gray-900 px-3 py-2.5 text-sm font-normal focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition resize-vertical w-full"></textarea>
          </label>
          <div class="flex flex-wrap gap-2">
            <button type="button" onclick="saveMeeting()" class="${btnPrimary}">保存する</button>
            <button type="button" onclick="clearMeetingForm()" class="${btnGhost}">フォームをクリア</button>
            <button type="button" onclick="refreshAggregations()" class="${btnSecondary}">集計を再計算</button>
          </div>
        </div>
        <div class="${panelCls}">
          <div class="${panelTitleCls}">会議一覧</div>
          <div class="${tableWrapCls}">${renderSimpleTable(
            ['会議ID', '会議名', '会議日', '時間', '募集期間', '回答締切', '状態', '操作'],
            state.meetings.map((m) => [m.meetingId, m.meetingName, formatDateLabel(m.meetingDate), `${m.startTime}〜${m.endTime}`, `${formatDateTimeLabel(m.recruitStartAt)}〜${formatDateTimeLabel(m.recruitEndAt)}`, formatDateTimeLabel(m.answerDeadlineAt), m.status, `<button type="button" class="${btnSmSecondary}" onclick="fillMeetingForm('${escapeJs(m.meetingId)}')">編集</button>`])
          )}</div>
        </div>
      `;
    }

    function renderAttendanceTab() {
      const rows = buildAttendanceRows();
      document.getElementById('tab-attendance').innerHTML = `
        <div class="${panelCls}">
          <div class="${panelTitleCls}">出欠一覧</div>
          <div class="${noticeCls}">未提出者も一覧に出し、集計上の扱いは「出席扱い」として表示します。</div>
          <div class="${tableWrapCls}">${renderSimpleTable(
            ['会議名', '会議日', '名前', '部局', '学年', '役職', '回答状態', '集計上の扱い', '欠席理由', '欠席理由詳細', '回答日時', '更新日時'],
            rows.map((item) => [item.meetingName, formatDateLabel(item.meetingDate), item.name, item.department, item.grade, item.role, item.answerState, item.aggregateStatus, item.absenceReason, item.absenceDetail, formatDateTimeLabel(item.answeredAt), formatDateTimeLabel(item.updatedAt)])
          )}</div>
        </div>
      `;
    }

    function renderMembersTab() {
      document.getElementById('tab-members').innerHTML = `
        <div class="${panelCls}">
          <div class="${panelTitleCls}">個人別集計</div>
          <div class="${tableWrapCls}">${renderSimpleTable(
            ['名前', '部局', '学年', '役職', '対象会議数', '出席扱い回数', '欠席回数', '未提出回数', '参加率', '連続欠席回数', '最終回答日時'],
            state.memberAggregations.map((item) => [item.name, item.department, item.grade, item.role, item.targetMeetingCount, item.effectiveAttendCount, item.absenceCount, item.unansweredCount, formatPercent(item.attendanceRate), item.absenceStreak, formatDateTimeLabel(item.lastAnsweredAt)])
          )}</div>
        </div>
      `;
    }

    function renderDepartmentsTab() {
      document.getElementById('tab-departments').innerHTML = `
        <div class="${panelCls}">
          <div class="${panelTitleCls}">部局別集計</div>
          <div class="${tableWrapCls}">${renderSimpleTable(
            ['部局', '所属人数', '対象会議数', '出席扱い回数', '欠席回数', '未提出回数', '参加率', '欠席率'],
            state.departmentAggregations.map((item) => [item.department, item.memberCount, item.targetMeetingCount, item.effectiveAttendCount, item.absenceCount, item.unansweredCount, formatPercent(item.attendanceRate), formatPercent(item.absenceRate)])
          )}</div>
        </div>
      `;
    }

    function renderStreaksTab() {
      document.getElementById('tab-streaks').innerHTML = `
        <div class="${panelCls}">
          <div class="${panelTitleCls}">連続欠席チェック</div>
          <div class="${tableWrapCls}">${renderSimpleTable(
            ['名前', '部局', '学年', '役職', '連続欠席回数', '注意レベル', '直近欠席会議', '直近欠席理由'],
            state.streaks.map((item) => [item.name, item.department, item.grade, item.role, item.streak, renderLevelBadge(item.alertLevel), item.latestMeeting, item.latestReason])
          )}</div>
        </div>
      `;
    }

    function renderReasonsTab() {
      const reasons = state.attendanceResponses
        .filter((item) => item.attendance === '欠席')
        .map((item) => {
          const meeting = state.meetings.find((m) => m.meetingId === item.meetingId);
          return {
            meetingName: meeting ? meeting.meetingName : item.meetingId,
            meetingDate: meeting ? meeting.meetingDate : '',
            name: item.name,
            department: item.department,
            grade: item.grade,
            role: item.role,
            absenceReason: item.absenceReason,
            absenceDetail: item.absenceDetail,
            answeredAt: item.answeredAt,
          };
        });
      document.getElementById('tab-reasons').innerHTML = `
        <div class="${panelCls}">
          <div class="${panelTitleCls}">欠席理由一覧</div>
          <div class="${tableWrapCls}">${renderSimpleTable(
            ['会議名', '会議日', '名前', '部局', '学年', '役職', '欠席理由', '欠席理由詳細', '回答日時'],
            reasons.map((item) => [item.meetingName, formatDateLabel(item.meetingDate), item.name, item.department, item.grade, item.role, item.absenceReason, item.absenceDetail, formatDateTimeLabel(item.answeredAt)])
          )}</div>
        </div>
      `;
    }

    function renderSettingsTab() {
      const editableKeys = ['管理者パスワード', 'その他理由詳細必須', '欠席詳細常時必須', '注意連続欠席回数', '要確認連続欠席回数', 'システム名'];
      const rows = state.settings.filter((item) => editableKeys.includes(item.settingKey));
      document.getElementById('tab-settings').innerHTML = `
        <div class="${panelCls}">
          <div class="${panelTitleCls}">設定確認・更新</div>
          <div class="${tableWrapCls}">${renderSimpleTable(
            ['設定キー', '現在値', '説明', '更新日時', '操作'],
            rows.map((item) => [
              item.settingKey,
              `<input id="setting-${escapeAttr(item.settingKey)}" value="${escapeAttr(item.settingValue)}">`,
              item.description,
              formatDateTimeLabel(item.updatedAt),
              `<button type="button" class="${btnSmPrimary}" onclick="saveSetting('${escapeJs(item.settingKey)}')">保存</button>`,
            ])
          )}</div>
        </div>
      `;
    }

    function renderReservationsTab() {
      const activeRows = state.reservations
        .slice()
        .sort((a, b) => `${a.usageDate}${a.startTime}${a.roomName}`.localeCompare(`${b.usageDate}${b.startTime}${b.roomName}`));
      document.getElementById('tab-reservations').innerHTML = `
        <div class="${panelCls}">
          <div class="${panelTitleCls}">会議室予約管理</div>
          <div class="flex flex-wrap gap-2">
            <button type="button" onclick="selectAllReservations()" class="${btnSmSecondary}">全選択</button>
            <button type="button" onclick="clearReservationSelection()" class="${btnSmGhost}">選択解除</button>
            <button type="button" onclick="deleteSelectedReservations()" class="${btnSmDanger}">選択した予約を削除</button>
          </div>
          <div class="${tableWrapCls}">${renderSimpleTable(
            ['選択', '会議名', '利用日', '時間', '会議室', '団体名', '申請者', '状態'],
            activeRows.map((item) => [
              `<input type="checkbox" ${state.selectedReservationIds.has(item.reservationId) ? 'checked' : ''} onchange="toggleReservationSelection('${escapeJs(item.reservationId)}')" class="w-4 h-4 accent-blue-600">`,
              item.meetingName,
              formatDateLabel(item.usageDate),
              `${item.startTime}〜${item.endTime}`,
              item.roomName,
              item.organizationName,
              item.userName,
              item.status,
            ])
          )}</div>
        </div>
      `;
    }

    // ============================================================
    // 出欠一覧ビルダー
    // ============================================================
    function buildAttendanceRows() {
      const activeMembers = state.members.filter((m) => m.status === '有効').sort((a, b) => a.displayOrder - b.displayOrder || a.name.localeCompare(b.name, 'ja'));
      const activeMeetings = state.meetings.filter((m) => m.status === '有効').sort((a, b) => `${a.meetingDate}${a.startTime}`.localeCompare(`${b.meetingDate}${b.startTime}`));
      const responseMap = new Map(state.attendanceResponses.map((item) => [`${item.meetingId}__${item.memberId}`, item]));
      const rows = [];
      activeMeetings.forEach((meeting) => {
        activeMembers.forEach((member) => {
          const response = responseMap.get(`${meeting.meetingId}__${member.memberId}`);
          rows.push({
            meetingName: meeting.meetingName,
            meetingDate: meeting.meetingDate,
            name: member.name,
            department: member.department,
            grade: member.grade,
            role: member.role,
            answerState: response ? response.attendance : '未提出',
            aggregateStatus: response && response.attendance === '欠席' ? '欠席扱い' : '出席扱い',
            absenceReason: response ? response.absenceReason : '',
            absenceDetail: response ? response.absenceDetail : '',
            answeredAt: response ? response.answeredAt : '',
            updatedAt: response ? response.updatedAt : '',
          });
        });
      });
      return rows;
    }

    // ============================================================
    // テーブル・バッジ
    // ============================================================
    function renderSimpleTable(headers, rows) {
      const thead = headers.map((h) => `<th>${h}</th>`).join('');
      const tbody = rows.length
        ? rows.map((row) => `<tr>${row.map((cell) => `<td>${cell === 0 ? '0' : (cell || '')}</td>`).join('')}</tr>`).join('')
        : `<tr><td colspan="${headers.length}" style="text-align:center;padding:24px;color:#9ca3af;font-size:13px;">データがありません。</td></tr>`;
      return `<table class="data-table"><thead><tr>${thead}</tr></thead><tbody>${tbody}</tbody></table>`;
    }

    function renderLevelBadge(level) {
      const styles = {
        '要確認': 'background:#fff0f0;color:#c73d3d',
        '注意': 'background:#fff8e1;color:#9a6b00',
      };
      const s = styles[level] || 'background:#eaf8f2;color:#0f8f68';
      return `<span style="${s};display:inline-flex;align-items:center;border-radius:999px;padding:3px 10px;font-size:11px;font-weight:800;">${escapeHtml(level || '通常')}</span>`;
    }

    // ============================================================
    // 会議フォーム操作
    // ============================================================
    function fillMeetingForm(meetingId) {
      const meeting = state.meetings.find((item) => item.meetingId === meetingId);
      if (!meeting) return;
      document.getElementById('meeting-id').value = meeting.meetingId;
      document.getElementById('meeting-name').value = meeting.meetingName;
      document.getElementById('meeting-date').value = meeting.meetingDate;
      document.getElementById('meeting-start').value = meeting.startTime;
      document.getElementById('meeting-end').value = meeting.endTime;
      document.getElementById('meeting-status').value = meeting.status;
      document.getElementById('meeting-recruit-start').value = toDateTimeLocal(meeting.recruitStartAt);
      document.getElementById('meeting-recruit-end').value = toDateTimeLocal(meeting.recruitEndAt);
      document.getElementById('meeting-deadline').value = toDateTimeLocal(meeting.answerDeadlineAt);
      document.getElementById('meeting-note').value = meeting.note;
      switchTab('meetings');
    }

    function clearMeetingForm() {
      ['meeting-id', 'meeting-name', 'meeting-date', 'meeting-start', 'meeting-end', 'meeting-recruit-start', 'meeting-recruit-end', 'meeting-deadline', 'meeting-note'].forEach((id) => {
        document.getElementById(id).value = '';
      });
      document.getElementById('meeting-status').value = '有効';
    }

    async function saveMeeting() {
      showLoading('会議を保存中...');
      try {
        const res = await fetch(CONFIG.GAS_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({
            action: 'saveMeeting',
            payload: {
              adminPassword: getAdminPassword(),
              meetingId: document.getElementById('meeting-id').value.trim(),
              meetingName: document.getElementById('meeting-name').value.trim(),
              meetingDate: document.getElementById('meeting-date').value,
              startTime: document.getElementById('meeting-start').value,
              endTime: document.getElementById('meeting-end').value,
              recruitStartAt: document.getElementById('meeting-recruit-start').value,
              recruitEndAt: document.getElementById('meeting-recruit-end').value,
              answerDeadlineAt: document.getElementById('meeting-deadline').value,
              note: document.getElementById('meeting-note').value.trim(),
              status: document.getElementById('meeting-status').value,
            },
          }),
        });
        const data = await res.json();
        if (!data.ok) {
          showGlobal(data.error || '会議を保存できません。', 'error');
          hideLoading();
          return;
        }
        await reloadAll(false);
        clearMeetingForm();
        showGlobal('会議を保存しました。', 'success');
      } catch (_) {
        showGlobal('通信エラーが発生しました。', 'error');
      }
      hideLoading();
    }

    async function refreshAggregations() {
      showLoading('集計を再計算中...');
      try {
        const res = await fetch(CONFIG.GAS_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ action: 'refreshAggregations', payload: { adminPassword: getAdminPassword() } }),
        });
        const data = await res.json();
        if (!data.ok) {
          showGlobal(data.error || '集計更新に失敗しました。', 'error');
          hideLoading();
          return;
        }
        await reloadAll(false);
        showGlobal('集計を更新しました。', 'success');
      } catch (_) {
        showGlobal('通信エラーが発生しました。', 'error');
      }
      hideLoading();
    }

    async function saveSetting(settingKey) {
      const input = document.getElementById(`setting-${settingKey}`);
      showLoading('設定を保存中...');
      try {
        const res = await fetch(CONFIG.GAS_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({
            action: 'updateSetting',
            payload: {
              adminPassword: getAdminPassword(),
              settingKey,
              settingValue: input.value.trim(),
            },
          }),
        });
        const data = await res.json();
        if (!data.ok) {
          showGlobal(data.error || '設定更新に失敗しました。', 'error');
          hideLoading();
          return;
        }
        await loadPublicSettings();
        await reloadAll(false);
        showGlobal(`${settingKey} を更新しました。`, 'success');
      } catch (_) {
        showGlobal('通信エラーが発生しました。', 'error');
      }
      hideLoading();
    }

    // ============================================================
    // 予約管理
    // ============================================================
    function toggleReservationSelection(reservationId) {
      if (state.selectedReservationIds.has(reservationId)) {
        state.selectedReservationIds.delete(reservationId);
      } else {
        state.selectedReservationIds.add(reservationId);
      }
      renderReservationsTab();
    }

    function selectAllReservations() {
      state.reservations.forEach((item) => {
        if (item.status !== '取消') state.selectedReservationIds.add(item.reservationId);
      });
      renderReservationsTab();
    }

    function clearReservationSelection() {
      state.selectedReservationIds = new Set();
      renderReservationsTab();
    }

    async function deleteSelectedReservations() {
      const ids = Array.from(state.selectedReservationIds);
      if (!ids.length) {
        showGlobal('削除する予約を選択してください。', 'error');
        return;
      }
      if (!window.confirm(`${ids.length}件の予約を取消に更新します。続けますか。`)) {
        return;
      }
      showLoading('予約を削除中...');
      try {
        const res = await fetch(CONFIG.GAS_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({
            action: 'admin_delete',
            payload: { adminPassword: getAdminPassword(), reservation_ids: ids },
          }),
        });
        const data = await res.json();
        if (!data.ok) {
          showGlobal(data.error || '予約削除に失敗しました。', 'error');
          hideLoading();
          return;
        }
        state.selectedReservationIds = new Set();
        await reloadAll(false);
        showGlobal(`${data.deleted.length}件の予約を取消に更新しました。`, 'success');
      } catch (_) {
        showGlobal('通信エラーが発生しました。', 'error');
      }
      hideLoading();
    }

    function getAdminPassword() {
      return sessionStorage.getItem(PASSWORD_KEY) || '';
    }

    // ============================================================
    // メッセージ
    // ============================================================
    function showMessage(id, text, type) {
      const el = document.getElementById(id);
      el.className = type === 'error'
        ? 'rounded-xl px-4 py-3 text-sm bg-red-50 border border-red-200 text-red-600'
        : 'rounded-xl px-4 py-3 text-sm bg-emerald-50 border border-emerald-200 text-emerald-700';
      el.textContent = text;
      el.classList.remove('hidden');
    }

    function showGlobal(text, type) {
      const el = document.getElementById('global-message');
      el.className = type === 'error'
        ? 'rounded-xl px-4 py-3 text-sm bg-red-50 border border-red-200 text-red-600'
        : 'rounded-xl px-4 py-3 text-sm bg-emerald-50 border border-emerald-200 text-emerald-700';
      el.textContent = text;
      el.classList.remove('hidden');
      clearTimeout(showGlobal.timer);
      showGlobal.timer = setTimeout(() => el.classList.add('hidden'), 5000);
    }

    // ============================================================
    // ユーティリティ
    // ============================================================
    function isRecruiting(meeting) {
      const now = new Date();
      const start = new Date(meeting.recruitStartAt);
      const end = new Date(meeting.recruitEndAt);
      return !Number.isNaN(start.getTime()) && !Number.isNaN(end.getTime()) && start <= now && now <= end;
    }

    function normalizeDate(value) {
      return String(value || '').replace(/\//g, '-').slice(0, 10);
    }

    function normalizeTime(value) {
      const match = String(value || '').trim().match(/^(\d{1,2}):(\d{1,2})/);
      return match ? `${String(match[1]).padStart(2, '0')}:${String(match[2]).padStart(2, '0')}` : String(value || '').trim();
    }

    function normalizeDateTime(value) {
      return String(value || '').trim().replace(/\//g, '-').replace(' ', 'T');
    }

    function formatDateLabel(value) {
      if (!value) return '';
      const date = new Date(`${value}T00:00:00`);
      if (Number.isNaN(date.getTime())) return value;
      const days = ['日', '月', '火', '水', '木', '金', '土'];
      return `${date.getMonth() + 1}/${date.getDate()}(${days[date.getDay()]})`;
    }

    function formatDateTimeLabel(value) {
      if (!value) return '';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      const days = ['日', '月', '火', '水', '木', '金', '土'];
      return `${date.getFullYear()}/${date.getMonth() + 1}/${date.getDate()}(${days[date.getDay()]}) ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
    }

    function toDateTimeLocal(value) {
      if (!value) return '';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}T${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
    }

    function toRatio(value) {
      const text = String(value || '').trim();
      if (!text) return 0;
      if (text.endsWith('%')) return Number(text.replace('%', '')) / 100;
      const numeric = Number(text);
      return numeric > 1 ? numeric / 100 : numeric;
    }

    function formatPercent(value) {
      return `${(Number(value || 0) * 100).toFixed(1)}%`;
    }

    function escapeHtml(text) {
      return String(text || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function escapeAttr(text) {
      return escapeHtml(text).replace(/'/g, '&#39;');
    }

    function escapeJs(text) {
      return String(text || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    }
  </script>
</body>
